<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마음이 상담소</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');

    body {
      font-family: 'Noto Sans KR', sans-serif;
      margin: 0;
      padding: 0;
    }

    @keyframes typing-dot {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }

    .typing-dot:nth-child(1) { animation: typing-dot 1.4s infinite 0s; }
    .typing-dot:nth-child(2) { animation: typing-dot 1.4s infinite 0.2s; }
    .typing-dot:nth-child(3) { animation: typing-dot 1.4s infinite 0.4s; }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-enter {
      animation: fade-in 0.3s ease-out;
    }

    .scrollbar-thin::-webkit-scrollbar {
      width: 4px;
    }
    .scrollbar-thin::-webkit-scrollbar-track {
      background: transparent;
    }
    .scrollbar-thin::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 2px;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            warm: {
              50: '#fef9f3',
              100: '#fdf0e0',
              200: '#fbe0c0',
              300: '#f7c896',
              400: '#f2a862',
              500: '#ed8a3a',
            },
            calm: {
              50: '#f0f7ff',
              100: '#e0efff',
              200: '#b9dbfe',
              300: '#7cc0fd',
              400: '#36a2fa',
              500: '#0c87eb',
            },
            sage: {
              50: '#f2f7f5',
              100: '#e0ede7',
              200: '#c3dbd1',
              300: '#9ac2b2',
              400: '#6da38e',
              500: '#4d8672',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-warm-50">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useRef, useEffect, useCallback } = React;

    const API_BASE_URL = '/api';

    // ========================================
    // Design System Components
    // ========================================

    function TypingIndicator() {
      return (
        <div className="flex items-center space-x-1 px-4 py-3">
          <div className="typing-dot w-2 h-2 bg-gray-400 rounded-full"></div>
          <div className="typing-dot w-2 h-2 bg-gray-400 rounded-full"></div>
          <div className="typing-dot w-2 h-2 bg-gray-400 rounded-full"></div>
        </div>
      );
    }

    function AiAvatar() {
      return (
        <div className="w-9 h-9 rounded-full bg-gradient-to-br from-sage-300 to-sage-500 flex items-center justify-center text-white text-sm font-semibold shadow-sm flex-shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>
      );
    }

    function ChatBubble({ message, isUser }) {
      if (isUser) {
        return (
          <div className="message-enter flex justify-end mb-4 px-4">
            <div className="max-w-[75%] sm:max-w-[65%]">
              <div className="bg-gradient-to-br from-calm-400 to-calm-500 text-white px-4 py-3 rounded-2xl rounded-br-md shadow-sm text-[15px] leading-relaxed whitespace-pre-wrap">
                {message.content}
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="message-enter flex justify-start mb-4 px-4">
          <div className="flex items-start space-x-2 max-w-[80%] sm:max-w-[70%]">
            <AiAvatar />
            <div>
              <span className="text-xs text-sage-500 font-medium ml-1 mb-1 block">마음이</span>
              <div className="bg-white px-4 py-3 rounded-2xl rounded-tl-md shadow-sm border border-gray-100 text-[15px] leading-relaxed text-gray-700 whitespace-pre-wrap">
                {message.content}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function LoadingBubble() {
      return (
        <div className="message-enter flex justify-start mb-4 px-4">
          <div className="flex items-start space-x-2">
            <AiAvatar />
            <div>
              <span className="text-xs text-sage-500 font-medium ml-1 mb-1 block">마음이</span>
              <div className="bg-white rounded-2xl rounded-tl-md shadow-sm border border-gray-100">
                <TypingIndicator />
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // Layout Components
    // ========================================

    function Header() {
      return (
        <header className="bg-white/80 backdrop-blur-md border-b border-gray-100 px-4 py-4 sticky top-0 z-10">
          <div className="max-w-2xl mx-auto flex items-center space-x-3">
            <div className="w-11 h-11 rounded-full bg-gradient-to-br from-sage-200 to-sage-400 flex items-center justify-center shadow-sm">
              <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
              </svg>
            </div>
            <div>
              <h1 className="text-lg font-bold text-gray-800 leading-tight">마음이 상담소</h1>
              <p className="text-xs text-gray-400 mt-0.5">당신의 이야기를 들려주세요</p>
            </div>
          </div>
        </header>
      );
    }

    function MessageInput({ value, onChange, onSend, disabled }) {
      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          onSend();
        }
      };

      return (
        <div className="bg-white/80 backdrop-blur-md border-t border-gray-100 px-4 py-3 sticky bottom-0">
          <div className="max-w-2xl mx-auto flex items-end space-x-2">
            <textarea
              value={value}
              onChange={onChange}
              onKeyDown={handleKeyDown}
              placeholder="마음속 이야기를 편하게 적어주세요..."
              disabled={disabled}
              rows={1}
              className="flex-1 resize-none rounded-2xl border border-gray-200 bg-gray-50 px-4 py-3 text-[15px] text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-sage-300 focus:border-transparent disabled:opacity-50 transition-all"
              style={{ maxHeight: '120px', minHeight: '46px' }}
              onInput={(e) => {
                e.target.style.height = 'auto';
                e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
              }}
            />
            <button
              onClick={onSend}
              disabled={disabled || !value.trim()}
              className="flex-shrink-0 w-11 h-11 rounded-full bg-gradient-to-br from-sage-400 to-sage-500 text-white flex items-center justify-center shadow-sm hover:shadow-md disabled:opacity-40 disabled:cursor-not-allowed transition-all active:scale-95"
              aria-label="메시지 보내기"
            >
              <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================

    const WELCOME_MESSAGE = {
      role: 'assistant',
      content: '안녕하세요, 저는 AI 심리 상담사 마음이예요 \u{1F60A} 오늘 하루는 어떠셨나요? 편하게 이야기해 주세요.'
    };

    function App() {
      const [messages, setMessages] = useState([WELCOME_MESSAGE]);
      const [input, setInput] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      const [error, setError] = useState(null);
      const chatEndRef = useRef(null);
      const chatContainerRef = useRef(null);

      const scrollToBottom = useCallback(() => {
        if (chatEndRef.current) {
          chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, []);

      useEffect(() => {
        scrollToBottom();
      }, [messages, isLoading, scrollToBottom]);

      const sendMessage = useCallback(async () => {
        const trimmed = input.trim();
        if (!trimmed || isLoading) return;

        const userMessage = { role: 'user', content: trimmed };
        const updatedMessages = [...messages, userMessage];

        setMessages(updatedMessages);
        setInput('');
        setError(null);
        setIsLoading(true);

        try {
          const response = await fetch(`${API_BASE_URL}/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: updatedMessages }),
          });

          if (!response.ok) {
            throw new Error(`서버 오류가 발생했어요 (${response.status})`);
          }

          const data = await response.json();
          const assistantMessage = { role: 'assistant', content: data.reply };
          setMessages(prev => [...prev, assistantMessage]);
        } catch (err) {
          setError(err.message || '네트워크 오류가 발생했어요. 다시 시도해 주세요.');
        } finally {
          setIsLoading(false);
        }
      }, [input, isLoading, messages]);

      return (
        <div className="flex flex-col h-screen bg-gradient-to-b from-warm-50 via-white to-sage-50">
          <Header />

          <main
            ref={chatContainerRef}
            className="flex-1 overflow-y-auto scrollbar-thin py-4"
          >
            <div className="max-w-2xl mx-auto">
              {messages.map((msg, idx) => (
                <ChatBubble key={idx} message={msg} isUser={msg.role === 'user'} />
              ))}

              {isLoading && <LoadingBubble />}

              {error && (
                <div className="message-enter flex justify-center mb-4 px-4">
                  <div className="bg-red-50 text-red-500 text-sm px-4 py-2 rounded-xl border border-red-100">
                    {error}
                    <button
                      onClick={() => { setError(null); sendMessage(); }}
                      className="ml-2 underline hover:text-red-700"
                    >
                      다시 시도
                    </button>
                  </div>
                </div>
              )}

              <div ref={chatEndRef} />
            </div>
          </main>

          <MessageInput
            value={input}
            onChange={(e) => setInput(e.target.value)}
            onSend={sendMessage}
            disabled={isLoading}
          />
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
