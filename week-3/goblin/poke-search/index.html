<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포켓몬 도감 검색</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes bounce-in {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.05); }
      70% { transform: scale(0.9); }
      100% { transform: scale(1); opacity: 1; }
    }
    .bounce-in { animation: bounce-in 0.5s ease-out; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    .shake { animation: shake 0.3s ease-in-out; }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spin { animation: spin 1s linear infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo } = React;

    // ========================================
    // 🗂️ PokeAPI 유틸리티
    // ========================================
    const POKE_API = "https://pokeapi.co/api/v2";

    const TYPE_COLORS = {
      normal: "#A8A878", fire: "#F08030", water: "#6890F0", electric: "#F8D030",
      grass: "#78C850", ice: "#98D8D8", fighting: "#C03028", poison: "#A040A0",
      ground: "#E0C068", flying: "#A890F0", psychic: "#F85888", bug: "#A8B820",
      rock: "#B8A038", ghost: "#705898", dragon: "#7038F8", dark: "#705848",
      steel: "#B8B8D0", fairy: "#EE99AC"
    };

    const TYPE_NAMES_KO = {
      normal: "노말", fire: "불꽃", water: "물", electric: "전기",
      grass: "풀", ice: "얼음", fighting: "격투", poison: "독",
      ground: "땅", flying: "비행", psychic: "에스퍼", bug: "벌레",
      rock: "바위", ghost: "고스트", dragon: "드래곤", dark: "악",
      steel: "강철", fairy: "페어리"
    };

    const STAT_NAMES_KO = {
      hp: "HP", attack: "공격", defense: "방어",
      "special-attack": "특수공격", "special-defense": "특수방어", speed: "스피드"
    };

    // ========================================
    // 🔍 포켓몬 이름 목록 (한글↔영문 매핑)
    // ========================================
    // 앱 시작 시 1세대 pokemon-species를 로드하여 한글 이름 매핑 생성
    async function loadPokemonNameList() {
      const entries = [];
      // 1세대 151마리의 species 정보를 가져옴
      const res = await fetch(`${POKE_API}/pokemon-species?limit=151`);
      const data = await res.json();

      // 각 species의 한글 이름을 병렬로 가져옴
      const speciesDetails = await Promise.all(
        data.results.map(async (species, index) => {
          try {
            const specRes = await fetch(species.url);
            const specData = await specRes.json();
            const koName = specData.names.find(n => n.language.name === "ko")?.name || species.name;
            return {
              id: index + 1,
              nameEn: species.name,
              nameKo: koName
            };
          } catch {
            return { id: index + 1, nameEn: species.name, nameKo: species.name };
          }
        })
      );

      return speciesDetails;
    }

    async function fetchPokemon(nameOrId) {
      const q = nameOrId.toLowerCase().trim();
      const res = await fetch(`${POKE_API}/pokemon/${q}`);
      if (!res.ok) throw new Error("not found");
      const data = await res.json();

      const speciesRes = await fetch(data.species.url);
      const species = await speciesRes.json();

      const nameKo = species.names.find(n => n.language.name === "ko")?.name || data.name;
      const flavorKo = species.flavor_text_entries.find(f => f.language.name === "ko")?.flavor_text
        || species.flavor_text_entries.find(f => f.language.name === "en")?.flavor_text
        || "";

      const types = data.types.map(t => t.type.name);
      const stats = {};
      data.stats.forEach(s => {
        stats[STAT_NAMES_KO[s.stat.name] || s.stat.name] = s.base_stat;
      });

      return {
        id: data.id,
        name: nameKo,
        nameEn: data.name.charAt(0).toUpperCase() + data.name.slice(1),
        types: types.map(t => TYPE_NAMES_KO[t] || t),
        typeColors: types.map(t => TYPE_COLORS[t] || "#888"),
        height: (data.height / 10).toFixed(1),
        weight: (data.weight / 10).toFixed(1),
        abilities: data.abilities.map(a => a.ability.name),
        description: flavorKo.replace(/\n|\f/g, " "),
        stats,
        image: data.sprites.other["official-artwork"].front_default
          || data.sprites.front_default
      };
    }

    const POPULAR_IDS = [1, 4, 7, 25, 6, 9, 150, 133, 143, 131, 94, 149];

    // ========================================
    // 🎨 Design System Components
    // ========================================
    function TypeBadge({ type, color }) {
      return (
        <span
          className="inline-block px-3 py-1 rounded-full text-white text-xs font-bold shadow-sm"
          style={{ backgroundColor: color }}
        >
          {type}
        </span>
      );
    }

    function StatBar({ label, value, max = 200 }) {
      const percentage = Math.min((value / max) * 100, 100);
      const barColor =
        value >= 100 ? "#22c55e" :
        value >= 70 ? "#eab308" :
        value >= 50 ? "#f97316" : "#ef4444";

      return (
        <div className="flex items-center gap-2 text-sm">
          <span className="w-16 text-gray-500 text-right font-medium">{label}</span>
          <div className="flex-1 bg-gray-200 rounded-full h-3 overflow-hidden">
            <div
              className="h-full rounded-full transition-all duration-700 ease-out"
              style={{ width: `${percentage}%`, backgroundColor: barColor }}
            />
          </div>
          <span className="w-8 text-gray-700 font-bold">{value}</span>
        </div>
      );
    }

    function Spinner() {
      return (
        <div className="flex justify-center py-16">
          <div className="w-12 h-12 border-4 border-red-200 border-t-red-500 rounded-full spin" />
        </div>
      );
    }

    // ========================================
    // 🃏 포켓몬 카드 컴포넌트
    // ========================================
    function PokemonCard({ pokemon }) {
      const totalStats = Object.values(pokemon.stats).reduce((a, b) => a + b, 0);
      const bgGradient = pokemon.typeColors.length > 1
        ? `linear-gradient(135deg, ${pokemon.typeColors[0]}22, ${pokemon.typeColors[1]}22)`
        : `linear-gradient(135deg, ${pokemon.typeColors[0]}22, ${pokemon.typeColors[0]}11)`;

      return (
        <div className="bounce-in max-w-md mx-auto">
          <div
            className="rounded-3xl shadow-2xl overflow-hidden border border-gray-100"
            style={{ background: bgGradient }}
          >
            <div className="relative p-6 pb-2 flex justify-center">
              <div className="absolute top-4 left-5 text-gray-400 font-black text-5xl opacity-30">
                #{String(pokemon.id).padStart(3, "0")}
              </div>
              <img
                src={pokemon.image}
                alt={pokemon.name}
                className="w-48 h-48 object-contain drop-shadow-lg hover:scale-110 transition-transform duration-300"
              />
            </div>

            <div className="px-6 pb-3 text-center">
              <h2 className="text-2xl font-black text-gray-800">{pokemon.name}</h2>
              <p className="text-sm text-gray-400 mb-2">{pokemon.nameEn}</p>
              <div className="flex justify-center gap-2">
                {pokemon.types.map((type, i) => (
                  <TypeBadge key={type} type={type} color={pokemon.typeColors[i]} />
                ))}
              </div>
            </div>

            <div className="px-6 pb-3">
              <p className="text-sm text-gray-600 text-center italic leading-relaxed bg-white/50 rounded-xl p-3">
                "{pokemon.description}"
              </p>
            </div>

            <div className="px-6 pb-3 flex justify-center gap-8">
              <div className="text-center">
                <p className="text-xs text-gray-400">키</p>
                <p className="font-bold text-gray-700">{pokemon.height}m</p>
              </div>
              <div className="text-center">
                <p className="text-xs text-gray-400">몸무게</p>
                <p className="font-bold text-gray-700">{pokemon.weight}kg</p>
              </div>
              <div className="text-center">
                <p className="text-xs text-gray-400">특성</p>
                <p className="font-bold text-gray-700 text-sm">{pokemon.abilities.join(", ")}</p>
              </div>
            </div>

            <div className="px-6 pb-6">
              <div className="bg-white/60 rounded-2xl p-4 space-y-2">
                <h3 className="text-sm font-bold text-gray-500 text-center mb-2">기본 스탯</h3>
                {Object.entries(pokemon.stats).map(([key, val]) => (
                  <StatBar key={key} label={key} value={val} />
                ))}
                <div className="border-t pt-2 mt-2 flex justify-between text-sm font-bold text-gray-600">
                  <span>합계</span>
                  <span>{totalStats}</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 📄 미니 카드 (목록용)
    // ========================================
    function MiniCard({ pokemon, onClick }) {
      return (
        <button
          onClick={onClick}
          className="flex items-center gap-3 bg-white rounded-xl p-3 shadow-md hover:shadow-lg hover:scale-105 transition-all duration-200 w-full text-left border border-gray-100"
        >
          <img src={pokemon.image} alt={pokemon.name} className="w-12 h-12 object-contain" />
          <div>
            <p className="font-bold text-gray-800 text-sm">
              <span className="text-gray-400 mr-1">#{String(pokemon.id).padStart(3, "0")}</span>
              {pokemon.name}
            </p>
            <div className="flex gap-1 mt-1">
              {pokemon.types.map((type, i) => (
                <span
                  key={type}
                  className="text-[10px] text-white px-2 py-0.5 rounded-full"
                  style={{ backgroundColor: pokemon.typeColors[i] }}
                >
                  {type}
                </span>
              ))}
            </div>
          </div>
        </button>
      );
    }

    function MiniCardSkeleton() {
      return (
        <div className="flex items-center gap-3 bg-white rounded-xl p-3 shadow-md w-full border border-gray-100 animate-pulse">
          <div className="w-12 h-12 bg-gray-200 rounded-lg" />
          <div className="flex-1">
            <div className="h-4 bg-gray-200 rounded w-24 mb-2" />
            <div className="h-3 bg-gray-100 rounded w-12" />
          </div>
        </div>
      );
    }

    // ========================================
    // 🔎 자동완성 드롭다운 컴포넌트
    // ========================================
    function AutocompleteDropdown({ suggestions, onSelect, highlightIndex }) {
      if (suggestions.length === 0) return null;

      return (
        <div className="absolute top-full left-0 right-0 mt-1 bg-white rounded-xl shadow-xl border border-gray-200 max-h-60 overflow-y-auto z-50">
          {suggestions.map((item, i) => (
            <button
              key={item.id}
              onMouseDown={(e) => { e.preventDefault(); onSelect(item); }}
              className={`w-full text-left px-4 py-2.5 flex items-center gap-3 hover:bg-red-50 transition-colors ${
                i === highlightIndex ? "bg-red-50" : ""
              } ${i === 0 ? "rounded-t-xl" : ""} ${i === suggestions.length - 1 ? "rounded-b-xl" : ""}`}
            >
              <span className="text-gray-400 text-xs font-mono w-8">#{String(item.id).padStart(3, "0")}</span>
              <span className="font-bold text-gray-800">{item.nameKo}</span>
              <span className="text-gray-400 text-sm">{item.nameEn}</span>
            </button>
          ))}
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================
    function App() {
      const [query, setQuery] = useState("");
      const [selectedPokemon, setSelectedPokemon] = useState(null);
      const [loading, setLoading] = useState(false);
      const [notFound, setNotFound] = useState(false);
      const [popularList, setPopularList] = useState([]);
      const [popularLoading, setPopularLoading] = useState(true);

      // 이름 목록 (한글↔영문 매핑)
      const [nameList, setNameList] = useState([]);
      const [nameListLoading, setNameListLoading] = useState(true);
      const [showDropdown, setShowDropdown] = useState(false);
      const [highlightIndex, setHighlightIndex] = useState(-1);
      const inputRef = useRef(null);

      // 앱 시작 시 이름 목록 로드
      useEffect(() => {
        loadPokemonNameList()
          .then(setNameList)
          .catch(() => {})
          .finally(() => setNameListLoading(false));
      }, []);

      // 인기 포켓몬 목록 로드
      useEffect(() => {
        Promise.all(POPULAR_IDS.map(id => fetchPokemon(String(id))))
          .then(setPopularList)
          .catch(() => {})
          .finally(() => setPopularLoading(false));
      }, []);

      // 자동완성 필터링
      const suggestions = useMemo(() => {
        const q = query.trim().toLowerCase();
        if (!q || q.length === 0 || nameList.length === 0) return [];

        const isNumber = /^\d+$/.test(q);

        const filtered = nameList.filter(item => {
          if (isNumber) {
            return String(item.id).startsWith(q);
          }
          return (
            item.nameKo.toLowerCase().includes(q) ||
            item.nameEn.toLowerCase().includes(q)
          );
        });

        return filtered.slice(0, 8);
      }, [query, nameList]);

      // 검색: 한글 → 영문 변환 후 API 호출
      const searchPokemon = useCallback(async (searchQuery) => {
        const q = searchQuery.trim();
        if (!q) return;

        setLoading(true);
        setNotFound(false);
        setSelectedPokemon(null);
        setShowDropdown(false);

        // 한글 이름이면 영문으로 변환
        let apiQuery = q.toLowerCase();
        const matched = nameList.find(
          item => item.nameKo === q || item.nameKo.toLowerCase() === apiQuery
        );
        if (matched) {
          apiQuery = matched.nameEn;
        }

        // 영문 부분 입력이면 완전 매칭되는 것 찾기
        if (!matched) {
          const partialMatch = nameList.find(
            item => item.nameEn.toLowerCase().startsWith(apiQuery)
          );
          if (partialMatch) {
            apiQuery = partialMatch.nameEn;
          }
        }

        try {
          const pokemon = await fetchPokemon(apiQuery);
          setSelectedPokemon(pokemon);
        } catch {
          setNotFound(true);
        } finally {
          setLoading(false);
        }
      }, [nameList]);

      const handleSearch = useCallback(() => {
        // 하이라이트된 자동완성 항목이 있으면 그것을 선택
        if (highlightIndex >= 0 && suggestions[highlightIndex]) {
          const item = suggestions[highlightIndex];
          setQuery(item.nameKo);
          setShowDropdown(false);
          setHighlightIndex(-1);
          searchPokemon(item.nameEn);
          return;
        }
        searchPokemon(query);
      }, [query, searchPokemon, highlightIndex, suggestions]);

      const handleKeyDown = useCallback((e) => {
        if (e.key === "ArrowDown") {
          e.preventDefault();
          setHighlightIndex(prev => Math.min(prev + 1, suggestions.length - 1));
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          setHighlightIndex(prev => Math.max(prev - 1, -1));
        } else if (e.key === "Enter") {
          handleSearch();
        } else if (e.key === "Escape") {
          setShowDropdown(false);
          setHighlightIndex(-1);
        }
      }, [handleSearch, suggestions.length]);

      const handleSelectSuggestion = useCallback((item) => {
        setQuery(item.nameKo);
        setShowDropdown(false);
        setHighlightIndex(-1);
        searchPokemon(item.nameEn);
      }, [searchPokemon]);

      const handleInputChange = useCallback((e) => {
        setQuery(e.target.value);
        setShowDropdown(true);
        setHighlightIndex(-1);
      }, []);

      const handleMiniClick = useCallback((pokemon) => {
        setSelectedPokemon(pokemon);
        setNotFound(false);
        setQuery(pokemon.name);
        window.scrollTo({ top: 0, behavior: "smooth" });
      }, []);

      return (
        <div className="min-h-screen bg-gradient-to-br from-red-50 via-white to-yellow-50">
          {/* 헤더 */}
          <header className="bg-gradient-to-r from-red-500 to-red-600 text-white py-6 shadow-lg">
            <div className="max-w-2xl mx-auto px-4 text-center">
              <h1 className="text-3xl font-black tracking-tight">포켓몬 도감</h1>
              <p className="text-red-200 text-sm mt-1">
                한글, 영문, 번호 모두 검색 가능 — PokeAPI 연동
                {nameListLoading && <span className="ml-2">(이름 목록 로딩중...)</span>}
              </p>
            </div>
          </header>

          <main className="max-w-2xl mx-auto px-4 py-8">
            {/* 검색바 + 자동완성 */}
            <div className="flex gap-2 mb-8">
              <div className="flex-1 relative">
                <input
                  ref={inputRef}
                  type="text"
                  value={query}
                  onChange={handleInputChange}
                  onKeyDown={handleKeyDown}
                  onFocus={() => query.trim() && setShowDropdown(true)}
                  onBlur={() => setTimeout(() => setShowDropdown(false), 150)}
                  placeholder="피카츄, pikachu, 25"
                  disabled={loading}
                  className="w-full px-5 py-3 rounded-2xl border-2 border-gray-200 focus:border-red-400 focus:outline-none text-lg shadow-sm transition-colors disabled:opacity-50"
                  aria-label="포켓몬 검색"
                  autoComplete="off"
                />
                {showDropdown && suggestions.length > 0 && (
                  <AutocompleteDropdown
                    suggestions={suggestions}
                    onSelect={handleSelectSuggestion}
                    highlightIndex={highlightIndex}
                  />
                )}
              </div>
              <button
                onClick={handleSearch}
                disabled={loading}
                className="px-6 py-3 bg-red-500 hover:bg-red-600 active:scale-95 text-white font-bold rounded-2xl shadow-md transition-all disabled:opacity-50"
              >
                {loading ? "..." : "검색"}
              </button>
            </div>

            {/* 로딩 */}
            {loading && <Spinner />}

            {/* 검색 결과 */}
            {selectedPokemon && !loading && (
              <div className="mb-10">
                <PokemonCard pokemon={selectedPokemon} />
              </div>
            )}

            {/* 검색 실패 */}
            {notFound && !loading && (
              <div className="shake text-center py-10">
                <p className="text-6xl mb-3">❓</p>
                <p className="text-gray-500 text-lg font-medium">
                  "<span className="text-red-400">{query}</span>" 포켓몬을 찾을 수 없습니다
                </p>
                <p className="text-gray-400 text-sm mt-1">이름 또는 도감 번호를 입력해주세요</p>
              </div>
            )}

            {/* 인기 포켓몬 목록 */}
            <div>
              <h2 className="text-lg font-bold text-gray-600 mb-3">📋 인기 포켓몬</h2>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                {popularLoading
                  ? POPULAR_IDS.map(id => <MiniCardSkeleton key={id} />)
                  : popularList.map((p) => (
                      <MiniCard
                        key={p.id}
                        pokemon={p}
                        onClick={() => handleMiniClick(p)}
                      />
                    ))
                }
              </div>
            </div>
          </main>

          {/* 푸터 */}
          <footer className="text-center py-6 text-gray-400 text-xs">
            Powered by <a href="https://pokeapi.co" target="_blank" rel="noopener" className="underline hover:text-gray-600">PokeAPI</a> &copy; 2026
          </footer>
        </div>
      );
    }

    // ========================================
    // 🎬 Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
