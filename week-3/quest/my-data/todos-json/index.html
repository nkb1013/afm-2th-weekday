<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할 일 목록</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .todo-done span {
      text-decoration: line-through;
      color: #9ca3af;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ========================================
    // Design System Components
    // ========================================

    function Button({ children, onClick, variant = "primary", size = "md", disabled = false, className = "" }) {
      const base = "font-medium rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2";
      const variants = {
        primary: "bg-blue-600 text-white hover:bg-blue-700 focus:ring-blue-500",
        danger: "bg-red-500 text-white hover:bg-red-600 focus:ring-red-400",
        ghost: "bg-transparent text-gray-500 hover:bg-gray-100 focus:ring-gray-300",
      };
      const sizes = {
        sm: "px-3 py-1.5 text-sm",
        md: "px-4 py-2 text-base",
      };
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className={`${base} ${variants[variant]} ${sizes[size]} ${disabled ? "opacity-50 cursor-not-allowed" : ""} ${className}`}
        >
          {children}
        </button>
      );
    }

    function Input({ value, onChange, placeholder, className = "", onKeyDown }) {
      return (
        <input
          type="text"
          value={value}
          onChange={onChange}
          onKeyDown={onKeyDown}
          placeholder={placeholder}
          className={`w-full border border-gray-300 rounded-lg px-4 py-2.5 text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition ${className}`}
        />
      );
    }

    // ========================================
    // Todo Item Component
    // ========================================

    function TodoItem({ todo, onToggle, onDelete }) {
      return (
        <li className={`flex items-center gap-3 px-4 py-3 bg-white rounded-lg shadow-sm border border-gray-100 group ${todo.done ? "todo-done" : ""}`}>
          <input
            type="checkbox"
            checked={todo.done}
            onChange={() => onToggle(todo.id)}
            className="w-5 h-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500 cursor-pointer"
            aria-label={`${todo.todo} 완료 표시`}
          />
          <span className={`flex-1 text-base ${todo.done ? "text-gray-400" : "text-gray-800"}`}>
            {todo.todo}
          </span>
          <button
            onClick={() => onDelete(todo.id)}
            className="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-500 transition-opacity p-1"
            aria-label={`${todo.todo} 삭제`}
          >
            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
          </button>
        </li>
      );
    }

    // ========================================
    // App Component
    // ========================================

    function App() {
      const [todos, setTodos] = useState([]);
      const [newTodo, setNewTodo] = useState("");

      // 서버에서 todo 목록 불러오기
      useEffect(() => {
        fetch('/api/todos')
          .then(res => res.json())
          .then(data => {
            if (data.success) setTodos(data.data);
          })
          .catch(err => console.error('Failed to load todos:', err));
      }, []);

      const addTodo = async () => {
        const text = newTodo.trim();
        if (!text) return;
        try {
          const res = await fetch('/api/todos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ todo: text })
          });
          const data = await res.json();
          if (data.success) {
            setTodos(prev => [...prev, data.data]);
          }
        } catch (err) {
          console.error('Failed to add todo:', err);
        }
        setNewTodo("");
      };

      const toggleTodo = async (id) => {
        const todo = todos.find(t => t.id === id);
        if (!todo) return;
        try {
          const res = await fetch(`/api/todos/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ done: !todo.done })
          });
          const data = await res.json();
          if (data.success) {
            setTodos(prev => prev.map(t => t.id === id ? data.data : t));
          }
        } catch (err) {
          console.error('Failed to toggle todo:', err);
        }
      };

      const deleteTodo = async (id) => {
        try {
          const res = await fetch(`/api/todos/${id}`, { method: 'DELETE' });
          const data = await res.json();
          if (data.success) {
            setTodos(prev => prev.filter(t => t.id !== id));
          }
        } catch (err) {
          console.error('Failed to delete todo:', err);
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === "Enter") addTodo();
      };

      const doneCount = todos.filter(t => t.done).length;

      return (
        <div className="max-w-lg mx-auto px-4 py-12">
          <h1 className="text-2xl font-bold text-gray-900 mb-1">할 일 목록</h1>
          <p className="text-sm text-gray-500 mb-6">
            {todos.length}개 중 {doneCount}개 완료
          </p>

          {/* 입력 영역 */}
          <div className="flex gap-2 mb-6">
            <Input
              value={newTodo}
              onChange={(e) => setNewTodo(e.target.value)}
              onKeyDown={handleKeyDown}
              placeholder="새로운 할 일을 입력하세요"
            />
            <Button onClick={addTodo} disabled={!newTodo.trim()} className="shrink-0">
              추가
            </Button>
          </div>

          {/* 목록 */}
          {todos.length === 0 ? (
            <p className="text-center text-gray-400 py-12">할 일이 없습니다. 위에서 추가해 보세요!</p>
          ) : (
            <ul className="space-y-2">
              {todos.map(todo => (
                <TodoItem
                  key={todo.id}
                  todo={todo}
                  onToggle={toggleTodo}
                  onDelete={deleteTodo}
                />
              ))}
            </ul>
          )}
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
