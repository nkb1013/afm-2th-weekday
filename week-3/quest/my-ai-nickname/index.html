<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 별명 생성기</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 40px 20px;
      }

      .container {
        background: white;
        border-radius: 24px;
        padding: 40px;
        width: 100%;
        max-width: 520px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }

      h1 {
        text-align: center;
        font-size: 28px;
        margin-bottom: 8px;
        color: #333;
      }

      .subtitle {
        text-align: center;
        color: #888;
        font-size: 14px;
        margin-bottom: 32px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
        color: #444;
        font-size: 14px;
      }

      label .required {
        color: #e74c3c;
        margin-left: 2px;
      }

      input,
      textarea {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 15px;
        transition: border-color 0.2s;
        font-family: inherit;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border-color: #667eea;
      }

      textarea {
        resize: vertical;
        min-height: 60px;
      }

      /* 스타일 선택 */
      .style-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .style-option {
        position: relative;
      }

      .style-option input[type="radio"] {
        display: none;
      }

      .style-option label {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 12px 8px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
        font-weight: 500;
        font-size: 13px;
        color: #555;
      }

      .style-option label .style-emoji {
        font-size: 24px;
        line-height: 1;
      }

      .style-option input:checked + label {
        border-color: #667eea;
        background: #f0f3ff;
        color: #333;
        font-weight: 700;
      }

      .style-option label:hover {
        border-color: #b0b8f0;
        background: #f8f9ff;
      }

      .btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.15s;
        margin-top: 8px;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
      }

      .btn:active {
        transform: translateY(0);
      }

      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      /* 로딩 */
      .loading {
        display: none;
        text-align: center;
        padding: 40px 0;
      }

      .loading.active {
        display: block;
      }

      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #e0e0e0;
        border-top-color: #667eea;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading p {
        color: #888;
        font-size: 14px;
      }

      /* 결과 */
      .results {
        display: none;
        margin-top: 32px;
      }

      .results.active {
        display: block;
      }

      .results h2 {
        font-size: 20px;
        color: #333;
        margin-bottom: 16px;
        text-align: center;
      }

      .nickname-card {
        background: #f8f9ff;
        border: 2px solid #e8ecff;
        border-radius: 14px;
        padding: 16px 20px;
        margin-bottom: 12px;
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
      }

      .nickname-card:hover {
        border-color: #667eea;
        background: #f0f3ff;
        transform: translateX(4px);
      }

      .nickname-card.copied {
        border-color: #27ae60;
        background: #eafaf1;
      }

      .nickname-name {
        font-size: 20px;
        font-weight: 700;
        color: #333;
        margin-bottom: 4px;
      }

      .nickname-reason {
        font-size: 13px;
        color: #777;
        line-height: 1.4;
      }

      .copy-badge {
        position: absolute;
        top: 12px;
        right: 16px;
        background: #667eea;
        color: white;
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 20px;
        opacity: 0;
        transition: opacity 0.2s;
      }

      .nickname-card:hover .copy-badge {
        opacity: 1;
      }

      .nickname-card.copied .copy-badge {
        background: #27ae60;
        opacity: 1;
      }

      .btn-retry {
        margin-top: 20px;
        background: linear-gradient(135deg, #f093fb, #f5576c);
      }

      .btn-retry:hover {
        box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
      }

      .btn-reset {
        margin-top: 8px;
        background: transparent;
        color: #888;
        font-weight: 500;
        font-size: 14px;
      }

      .btn-reset:hover {
        color: #333;
        box-shadow: none;
        transform: none;
      }

      .error {
        display: none;
        background: #fdecea;
        color: #c0392b;
        padding: 14px 18px;
        border-radius: 12px;
        margin-top: 16px;
        font-size: 14px;
        text-align: center;
      }

      .error.active {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>AI 별명 생성기</h1>
      <p class="subtitle">나만의 특별한 별명을 AI가 만들어드려요!</p>

      <!-- 입력 폼 -->
      <form id="nicknameForm">
        <div class="form-group">
          <label>이름 <span class="required">*</span></label>
          <input
            type="text"
            id="name"
            placeholder="예: 홍길동"
            required
          />
        </div>
        <div class="form-group">
          <label>성격</label>
          <input
            type="text"
            id="personality"
            placeholder="예: 활발하고 웃음이 많은, 조용하고 내성적인"
          />
        </div>
        <div class="form-group">
          <label>취미</label>
          <textarea
            id="hobby"
            placeholder="예: 게임, 요리, 독서, 운동 등"
          ></textarea>
        </div>
        <div class="form-group">
          <label>별명 스타일</label>
          <div class="style-grid">
            <div class="style-option">
              <input type="radio" name="style" id="style-random" value="random" checked />
              <label for="style-random"><span class="style-emoji">🎲</span>랜덤</label>
            </div>
            <div class="style-option">
              <input type="radio" name="style" id="style-hollywood" value="hollywood" />
              <label for="style-hollywood"><span class="style-emoji">🎬</span>할리우드</label>
            </div>
            <div class="style-option">
              <input type="radio" name="style" id="style-kdrama" value="kdrama" />
              <label for="style-kdrama"><span class="style-emoji">📺</span>K-Drama</label>
            </div>
            <div class="style-option">
              <input type="radio" name="style" id="style-animal" value="animal" />
              <label for="style-animal"><span class="style-emoji">🐾</span>귀여운 동물</label>
            </div>
            <div class="style-option">
              <input type="radio" name="style" id="style-game" value="game" />
              <label for="style-game"><span class="style-emoji">🎮</span>게임/판타지</label>
            </div>
            <div class="style-option">
              <input type="radio" name="style" id="style-food" value="food" />
              <label for="style-food"><span class="style-emoji">🍕</span>음식</label>
            </div>
          </div>
        </div>
        <button type="submit" class="btn" id="submitBtn">
          별명 만들어줘!
        </button>
      </form>

      <!-- 로딩 -->
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>AI가 별명을 고민 중...</p>
      </div>

      <!-- 에러 -->
      <div class="error" id="error"></div>

      <!-- 결과 -->
      <div class="results" id="results">
        <h2>당신을 위한 별명들</h2>
        <div id="nicknameList"></div>
        <button class="btn btn-retry" id="retryBtn">
          다른 별명 다시 만들기
        </button>
        <button class="btn btn-reset" id="resetBtn">
          처음부터 다시
        </button>
      </div>
    </div>

    <script>
      const form = document.getElementById("nicknameForm");
      const loading = document.getElementById("loading");
      const results = document.getElementById("results");
      const errorDiv = document.getElementById("error");
      const nicknameList = document.getElementById("nicknameList");
      const submitBtn = document.getElementById("submitBtn");
      const retryBtn = document.getElementById("retryBtn");
      const resetBtn = document.getElementById("resetBtn");

      function showError(msg) {
        errorDiv.textContent = msg;
        errorDiv.classList.add("active");
      }

      function hideError() {
        errorDiv.classList.remove("active");
      }

      async function generateNicknames() {
        const name = document.getElementById("name").value.trim();
        const personality = document.getElementById("personality").value.trim();
        const hobby = document.getElementById("hobby").value.trim();
        const style = document.querySelector('input[name="style"]:checked').value;

        if (!name) return;

        // UI 상태 전환
        hideError();
        form.style.display = "none";
        results.classList.remove("active");
        loading.classList.add("active");

        try {
          const res = await fetch("/api/nickname", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, personality, hobby, style }),
          });

          const data = await res.json();

          if (!res.ok) throw new Error(data.error);

          // 결과 렌더링
          nicknameList.innerHTML = "";
          data.nicknames.forEach((item) => {
            const card = document.createElement("div");
            card.className = "nickname-card";
            card.innerHTML = `
              <div class="nickname-name">${item.nickname}</div>
              <div class="nickname-reason">${item.reason}</div>
              <span class="copy-badge">클릭하여 복사</span>
            `;
            card.addEventListener("click", () => copyNickname(card, item.nickname));
            nicknameList.appendChild(card);
          });

          loading.classList.remove("active");
          results.classList.add("active");
        } catch (err) {
          loading.classList.remove("active");
          form.style.display = "block";
          showError(err.message || "별명 생성에 실패했습니다. 다시 시도해주세요.");
        }
      }

      async function copyNickname(card, nickname) {
        try {
          await navigator.clipboard.writeText(nickname);
        } catch {
          // fallback
          const ta = document.createElement("textarea");
          ta.value = nickname;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
        }

        // 복사 완료 표시
        document
          .querySelectorAll(".nickname-card")
          .forEach((c) => c.classList.remove("copied"));
        card.classList.add("copied");
        card.querySelector(".copy-badge").textContent = "복사 완료!";

        setTimeout(() => {
          card.classList.remove("copied");
          card.querySelector(".copy-badge").textContent = "클릭하여 복사";
        }, 2000);
      }

      // 폼 제출
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        generateNicknames();
      });

      // 다시 생성 (같은 입력값으로)
      retryBtn.addEventListener("click", () => {
        results.classList.remove("active");
        generateNicknames();
      });

      // 처음부터
      resetBtn.addEventListener("click", () => {
        results.classList.remove("active");
        form.style.display = "block";
        document.getElementById("name").value = "";
        document.getElementById("personality").value = "";
        document.getElementById("hobby").value = "";
      });
    </script>
  </body>
</html>
