<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Midjourney - AI 이미지 생성기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .shimmer {
      background: linear-gradient(90deg, #1e1b4b 25%, #312e81 50%, #1e1b4b 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .float-animation {
      animation: float 3s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(139, 92, 246, 0.3); }
      50% { box-shadow: 0 0 40px rgba(139, 92, 246, 0.6); }
    }
    .pulse-glow {
      animation: pulse-glow 2s ease-in-out infinite;
    }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-950 text-white">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Button({ children, variant = "primary", size = "md", disabled, onClick, className = "" }) {
      const base = "font-semibold rounded-xl transition-all duration-200 inline-flex items-center justify-center gap-2 cursor-pointer";
      const variants = {
        primary: "bg-violet-600 hover:bg-violet-500 text-white shadow-lg shadow-violet-600/25 hover:shadow-violet-500/40",
        secondary: "bg-gray-800 hover:bg-gray-700 text-gray-200 border border-gray-700",
        ghost: "bg-transparent hover:bg-gray-800 text-gray-400 hover:text-white",
        danger: "bg-red-600 hover:bg-red-500 text-white",
      };
      const sizes = {
        sm: "px-3 py-1.5 text-sm",
        md: "px-5 py-2.5 text-base",
        lg: "px-7 py-3.5 text-lg",
      };
      const disabledStyle = disabled ? "opacity-50 cursor-not-allowed pointer-events-none" : "";

      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className={`${base} ${variants[variant]} ${sizes[size]} ${disabledStyle} ${className}`}
        >
          {children}
        </button>
      );
    }

    function Input({ label, value, onChange, placeholder, className = "", ...props }) {
      return (
        <div className={className}>
          {label && <label className="block text-sm font-medium text-gray-400 mb-1.5">{label}</label>}
          <input
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            className="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition-all"
            {...props}
          />
        </div>
      );
    }

    function Card({ children, className = "", onClick, selected }) {
      return (
        <div
          onClick={onClick}
          className={`rounded-2xl border transition-all duration-200 ${
            selected
              ? "border-violet-500 bg-violet-500/10 shadow-lg shadow-violet-500/20"
              : "border-gray-800 bg-gray-900/50 hover:border-gray-600"
          } ${onClick ? "cursor-pointer" : ""} ${className}`}
        >
          {children}
        </div>
      );
    }

    function Modal({ isOpen, onClose, children, size = "lg" }) {
      if (!isOpen) return null;
      const sizes = { md: "max-w-md", lg: "max-w-3xl", xl: "max-w-5xl", full: "max-w-7xl" };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={onClose}>
          <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" />
          <div
            className={`relative ${sizes[size]} w-full bg-gray-900 rounded-2xl border border-gray-700 shadow-2xl max-h-[90vh] overflow-auto`}
            onClick={(e) => e.stopPropagation()}
          >
            <button
              onClick={onClose}
              className="absolute top-4 right-4 z-10 w-10 h-10 flex items-center justify-center rounded-full bg-gray-800 hover:bg-gray-700 text-gray-400 hover:text-white transition-colors"
            >
              ✕
            </button>
            {children}
          </div>
        </div>
      );
    }

    function Badge({ children, color = "violet", className = "" }) {
      const colors = {
        violet: "bg-violet-500/20 text-violet-300 border-violet-500/30",
        blue: "bg-blue-500/20 text-blue-300 border-blue-500/30",
        green: "bg-green-500/20 text-green-300 border-green-500/30",
        amber: "bg-amber-500/20 text-amber-300 border-amber-500/30",
      };
      return (
        <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium border ${colors[color]} ${className}`}>
          {children}
        </span>
      );
    }

    // ========================================
    // 🧩 Common Components
    // ========================================

    function Header() {
      return (
        <header className="border-b border-gray-800 bg-gray-950/80 backdrop-blur-xl sticky top-0 z-40">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-violet-500 to-fuchsia-500 flex items-center justify-center text-xl float-animation">
                🎨
              </div>
              <div>
                <h1 className="text-xl font-bold bg-gradient-to-r from-violet-400 to-fuchsia-400 bg-clip-text text-transparent">
                  My Midjourney
                </h1>
                <p className="text-xs text-gray-500">AI 이미지 생성기</p>
              </div>
            </div>
            <Badge color="violet">DALL-E 3</Badge>
          </div>
        </header>
      );
    }

    function StyleCard({ style, selected, onClick }) {
      return (
        <Card selected={selected} onClick={onClick} className="p-4 text-center">
          <div className="text-3xl mb-2">{style.emoji}</div>
          <p className="text-sm font-medium text-gray-200">{style.name}</p>
        </Card>
      );
    }

    function SkeletonLoader() {
      return (
        <div className="w-full aspect-square rounded-2xl shimmer" />
      );
    }

    function GeneratedImage({ data, onClick }) {
      return (
        <div
          className="group relative rounded-2xl overflow-hidden cursor-pointer border border-gray-800 hover:border-violet-500/50 transition-all duration-300 hover:shadow-xl hover:shadow-violet-500/10"
          onClick={onClick}
        >
          <img
            src={data.imageUrl}
            alt={data.originalPrompt}
            className="w-full aspect-square object-cover transition-transform duration-500 group-hover:scale-105"
          />
          <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300">
            <div className="absolute bottom-0 left-0 right-0 p-4">
              <p className="text-sm font-medium text-white line-clamp-2">{data.originalPrompt}</p>
              <Badge color="violet" className="mt-2">{data.style}</Badge>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 📄 Page: 이미지 생성기
    // ========================================

    function GeneratorPage() {
      const [styles, setStyles] = useState([]);
      const [selectedStyle, setSelectedStyle] = useState(null);
      const [prompt, setPrompt] = useState("");
      const [selectedSize, setSelectedSize] = useState("square_hd");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [gallery, setGallery] = useState([]);
      const [selectedImage, setSelectedImage] = useState(null);
      const promptRef = useRef(null);

      const API_BASE_URL = window.location.hostname === "localhost"
        ? `http://${window.location.hostname}:${window.location.port}/api`
        : "/api";

      // 스타일 목록 불러오기
      useEffect(() => {
        fetch(`${API_BASE_URL}/styles`)
          .then((res) => res.json())
          .then((data) => {
            setStyles(data.styles);
            if (data.styles.length > 0) setSelectedStyle(data.styles[0].id);
          })
          .catch(() => setError("스타일 목록을 불러올 수 없습니다."));
      }, []);

      const sizes = [
        { value: "square_hd", label: "정사각형", icon: "⬜" },
        { value: "landscape_16_9", label: "가로형", icon: "🔲" },
        { value: "portrait_16_9", label: "세로형", icon: "▮" },
      ];

      const examplePrompts = [
        "벚꽃이 흩날리는 고요한 일본 사찰",
        "우주를 떠다니는 고래",
        "네온빛 아래 비가 내리는 도쿄 골목",
        "마법의 도서관에서 책을 읽는 고양이",
        "수정 동굴 안의 드래곤",
        "일몰에 물든 산티아고 순례길",
      ];

      const handleGenerate = useCallback(async () => {
        if (!prompt.trim() || !selectedStyle) return;

        setLoading(true);
        setError(null);

        try {
          const res = await fetch(`${API_BASE_URL}/generate`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              prompt: prompt.trim(),
              styleId: selectedStyle,
              size: selectedSize,
            }),
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.error || "이미지 생성에 실패했습니다.");
          }

          setGallery((prev) => [data, ...prev]);
          setPrompt("");
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }, [prompt, selectedStyle, selectedSize]);

      const handleKeyDown = (e) => {
        if (e.key === "Enter" && !e.shiftKey && !loading) {
          e.preventDefault();
          handleGenerate();
        }
      };

      return (
        <div className="max-w-7xl mx-auto px-4 sm:px-6 py-8 space-y-8">
          {/* 히어로 섹션 */}
          <section className="text-center space-y-4 py-4">
            <h2 className="text-3xl sm:text-4xl font-bold">
              상상을 <span className="bg-gradient-to-r from-violet-400 via-fuchsia-400 to-pink-400 bg-clip-text text-transparent">현실</span>로
            </h2>
            <p className="text-gray-400 max-w-xl mx-auto">
              원하는 스타일을 선택하고 프롬프트를 입력하면, AI가 당신만의 이미지를 만들어 드립니다.
            </p>
          </section>

          {/* 스타일 선택 */}
          <section className="space-y-3">
            <h3 className="text-lg font-semibold text-gray-200 flex items-center gap-2">
              🎭 스타일 선택
            </h3>
            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 lg:grid-cols-10 gap-3">
              {styles.map((style) => (
                <StyleCard
                  key={style.id}
                  style={style}
                  selected={selectedStyle === style.id}
                  onClick={() => setSelectedStyle(style.id)}
                />
              ))}
            </div>
          </section>

          {/* 프롬프트 입력 */}
          <section className="space-y-4">
            <h3 className="text-lg font-semibold text-gray-200 flex items-center gap-2">
              ✏️ 프롬프트 입력
            </h3>

            <div className="relative">
              <textarea
                ref={promptRef}
                value={prompt}
                onChange={(e) => setPrompt(e.target.value)}
                onKeyDown={handleKeyDown}
                placeholder="어떤 이미지를 만들고 싶나요? (예: 우주를 떠다니는 고래)"
                rows={3}
                className="w-full bg-gray-900 border border-gray-700 rounded-2xl px-5 py-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent transition-all resize-none pr-24"
              />
              <div className="absolute bottom-3 right-3">
                <Button
                  onClick={handleGenerate}
                  disabled={loading || !prompt.trim() || !selectedStyle}
                  size="sm"
                >
                  {loading ? "생성 중..." : "생성 ✨"}
                </Button>
              </div>
            </div>

            {/* 예시 프롬프트 */}
            <div className="flex flex-wrap gap-2">
              <span className="text-xs text-gray-500">예시:</span>
              {examplePrompts.map((ex, i) => (
                <button
                  key={i}
                  onClick={() => setPrompt(ex)}
                  className="text-xs px-3 py-1 rounded-full bg-gray-800 text-gray-400 hover:text-violet-300 hover:bg-gray-700 transition-colors cursor-pointer"
                >
                  {ex}
                </button>
              ))}
            </div>

            {/* 사이즈 선택 */}
            <div className="flex items-center gap-3">
              <span className="text-sm text-gray-400">사이즈:</span>
              {sizes.map((s) => (
                <button
                  key={s.value}
                  onClick={() => setSelectedSize(s.value)}
                  className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm transition-colors cursor-pointer ${
                    selectedSize === s.value
                      ? "bg-violet-600 text-white"
                      : "bg-gray-800 text-gray-400 hover:text-white"
                  }`}
                >
                  {s.icon} {s.label}
                </button>
              ))}
            </div>
          </section>

          {/* 에러 메시지 */}
          {error && (
            <div className="bg-red-500/10 border border-red-500/30 rounded-xl px-4 py-3 text-red-400 text-sm flex items-center gap-2">
              ⚠️ {error}
              <button onClick={() => setError(null)} className="ml-auto text-red-400 hover:text-red-300">✕</button>
            </div>
          )}

          {/* 로딩 상태 */}
          {loading && (
            <section className="space-y-3">
              <div className="flex items-center gap-3">
                <div className="w-5 h-5 border-2 border-violet-500 border-t-transparent rounded-full animate-spin" />
                <span className="text-gray-400">AI가 이미지를 그리고 있습니다...</span>
              </div>
              <SkeletonLoader />
            </section>
          )}

          {/* 갤러리 */}
          {gallery.length > 0 && (
            <section className="space-y-4">
              <div className="flex items-center justify-between">
                <h3 className="text-lg font-semibold text-gray-200 flex items-center gap-2">
                  🖼️ 생성된 이미지 ({gallery.length})
                </h3>
                <Button variant="ghost" size="sm" onClick={() => setGallery([])}>
                  전체 삭제
                </Button>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                {gallery.map((item, i) => (
                  <GeneratedImage
                    key={i}
                    data={item}
                    onClick={() => setSelectedImage(item)}
                  />
                ))}
              </div>
            </section>
          )}

          {/* 빈 상태 */}
          {!loading && gallery.length === 0 && (
            <section className="text-center py-16 space-y-4">
              <div className="text-6xl float-animation">🌌</div>
              <p className="text-gray-500 text-lg">아직 생성된 이미지가 없습니다</p>
              <p className="text-gray-600 text-sm">스타일을 선택하고 프롬프트를 입력해 보세요!</p>
            </section>
          )}

          {/* 이미지 상세 모달 */}
          <Modal
            isOpen={!!selectedImage}
            onClose={() => setSelectedImage(null)}
            size="xl"
          >
            {selectedImage && (
              <div className="p-6 space-y-4">
                <img
                  src={selectedImage.imageUrl}
                  alt={selectedImage.originalPrompt}
                  className="w-full rounded-xl"
                />
                <div className="space-y-3">
                  <div>
                    <span className="text-xs text-gray-500">원본 프롬프트</span>
                    <p className="text-gray-200 font-medium">{selectedImage.originalPrompt}</p>
                  </div>
                  <div>
                    <span className="text-xs text-gray-500">적용 스타일</span>
                    <p><Badge color="violet">{selectedImage.style}</Badge></p>
                  </div>
                  {selectedImage.revisedPrompt && (
                    <div>
                      <span className="text-xs text-gray-500">AI가 해석한 프롬프트</span>
                      <p className="text-gray-400 text-sm">{selectedImage.revisedPrompt}</p>
                    </div>
                  )}
                  <div className="flex gap-2 pt-2">
                    <Button
                      variant="primary"
                      size="sm"
                      onClick={() => window.open(selectedImage.imageUrl, "_blank")}
                    >
                      원본 열기 🔗
                    </Button>
                    <Button
                      variant="secondary"
                      size="sm"
                      onClick={() => {
                        setPrompt(selectedImage.originalPrompt);
                        setSelectedImage(null);
                        promptRef.current?.focus();
                      }}
                    >
                      프롬프트 재사용 ♻️
                    </Button>
                  </div>
                </div>
              </div>
            )}
          </Modal>
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================

    function App() {
      return (
        <div className="min-h-screen bg-gray-950">
          <Header />
          <GeneratorPage />
          <footer className="border-t border-gray-800 py-6 text-center text-gray-600 text-sm">
            Powered by OpenAI DALL-E 3 • My Midjourney
          </footer>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
