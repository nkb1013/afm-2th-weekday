<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 레시피 추천</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Noto Sans KR"', 'sans-serif'],
          },
          colors: {
            warm: {
              50: '#FFF8F0',
              100: '#FFEDD5',
              200: '#FED7AA',
              300: '#FDBA74',
              400: '#FB923C',
              500: '#F97316',
              600: '#EA580C',
              700: '#C2410C',
              800: '#9A3412',
              900: '#7C2D12',
            }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-8px) rotate(-5deg); }
      50% { transform: translateY(-4px) rotate(5deg); }
      75% { transform: translateY(-10px) rotate(-3deg); }
    }
    @keyframes pulse-ring {
      0% { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    .animate-float { animation: float 2s ease-in-out infinite; }
    .animate-pulse-ring { animation: pulse-ring 1.5s ease-out infinite; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
  </style>
</head>
<body class="bg-warm-50 font-sans">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useEffect, useCallback, useMemo, createContext, useContext } = React;

    // ========================================
    // API Base URL
    // ========================================
    const API_BASE_URL = '/api';

    // ========================================
    // Design System Components
    // ========================================

    function Button({ variant = 'primary', size = 'md', disabled = false, onClick, className = '', children }) {
      const base = 'inline-flex items-center justify-center font-semibold rounded-xl transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-gradient-to-r from-orange-500 to-amber-500 text-white hover:from-orange-600 hover:to-amber-600 focus:ring-orange-400 shadow-lg shadow-orange-200 hover:shadow-xl hover:shadow-orange-300 active:scale-[0.98]',
        secondary: 'bg-white text-warm-700 border-2 border-warm-200 hover:border-warm-400 hover:bg-warm-50 focus:ring-warm-300',
        danger: 'bg-red-500 text-white hover:bg-red-600 focus:ring-red-400 shadow-lg shadow-red-200',
        ghost: 'text-warm-600 hover:bg-warm-100 focus:ring-warm-300',
      };
      const sizes = {
        sm: 'text-sm px-3 py-1.5 gap-1.5',
        md: 'text-base px-5 py-2.5 gap-2',
        lg: 'text-lg px-8 py-4 gap-3',
      };
      return (
        <button
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}
          disabled={disabled}
          onClick={onClick}
        >
          {children}
        </button>
      );
    }

    function Card({ className = '', children, style }) {
      return (
        <div className={`bg-white rounded-2xl shadow-md border border-warm-100 ${className}`} style={style}>
          {children}
        </div>
      );
    }

    function Modal({ isOpen, onClose, title, children, size = 'md' }) {
      if (!isOpen) return null;
      const sizes = { sm: 'max-w-sm', md: 'max-w-md', lg: 'max-w-lg' };
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" role="dialog" aria-modal="true">
          <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={onClose} />
          <div className={`relative bg-white rounded-2xl shadow-2xl w-full ${sizes[size]} p-6 animate-fade-in-up`}>
            {title && <h3 className="text-xl font-bold text-gray-800 mb-4">{title}</h3>}
            {children}
          </div>
        </div>
      );
    }

    function Badge({ color = 'orange', className = '', children }) {
      const colors = {
        orange: 'bg-orange-100 text-orange-700 border-orange-200',
        green: 'bg-green-100 text-green-700 border-green-200',
        blue: 'bg-blue-100 text-blue-700 border-blue-200',
        cyan: 'bg-cyan-100 text-cyan-700 border-cyan-200',
        indigo: 'bg-indigo-100 text-indigo-700 border-indigo-200',
        amber: 'bg-amber-100 text-amber-700 border-amber-200',
        purple: 'bg-purple-100 text-purple-700 border-purple-200',
        pink: 'bg-pink-100 text-pink-700 border-pink-200',
        red: 'bg-red-100 text-red-700 border-red-200',
      };
      return (
        <span className={`inline-flex items-center px-3 py-1 rounded-full text-sm font-medium border ${colors[color] || colors.orange} ${className}`}>
          {children}
        </span>
      );
    }

    // ========================================
    // Router Components
    // ========================================

    const RouterContext = createContext({ path: '/', navigate: () => {} });

    function useRouter() {
      return useContext(RouterContext);
    }

    function Router({ children }) {
      const [path, setPath] = useState(window.location.hash.slice(1) || '/');

      useEffect(() => {
        const handleHashChange = () => {
          setPath(window.location.hash.slice(1) || '/');
        };
        window.addEventListener('hashchange', handleHashChange);
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, []);

      const navigate = useCallback((to) => {
        window.location.hash = to;
      }, []);

      return (
        <RouterContext.Provider value={{ path, navigate }}>
          {children}
        </RouterContext.Provider>
      );
    }

    function Routes({ children }) {
      const { path } = useRouter();
      const routes = React.Children.toArray(children);
      for (const route of routes) {
        if (route.props.path === path) return route.props.element;
      }
      return routes[0]?.props.element || null;
    }

    function Route({ path, element }) {
      return null;
    }

    function Link({ to, className = '', children }) {
      const { navigate } = useRouter();
      const handleClick = (e) => {
        e.preventDefault();
        navigate(to);
      };
      return (
        <a href={`#${to}`} onClick={handleClick} className={className}>
          {children}
        </a>
      );
    }

    // ========================================
    // Common/Layout Components
    // ========================================

    function Header() {
      const { path } = useRouter();
      return (
        <header className="bg-white/80 backdrop-blur-md border-b border-warm-200 sticky top-0 z-40">
          <div className="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
            <Link to="/" className="flex items-center gap-2 text-warm-700 hover:text-warm-900 transition-colors">
              <span className="text-2xl">🍳</span>
              <span className="text-xl font-bold bg-gradient-to-r from-orange-600 to-amber-500 bg-clip-text text-transparent">AI 레시피</span>
            </Link>
            <nav className="flex gap-1">
              <Link
                to="/fridge"
                className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors ${path === '/fridge' ? 'bg-warm-100 text-warm-700' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-100'}`}
              >
                재료 관리
              </Link>
              <Link
                to="/"
                className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors ${path === '/' ? 'bg-warm-100 text-warm-700' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-100'}`}
              >
                레시피 생성
              </Link>
              <Link
                to="/recipes"
                className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors ${path === '/recipes' ? 'bg-warm-100 text-warm-700' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-100'}`}
              >
                저장된 레시피
              </Link>
            </nav>
          </div>
        </header>
      );
    }

    function IngredientTag({ name, quantity }) {
      const tagColors = ['orange', 'green', 'blue', 'purple', 'pink', 'cyan', 'amber'];
      const colorIndex = name.charCodeAt(0) % tagColors.length;
      return (
        <Badge color={tagColors[colorIndex]}>
          {name} <span className="ml-1 opacity-70">{quantity}</span>
        </Badge>
      );
    }

    function CategorySection({ category, icon, colorClasses, ingredients }) {
      if (!ingredients || ingredients.length === 0) return null;
      return (
        <div className={`rounded-xl p-4 ${colorClasses.bg} border ${colorClasses.border}`}>
          <h3 className={`text-sm font-semibold mb-3 flex items-center gap-2 ${colorClasses.text}`}>
            <span className="text-lg">{icon}</span>
            {category}
            <span className={`text-xs px-2 py-0.5 rounded-full ${colorClasses.count}`}>{ingredients.length}개</span>
          </h3>
          <div className="flex flex-wrap gap-2">
            {ingredients.map((ing) => (
              <IngredientTag key={ing.id} name={ing.name} quantity={ing.quantity} />
            ))}
          </div>
        </div>
      );
    }

    function LoadingAnimation() {
      return (
        <div className="flex flex-col items-center justify-center py-16">
          <div className="relative mb-6">
            <div className="absolute inset-0 bg-orange-300 rounded-full animate-pulse-ring" />
            <div className="relative text-6xl animate-float">🍳</div>
          </div>
          <p className="text-lg font-semibold text-warm-700 mb-2">AI가 레시피를 만들고 있어요...</p>
          <p className="text-sm text-warm-500">냉장고 재료를 분석하고 맛있는 레시피를 구상 중이에요</p>
          <div className="flex gap-1 mt-4">
            {[0, 1, 2].map((i) => (
              <div
                key={i}
                className="w-2.5 h-2.5 rounded-full bg-orange-400 animate-bounce"
                style={{ animationDelay: `${i * 0.15}s` }}
              />
            ))}
          </div>
        </div>
      );
    }

    // ========================================
    // Page: 재료 관리 (Fridge)
    // ========================================

    function FridgePage() {
      const { navigate } = useRouter();
      const [ingredients, setIngredients] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [name, setName] = useState('');
      const [quantity, setQuantity] = useState('');
      const [category, setCategory] = useState('냉장');
      const [submitting, setSubmitting] = useState(false);
      const [formError, setFormError] = useState(null);

      const fetchIngredients = useCallback(() => {
        setLoading(true);
        fetch(`${API_BASE_URL}/ingredients`)
          .then((res) => res.json())
          .then((json) => {
            if (json.success) setIngredients(json.data);
          })
          .catch(() => setError('재료를 불러오는데 실패했어요.'))
          .finally(() => setLoading(false));
      }, []);

      useEffect(() => {
        fetchIngredients();
      }, [fetchIngredients]);

      const grouped = useMemo(() => {
        const groups = { '냉장': [], '냉동': [], '상온': [] };
        ingredients.forEach((ing) => {
          const cat = ing.category || '상온';
          if (groups[cat]) groups[cat].push(ing);
          else groups['상온'].push(ing);
        });
        return groups;
      }, [ingredients]);

      const categoryConfig = {
        '냉장': { icon: '❄️', colorClasses: { bg: 'bg-cyan-50', border: 'border-cyan-200', text: 'text-cyan-700', count: 'bg-cyan-200 text-cyan-800' } },
        '냉동': { icon: '🧊', colorClasses: { bg: 'bg-indigo-50', border: 'border-indigo-200', text: 'text-indigo-700', count: 'bg-indigo-200 text-indigo-800' } },
        '상온': { icon: '🌾', colorClasses: { bg: 'bg-amber-50', border: 'border-amber-200', text: 'text-amber-700', count: 'bg-amber-200 text-amber-800' } },
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!name.trim()) return;
        setSubmitting(true);
        setFormError(null);
        try {
          const res = await fetch(`${API_BASE_URL}/ingredients`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name.trim(), quantity: quantity.trim() || null, category }),
          });
          const json = await res.json();
          if (json.success) {
            setIngredients((prev) => [...prev, json.data]);
            setName('');
            setQuantity('');
          } else {
            setFormError(json.message || '추가에 실패했어요.');
          }
        } catch {
          setFormError('재료 추가 중 오류가 발생했어요.');
        } finally {
          setSubmitting(false);
        }
      };

      const handleDelete = async (id) => {
        try {
          const res = await fetch(`${API_BASE_URL}/ingredients/${id}`, { method: 'DELETE' });
          const json = await res.json();
          if (json.success) {
            setIngredients((prev) => prev.filter((i) => i.id !== id));
          }
        } catch {
          alert('삭제에 실패했어요.');
        }
      };

      return (
        <div className="max-w-4xl mx-auto px-4 py-8">
          <div className="mb-8">
            <h1 className="text-2xl md:text-3xl font-extrabold text-gray-800 flex items-center gap-2">
              <span>🧊</span> 냉장고 재료 관리
            </h1>
            <p className="text-gray-500 mt-1">재료를 추가하고 관리하세요. 이 재료로 AI가 레시피를 만들어줘요.</p>
          </div>

          {/* Add Ingredient Form */}
          <Card className="p-6 mb-8">
            <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
              <span>➕</span> 재료 추가
            </h2>
            <form onSubmit={handleSubmit}>
              <div className="grid grid-cols-1 sm:grid-cols-12 gap-3">
                <div className="sm:col-span-4">
                  <input type="text" value={name} onChange={(e) => setName(e.target.value)}
                    placeholder="재료 이름"
                    className="w-full px-4 py-2.5 rounded-xl border-2 border-gray-200 focus:border-orange-400 focus:outline-none focus:ring-4 focus:ring-orange-100 placeholder:text-gray-300 text-gray-900 bg-white transition-all" />
                </div>
                <div className="sm:col-span-3">
                  <input type="text" value={quantity} onChange={(e) => setQuantity(e.target.value)}
                    placeholder="수량 (예: 2개)"
                    className="w-full px-4 py-2.5 rounded-xl border-2 border-gray-200 focus:border-orange-400 focus:outline-none focus:ring-4 focus:ring-orange-100 placeholder:text-gray-300 text-gray-900 bg-white transition-all" />
                </div>
                <div className="sm:col-span-3">
                  <select value={category} onChange={(e) => setCategory(e.target.value)}
                    className="w-full px-3 py-2.5 rounded-xl border-2 border-gray-200 focus:border-orange-400 focus:outline-none focus:ring-4 focus:ring-orange-100 text-gray-900 bg-white transition-all">
                    <option value="냉장">❄️ 냉장</option>
                    <option value="냉동">🧊 냉동</option>
                    <option value="상온">🌾 상온</option>
                  </select>
                </div>
                <div className="sm:col-span-2">
                  <Button variant="primary" size="md" disabled={!name.trim() || submitting} onClick={handleSubmit} className="w-full">
                    {submitting ? '추가 중...' : '추가'}
                  </Button>
                </div>
              </div>
              {formError && <p className="mt-2 text-sm text-red-500">{formError}</p>}
            </form>
          </Card>

          {/* Ingredients List */}
          <Card className="p-6 mb-8">
            <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
              <span>🧊</span> 보유 재료
              {!loading && <span className="text-xs font-normal text-gray-400 ml-auto">총 {ingredients.length}개</span>}
            </h2>

            {loading ? (
              <div className="flex justify-center py-8">
                <div className="w-8 h-8 border-4 border-orange-300 border-t-orange-600 rounded-full animate-spin" />
              </div>
            ) : error ? (
              <div className="text-center py-8 text-red-500">{error}</div>
            ) : ingredients.length === 0 ? (
              <div className="text-center py-8 text-gray-400">
                <span className="text-4xl block mb-2">🫙</span>
                <p>냉장고가 비어있어요.</p>
                <p className="text-sm mt-1">위 입력창에서 재료를 추가해 보세요!</p>
              </div>
            ) : (
              <div className="space-y-3">
                {Object.entries(categoryConfig).map(([cat, config]) => {
                  const items = grouped[cat];
                  if (!items || items.length === 0) return null;
                  return (
                    <div key={cat} className={`rounded-xl p-4 ${config.colorClasses.bg} border ${config.colorClasses.border}`}>
                      <h3 className={`text-sm font-semibold mb-3 flex items-center gap-2 ${config.colorClasses.text}`}>
                        <span className="text-lg">{config.icon}</span>
                        {cat}
                        <span className={`text-xs px-2 py-0.5 rounded-full ${config.colorClasses.count}`}>{items.length}개</span>
                      </h3>
                      <div className="flex flex-wrap gap-2">
                        {items.map((ing) => (
                          <span key={ing.id} className={`inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm font-medium border bg-white/80 ${config.colorClasses.border} ${config.colorClasses.text}`}>
                            <span className="font-semibold">{ing.name}</span>
                            {ing.quantity && <span className="text-xs opacity-70">{ing.quantity}</span>}
                            <button onClick={() => handleDelete(ing.id)} aria-label={`${ing.name} 삭제`}
                              className="ml-0.5 rounded-full hover:bg-black/10 transition-colors p-0.5 -mr-1">
                              <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M6 18L18 6M6 6l12 12" />
                              </svg>
                            </button>
                          </span>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </Card>

          {/* Go to Generate */}
          {ingredients.length > 0 && (
            <div className="text-center">
              <Button variant="primary" size="lg" onClick={() => navigate('/')}>
                <span>✨</span> 이 재료로 AI 레시피 만들기
              </Button>
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // Page: AI 레시피 생성 (Main)
    // ========================================

    const STYLE_OPTIONS = [
      { value: '간단 요리', icon: '⚡', desc: '10~15분 빠른 요리' },
      { value: '다이어트', icon: '🥗', desc: '저칼로리 건강식' },
      { value: '야식', icon: '🌙', desc: '늦은 밤 간식' },
      { value: '든든한 한끼', icon: '🍚', desc: '배부른 메인 요리' },
      { value: '도시락', icon: '🍱', desc: '싸기 좋은 메뉴' },
      { value: '안주', icon: '🍺', desc: '술과 어울리는 요리' },
    ];

    const DIFFICULTY_CONFIG = {
      '하': { color: 'bg-green-100 text-green-700 border-green-200', label: '쉬움' },
      '중': { color: 'bg-yellow-100 text-yellow-700 border-yellow-200', label: '보통' },
      '상': { color: 'bg-red-100 text-red-700 border-red-200', label: '어려움' },
    };

    function GeneratePage() {
      const { navigate } = useRouter();
      const [ingredients, setIngredients] = useState([]);
      const [loadingIngredients, setLoadingIngredients] = useState(true);
      const [selectedStyle, setSelectedStyle] = useState(null);
      const [generating, setGenerating] = useState(false);
      const [recipe, setRecipe] = useState(null);
      const [saved, setSaved] = useState(false);
      const [saving, setSaving] = useState(false);
      const [error, setError] = useState(null);

      useEffect(() => {
        fetch(`${API_BASE_URL}/ingredients`)
          .then((res) => res.json())
          .then((json) => {
            if (json.success) setIngredients(json.data);
          })
          .catch(() => setError('재료를 불러오는데 실패했어요.'))
          .finally(() => setLoadingIngredients(false));
      }, []);

      const grouped = useMemo(() => {
        const groups = { '냉장': [], '냉동': [], '상온': [] };
        ingredients.forEach((ing) => {
          const cat = ing.category || '상온';
          if (groups[cat]) groups[cat].push(ing);
          else groups['상온'].push(ing);
        });
        return groups;
      }, [ingredients]);

      const categoryConfig = {
        '냉장': { icon: '❄️', colorClasses: { bg: 'bg-cyan-50', border: 'border-cyan-200', text: 'text-cyan-700', count: 'bg-cyan-200 text-cyan-800' } },
        '냉동': { icon: '🧊', colorClasses: { bg: 'bg-indigo-50', border: 'border-indigo-200', text: 'text-indigo-700', count: 'bg-indigo-200 text-indigo-800' } },
        '상온': { icon: '🌾', colorClasses: { bg: 'bg-amber-50', border: 'border-amber-200', text: 'text-amber-700', count: 'bg-amber-200 text-amber-800' } },
      };

      const handleGenerate = async () => {
        setGenerating(true);
        setRecipe(null);
        setSaved(false);
        setError(null);
        try {
          const res = await fetch(`${API_BASE_URL}/generate-recipe`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ style: selectedStyle }),
          });
          const json = await res.json();
          if (json.success) {
            setRecipe(json.data);
          } else {
            setError(json.message || '레시피 생성에 실패했어요.');
          }
        } catch (err) {
          setError('레시피 생성 중 오류가 발생했어요. 다시 시도해주세요.');
        } finally {
          setGenerating(false);
        }
      };

      const handleSave = async () => {
        if (!recipe || saving) return;
        setSaving(true);
        try {
          const res = await fetch(`${API_BASE_URL}/recipes`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(recipe),
          });
          const json = await res.json();
          if (json.success) {
            setSaved(true);
          } else {
            alert('저장에 실패했어요: ' + (json.message || ''));
          }
        } catch {
          alert('저장 중 오류가 발생했어요.');
        } finally {
          setSaving(false);
        }
      };

      const diffStyle = recipe?.difficulty && DIFFICULTY_CONFIG[recipe.difficulty];

      return (
        <div className="max-w-4xl mx-auto px-4 py-8">
          {/* Hero Section */}
          <div className="text-center mb-10">
            <div className="text-5xl mb-4">🍽️</div>
            <h1 className="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-orange-600 via-amber-500 to-orange-500 bg-clip-text text-transparent mb-3">
              AI 레시피 추천
            </h1>
            <p className="text-gray-500 text-lg max-w-md mx-auto">
              냉장고 속 재료를 분석해서 AI가 맞춤 레시피를 만들어 드려요
            </p>
          </div>

          {/* Ingredients Section */}
          <Card className="p-6 mb-8">
            <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
              <span>🧊</span> 냉장고 속 재료
              {!loadingIngredients && (
                <span className="text-xs font-normal text-gray-400 ml-auto">
                  총 {ingredients.length}개
                </span>
              )}
            </h2>
            {loadingIngredients ? (
              <div className="flex justify-center py-8">
                <div className="w-8 h-8 border-4 border-orange-300 border-t-orange-600 rounded-full animate-spin" />
              </div>
            ) : ingredients.length === 0 ? (
              <div className="text-center py-8 text-gray-400">
                <span className="text-4xl block mb-2">🫙</span>
                <p>냉장고에 재료가 없어요.</p>
                <p className="text-sm mt-1 mb-4">재료를 먼저 추가해주세요.</p>
                <Button variant="secondary" size="sm" onClick={() => navigate('/fridge')}>
                  <span>🧊</span> 재료 추가하러 가기
                </Button>
              </div>
            ) : (
              <div className="space-y-3">
                {Object.entries(categoryConfig).map(([cat, config]) => (
                  <CategorySection
                    key={cat}
                    category={cat}
                    icon={config.icon}
                    colorClasses={config.colorClasses}
                    ingredients={grouped[cat]}
                  />
                ))}
              </div>
            )}
          </Card>

          {/* Style Selection */}
          {!generating && !recipe && ingredients.length > 0 && (
            <Card className="p-6 mb-8">
              <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                <span>🎨</span> 어떤 스타일의 요리를 원하세요?
              </h2>
              <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                {STYLE_OPTIONS.map((opt) => (
                  <button key={opt.value} onClick={() => setSelectedStyle(selectedStyle === opt.value ? null : opt.value)}
                    className={`p-4 rounded-xl border-2 text-left transition-all duration-200 ${
                      selectedStyle === opt.value
                        ? 'border-orange-400 bg-orange-50 shadow-md scale-[1.02]'
                        : 'border-gray-200 bg-white hover:border-gray-300 hover:bg-gray-50'
                    }`}>
                    <div className="text-2xl mb-1">{opt.icon}</div>
                    <div className="font-semibold text-gray-800 text-sm">{opt.value}</div>
                    <div className="text-xs text-gray-400 mt-0.5">{opt.desc}</div>
                  </button>
                ))}
              </div>
              <p className="text-xs text-gray-400 mt-3 text-center">
                {selectedStyle ? `"${selectedStyle}" 스타일 선택됨` : '선택하지 않으면 자유롭게 추천해요'}
              </p>
            </Card>
          )}

          {/* Generate Button */}
          {!generating && !recipe && ingredients.length > 0 && (
            <div className="text-center mb-8">
              <Button
                variant="primary"
                size="lg"
                onClick={handleGenerate}
                className="text-xl px-10 py-5"
              >
                <span className="text-2xl">✨</span>
                AI 레시피 생성하기
                {selectedStyle && <span className="text-sm opacity-80 ml-1">({selectedStyle})</span>}
              </Button>
            </div>
          )}

          {/* Loading State */}
          {generating && (
            <Card className="overflow-hidden mb-8">
              <LoadingAnimation />
            </Card>
          )}

          {/* Error State */}
          {error && (
            <Card className="p-6 mb-8 border-red-200 bg-red-50">
              <div className="text-center">
                <span className="text-3xl block mb-2">😢</span>
                <p className="text-red-600 font-medium">{error}</p>
                <Button variant="secondary" size="sm" onClick={() => { setError(null); }} className="mt-4">
                  다시 시도하기
                </Button>
              </div>
            </Card>
          )}

          {/* Generated Recipe Preview */}
          {recipe && (
            <div className="animate-fade-in-up">
              <Card className="overflow-hidden mb-8">
                {/* Header */}
                <div className="bg-gradient-to-r from-orange-500 to-amber-400 p-6 text-white relative overflow-hidden">
                  <div className="absolute top-2 right-4 text-6xl opacity-20">🍳</div>
                  <div className="relative">
                    <div className="flex items-center gap-2 mb-2 flex-wrap">
                      {saved ? (
                        <span className="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-green-400/30 text-white border border-white/30">
                          ✅ 저장 완료!
                        </span>
                      ) : (
                        <span className="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-white/20 text-white border border-white/30">
                          미리보기
                        </span>
                      )}
                      {recipe.style && (
                        <span className="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-white/20 text-white border border-white/30">
                          {recipe.style}
                        </span>
                      )}
                    </div>
                    <h2 className="text-2xl md:text-3xl font-bold">{recipe.title}</h2>
                    {/* Meta info */}
                    <div className="flex items-center gap-3 mt-3 flex-wrap">
                      {recipe.cookingTime && (
                        <span className="inline-flex items-center gap-1 text-sm bg-white/20 px-3 py-1 rounded-full">
                          ⏱️ {recipe.cookingTime}
                        </span>
                      )}
                      {recipe.difficulty && (
                        <span className="inline-flex items-center gap-1 text-sm bg-white/20 px-3 py-1 rounded-full">
                          📊 난이도: {recipe.difficulty}
                        </span>
                      )}
                    </div>
                  </div>
                </div>

                <div className="p-6 space-y-6">
                  {/* Ingredients */}
                  {recipe.ingredients && recipe.ingredients.length > 0 && (
                    <div>
                      <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">필요한 재료</h3>
                      <div className="flex flex-wrap gap-2">
                        {recipe.ingredients.map((ing, i) => {
                          const colors = ['orange', 'green', 'blue', 'purple', 'pink', 'cyan', 'amber'];
                          return (
                            <Badge key={i} color={colors[i % colors.length]}>
                              {ing}
                            </Badge>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {/* Steps */}
                  {recipe.steps && recipe.steps.length > 0 && (
                    <div>
                      <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">조리 순서</h3>
                      <ol className="space-y-3">
                        {recipe.steps.map((step, i) => (
                          <li key={i} className="flex gap-3">
                            <span className="flex-shrink-0 w-7 h-7 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center text-sm font-bold">
                              {i + 1}
                            </span>
                            <span className="text-gray-700 pt-0.5">{step}</span>
                          </li>
                        ))}
                      </ol>
                    </div>
                  )}

                  {/* Instructions */}
                  {recipe.instructions && (
                    <div>
                      <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">요리 팁</h3>
                      <div className="bg-amber-50 rounded-xl p-4 text-gray-700 leading-relaxed border border-amber-100">
                        {recipe.instructions}
                      </div>
                    </div>
                  )}
                </div>
              </Card>

              {/* Action Buttons */}
              <div className="flex flex-col sm:flex-row gap-3 justify-center">
                {!saved ? (
                  <>
                    <Button variant="primary" size="lg" onClick={handleSave} disabled={saving}>
                      <span>💾</span> {saving ? '저장 중...' : '이 레시피 저장하기'}
                    </Button>
                    <Button variant="secondary" size="lg" onClick={handleGenerate}>
                      <span>🔄</span> 다시 생성하기
                    </Button>
                  </>
                ) : (
                  <>
                    <Button variant="primary" size="lg" onClick={handleGenerate}>
                      <span>✨</span> 다른 레시피 생성하기
                    </Button>
                    <Button variant="secondary" size="lg" onClick={() => navigate('/recipes')}>
                      <span>📋</span> 저장된 레시피 보기
                    </Button>
                  </>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // Page: 저장된 레시피 목록
    // ========================================

    function RecipesPage() {
      const { navigate } = useRouter();
      const [recipes, setRecipes] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [deleteTarget, setDeleteTarget] = useState(null);
      const [deleting, setDeleting] = useState(false);

      const fetchRecipes = useCallback(() => {
        setLoading(true);
        fetch(`${API_BASE_URL}/recipes`)
          .then((res) => res.json())
          .then((json) => {
            if (json.success) setRecipes(json.data);
          })
          .catch(() => setError('레시피를 불러오는데 실패했어요.'))
          .finally(() => setLoading(false));
      }, []);

      useEffect(() => {
        fetchRecipes();
      }, [fetchRecipes]);

      const handleDelete = async () => {
        if (!deleteTarget) return;
        setDeleting(true);
        try {
          const res = await fetch(`${API_BASE_URL}/recipes/${deleteTarget.id}`, { method: 'DELETE' });
          const json = await res.json();
          if (json.success) {
            setRecipes((prev) => prev.filter((r) => r.id !== deleteTarget.id));
          }
        } catch (err) {
          setError('삭제에 실패했어요.');
        } finally {
          setDeleting(false);
          setDeleteTarget(null);
        }
      };

      const formatDate = (dateStr) => {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`;
      };

      return (
        <div className="max-w-4xl mx-auto px-4 py-8">
          <div className="flex items-center justify-between mb-8">
            <div>
              <h1 className="text-2xl md:text-3xl font-extrabold text-gray-800">
                📋 저장된 레시피
              </h1>
              <p className="text-gray-500 mt-1">AI가 만들어준 레시피 모음</p>
            </div>
            <Button variant="primary" onClick={() => navigate('/')}>
              <span>✨</span> 새 레시피
            </Button>
          </div>

          {loading ? (
            <div className="flex justify-center py-16">
              <div className="w-10 h-10 border-4 border-orange-300 border-t-orange-600 rounded-full animate-spin" />
            </div>
          ) : error ? (
            <Card className="p-8 text-center">
              <span className="text-4xl block mb-3">😢</span>
              <p className="text-red-500">{error}</p>
              <Button variant="secondary" size="sm" onClick={fetchRecipes} className="mt-4">
                다시 시도
              </Button>
            </Card>
          ) : recipes.length === 0 ? (
            <Card className="p-12 text-center">
              <span className="text-6xl block mb-4">🍽️</span>
              <h3 className="text-xl font-bold text-gray-700 mb-2">아직 저장된 레시피가 없어요</h3>
              <p className="text-gray-400 mb-6">AI에게 레시피를 추천받아 보세요!</p>
              <Button variant="primary" onClick={() => navigate('/')}>
                <span>✨</span> 레시피 만들러 가기
              </Button>
            </Card>
          ) : (
            <div className="space-y-6">
              {recipes.map((recipe, index) => (
                <Card key={recipe.id} className="overflow-hidden animate-fade-in-up" style={{ animationDelay: `${index * 0.08}s` }}>
                  {/* Card Header */}
                  <div className="bg-gradient-to-r from-orange-50 to-amber-50 px-6 py-4 border-b border-warm-100 flex items-start justify-between">
                    <div className="flex-1">
                      <h3 className="text-xl font-bold text-gray-800">{recipe.title}</h3>
                      <div className="flex items-center gap-2 mt-1.5 flex-wrap">
                        <span className="text-sm text-gray-400">{formatDate(recipe.createdAt)}</span>
                        {recipe.cookingTime && (
                          <span className="inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded-full bg-blue-100 text-blue-700 border border-blue-200">
                            ⏱️ {recipe.cookingTime}
                          </span>
                        )}
                        {recipe.difficulty && DIFFICULTY_CONFIG[recipe.difficulty] && (
                          <span className={`inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded-full border ${DIFFICULTY_CONFIG[recipe.difficulty].color}`}>
                            📊 {DIFFICULTY_CONFIG[recipe.difficulty].label}
                          </span>
                        )}
                        {recipe.style && (
                          <span className="inline-flex items-center text-xs px-2 py-0.5 rounded-full bg-purple-100 text-purple-700 border border-purple-200">
                            {recipe.style}
                          </span>
                        )}
                      </div>
                    </div>
                    <button
                      onClick={() => setDeleteTarget(recipe)}
                      className="text-gray-300 hover:text-red-500 transition-colors p-1 ml-2"
                      aria-label="레시피 삭제"
                    >
                      <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                      </svg>
                    </button>
                  </div>

                  <div className="p-6 space-y-4">
                    {/* Ingredients */}
                    {recipe.ingredients && recipe.ingredients.length > 0 && (
                      <div>
                        <h4 className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">재료</h4>
                        <div className="flex flex-wrap gap-1.5">
                          {recipe.ingredients.map((ing, i) => {
                            const colors = ['orange', 'green', 'blue', 'purple', 'pink', 'cyan', 'amber'];
                            return (
                              <Badge key={i} color={colors[i % colors.length]} className="text-xs">
                                {ing}
                              </Badge>
                            );
                          })}
                        </div>
                      </div>
                    )}

                    {/* Steps */}
                    {recipe.steps && recipe.steps.length > 0 && (
                      <div>
                        <h4 className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">조리 순서</h4>
                        <ol className="space-y-2">
                          {recipe.steps.map((step, i) => (
                            <li key={i} className="flex gap-2 text-sm">
                              <span className="flex-shrink-0 w-5 h-5 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center text-xs font-bold">
                                {i + 1}
                              </span>
                              <span className="text-gray-600 pt-0.5">{step}</span>
                            </li>
                          ))}
                        </ol>
                      </div>
                    )}

                    {/* Instructions */}
                    {recipe.instructions && (
                      <div>
                        <h4 className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">요리 팁</h4>
                        <p className="text-sm text-gray-500 bg-amber-50 rounded-lg p-3 border border-amber-100 leading-relaxed">
                          {recipe.instructions}
                        </p>
                      </div>
                    )}
                  </div>
                </Card>
              ))}
            </div>
          )}

          {/* Delete Confirmation Modal */}
          <Modal isOpen={!!deleteTarget} onClose={() => setDeleteTarget(null)} title="레시피 삭제" size="sm">
            <p className="text-gray-600 mb-6">
              <span className="font-semibold text-gray-800">"{deleteTarget?.title}"</span> 레시피를 삭제하시겠어요?
              <br />
              <span className="text-sm text-gray-400">이 작업은 되돌릴 수 없어요.</span>
            </p>
            <div className="flex gap-3 justify-end">
              <Button variant="ghost" size="sm" onClick={() => setDeleteTarget(null)} disabled={deleting}>
                취소
              </Button>
              <Button variant="danger" size="sm" onClick={handleDelete} disabled={deleting}>
                {deleting ? '삭제 중...' : '삭제하기'}
              </Button>
            </div>
          </Modal>
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================

    function App() {
      return (
        <Router>
          <div className="min-h-screen bg-warm-50">
            <Header />
            <main>
              <Routes>
                <Route path="/" element={<GeneratePage />} />
                <Route path="/fridge" element={<FridgePage />} />
                <Route path="/recipes" element={<RecipesPage />} />
              </Routes>
            </main>
            <footer className="text-center py-8 text-sm text-gray-300">
              AI 레시피 추천 서비스
            </footer>
          </div>
        </Router>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
