        primary: 'bg-brand-700 hover:bg-brand-800 text-white shadow-md hover:shadow-lg',
        secondary: 'bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 shadow-sm',
        danger: 'bg-red-600 hover:bg-red-700 text-white shadow-md',
        ghost: 'bg-transparent hover:bg-gray-100 text-gray-600',
        success: 'bg-emerald-600 hover:bg-emerald-700 text-white shadow-md',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-5 py-2.5 text-sm',
        lg: 'px-7 py-3 text-base',
      };
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className={`${variants[variant]} ${sizes[size]} rounded-xl font-medium transition-all duration-200 inline-flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed ${className}`}
          {...props}
        >
          {children}
        </button>
      );
    };

    const Card = ({ children, className = '', onClick, hover = false }) => (
      <div
        onClick={onClick}
        className={`bg-white rounded-2xl shadow-sm border border-gray-100 ${hover ? 'hover:shadow-md hover:-translate-y-0.5 cursor-pointer transition-all duration-200' : ''} ${className}`}
      >
        {children}
      </div>
    );

    const Modal = ({ isOpen, onClose, title, children, size = 'md' }) => {
      if (!isOpen) return null;
      const sizes = { sm: 'max-w-sm', md: 'max-w-md', lg: 'max-w-lg', xl: 'max-w-xl' };
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={onClose}>
          <div className="fixed inset-0 bg-black/50 backdrop-blur-sm" />
          <div
            className={`relative bg-white rounded-2xl shadow-2xl w-full ${sizes[size]} fade-in max-h-[90vh] overflow-y-auto`}
            onClick={e => e.stopPropagation()}
          >
            <div className="flex items-center justify-between p-6 border-b border-gray-100">
              <h3 className="text-lg font-bold text-gray-900">{title}</h3>
              <button onClick={onClose} className="p-1.5 hover:bg-gray-100 rounded-lg transition-colors" aria-label="닫기">
                <svg className="w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
              </button>
            </div>
            <div className="p-6">{children}</div>
          </div>
        </div>
      );
    };

    const Badge = ({ children, variant = 'default', className = '' }) => {
      const variants = {
        default: 'bg-gray-100 text-gray-700',
        success: 'bg-emerald-50 text-emerald-700 border border-emerald-200',
        warning: 'bg-amber-50 text-amber-700 border border-amber-200',
        locked: 'bg-red-50 text-red-600 border border-red-200',
        premium: 'bg-brand-50 text-brand-700 border border-brand-200',
      };
      return (
        <span className={`inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium ${variants[variant]} ${className}`}>
          {children}
        </span>
      );
    };

    const Input = ({ label, type = 'text', value, onChange, placeholder, error, className = '', maxLength, ...props }) => (
      <div className={className}>
        {label && <label className="block text-sm font-medium text-gray-700 mb-1.5">{label}</label>}
        <input
          type={type}
          value={value}
          onChange={onChange}
          placeholder={placeholder}
          maxLength={maxLength}
          className={`w-full px-4 py-2.5 rounded-xl border ${error ? 'border-red-300 focus:ring-red-500' : 'border-gray-200 focus:ring-brand-500'} focus:outline-none focus:ring-2 focus:border-transparent transition-all text-sm`}
          {...props}
        />
        {error && <p className="mt-1 text-xs text-red-500">{error}</p>}
      </div>
    );

    // ========================================
    // ICONS
    // ========================================
    const LockIcon = ({ className = "w-5 h-5" }) => (
      <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
    );
    const UnlockIcon = ({ className = "w-5 h-5" }) => (
      <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z" /></svg>
    );
    const BookIcon = ({ className = "w-5 h-5" }) => (
      <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
    );
    const DownloadIcon = ({ className = "w-5 h-5" }) => (
      <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
    );
    const CheckIcon = ({ className = "w-5 h-5" }) => (
      <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
    );
    const ShoppingBagIcon = ({ className = "w-5 h-5" }) => (
      <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
    );
    const LibraryIcon = ({ className = "w-5 h-5" }) => (
      <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 14v3m4-3v3m4-3v3M3 21h18M3 10h18M3 7l9-4 9 4M4 10h16v11H4V10z" /></svg>
    );
    const HistoryIcon = ({ className = "w-5 h-5" }) => (
      <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
    );

    // ========================================
    // ROUTER
    // ========================================
    const RouterContext = createContext({ path: '/', navigate: () => {}, params: {} });

    const matchRoute = (pattern, path) => {
      const patternParts = pattern.split('/');
      const pathParts = path.split('/');
      if (patternParts.length !== pathParts.length) return null;
      const params = {};
      for (let i = 0; i < patternParts.length; i++) {
        if (patternParts[i].startsWith(':')) {
          params[patternParts[i].slice(1)] = pathParts[i];
        } else if (patternParts[i] !== pathParts[i]) {
          return null;
        }
      }
      return params;
    };

    const Router = ({ children }) => {
      const [path, setPath] = useState(window.location.hash.slice(1) || '/');
      useEffect(() => {
        const handler = () => setPath(window.location.hash.slice(1) || '/');
        window.addEventListener('hashchange', handler);
        return () => window.removeEventListener('hashchange', handler);
      }, []);
      const navigate = useCallback((to) => { window.location.hash = to; }, []);
      return <RouterContext.Provider value={{ path, navigate, params: {} }}>{children}</RouterContext.Provider>;
    };

    const useRouter = () => useContext(RouterContext);

    const Routes = ({ children }) => {
      const { path } = useRouter();
      const routes = React.Children.toArray(children);
      for (const route of routes) {
        const params = matchRoute(route.props.path, path);
        if (params !== null) {
          return React.cloneElement(route.props.element, { params });
        }
      }
      return routes[0] ? React.cloneElement(routes[0].props.element) : null;
    };

    const Route = ({ path, element }) => null;

    const Link = ({ to, children, className = '' }) => {
      const { navigate } = useRouter();
      return <a href={`#${to}`} onClick={(e) => { e.preventDefault(); navigate(to); }} className={className}>{children}</a>;
    };

    // ========================================
    // PURCHASE CONTEXT (Server-backed State)
    // ========================================
    const PurchaseContext = createContext();

    const PurchaseProvider = ({ children }) => {
      const [purchaseRecords, setPurchaseRecords] = useState([]); // [{ content_id, order_id, purchased_at }]
      const [loading, setLoading] = useState(true);

      const purchasedIds = useMemo(() => purchaseRecords.map(p => p.content_id), [purchaseRecords]);

      // 서버에서 구매 목록 로드
      const fetchPurchases = useCallback(async () => {
        try {
          const res = await fetch(`${API_BASE_URL}/purchases/${USER_ID}`);
          const data = await res.json();
          setPurchaseRecords(data.purchases || []);
        } catch (err) {
          console.error('Failed to fetch purchases:', err);
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { fetchPurchases(); }, [fetchPurchases]);

      const isPurchased = useCallback((bookId) => purchasedIds.includes(bookId), [purchasedIds]);

      const addPurchase = useCallback((bookId) => {
        if (purchasedIds.includes(bookId)) return;
        setPurchaseRecords(prev => [...prev, { content_id: bookId, order_id: '-', purchased_at: new Date().toISOString() }]);
        // 서버에서 최신 데이터 다시 가져오기
        setTimeout(() => fetchPurchases(), 500);
      }, [purchasedIds, fetchPurchases]);

      const purchasedBooks = useMemo(() => BOOKS.filter(b => purchasedIds.includes(b.id)), [purchasedIds]);

      // 구매 기록에 책 정보를 병합
      const purchaseHistory = useMemo(() => {
        return purchaseRecords.map(record => {
          const book = BOOKS.find(b => b.id === record.content_id);
          return { ...record, book };
        }).filter(r => r.book);
      }, [purchaseRecords]);

      return (
        <PurchaseContext.Provider value={{ purchases: purchasedIds, isPurchased, addPurchase, purchasedBooks, purchaseHistory, loading, fetchPurchases }}>
          {children}
        </PurchaseContext.Provider>
      );
    };

    const usePurchase = () => useContext(PurchaseContext);

    // ========================================
    // LAYOUT COMPONENTS
    // ========================================
    const Header = () => {
      const { path } = useRouter();
      const { purchases } = usePurchase();
      const navItems = [
        { to: '/', label: '서점', icon: <ShoppingBagIcon className="w-4 h-4" /> },
        { to: '/library', label: '내 서재', icon: <LibraryIcon className="w-4 h-4" /> },
        { to: '/history', label: '구매 이력', icon: <HistoryIcon className="w-4 h-4" /> },
      ];
      return (
        <header className="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-40">
          <div className="max-w-5xl mx-auto px-4 sm:px-6">
            <div className="flex items-center justify-between h-16">
              <Link to="/" className="flex items-center gap-2.5 group">
                <div className="w-9 h-9 bg-brand-700 rounded-xl flex items-center justify-center shadow-md group-hover:shadow-lg transition-shadow">
                  <BookIcon className="w-5 h-5 text-white" />
                </div>
                <span className="font-bold text-lg text-gray-900">BookVault</span>
              </Link>
              <nav className="flex items-center gap-1">
                {navItems.map(item => {
                  const isActive = item.to === '/' ? path === '/' : path.startsWith(item.to);
                  return (
                    <Link key={item.to} to={item.to} className={`flex items-center gap-1.5 px-4 py-2 rounded-xl text-sm font-medium transition-all ${isActive ? 'bg-brand-50 text-brand-700' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-50'}`}>
                      {item.icon}
                      <span>{item.label}</span>
                      {item.to === '/library' && purchases.length > 0 && (
                        <span className="ml-1 bg-brand-600 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">{purchases.length}</span>
                      )}
                    </Link>
                  );
                })}
              </nav>
            </div>
          </div>
        </header>
      );
    };

    // ========================================
    // TOSS PAYMENTS WIDGET COMPONENT
    // ========================================
    const TossPaymentWidget = ({ book, onClose }) => {
      const widgetRef = useRef(null);
      const isRenderedRef = useRef(false);
      const [ready, setReady] = useState(false);
      const [error, setError] = useState(null);
      const [isLoading, setIsLoading] = useState(false);

      // 위젯 초기화
      useEffect(() => {
        const tossPayments = TossPayments(TOSS_CLIENT_KEY);
        widgetRef.current = tossPayments.widgets({ customerKey: USER_ID });
        setReady(true);
      }, []);

      // 위젯 렌더링 & 금액 설정
      useEffect(() => {
        if (!ready || !widgetRef.current) return;

        const setup = async () => {
          try {
            await widgetRef.current.setAmount({ currency: 'KRW', value: book.price });

            if (!isRenderedRef.current) {
              await widgetRef.current.renderPaymentMethods({
                selector: '#toss-payment-method',
                variantKey: 'DEFAULT',
              });
              await widgetRef.current.renderAgreement({
                selector: '#toss-agreement',
                variantKey: 'AGREEMENT',
              });
              isRenderedRef.current = true;
            }
          } catch (err) {
            console.error('Widget setup error:', err);
            setError(err.message);
          }
        };
        setup();
      }, [ready, book]);

      const handlePayment = async () => {
        if (!widgetRef.current || isLoading) return;
        setIsLoading(true);

        const orderId = `ORDER_${book.id}_${Date.now().toString(36)}`;
        try {
          await widgetRef.current.requestPayment({
            orderId,
            orderName: book.title,
            successUrl: window.location.origin + window.location.pathname + `?contentId=${book.id}`,
            failUrl: window.location.origin + window.location.pathname + `?payment=fail`,
          });
        } catch (err) {
          if (err.code === 'USER_CANCEL') {
            // 사용자 취소 - 아무것도 하지 않음
          } else {
            setError(err.message);
          }
        } finally {
          setIsLoading(false);
        }
      };

      return (
        <div>
          <div className="mb-4 p-4 bg-gray-50 rounded-xl flex items-center gap-4">
            <div className={`w-14 h-18 ${book.gradient} rounded-lg flex items-center justify-center text-2xl shadow-md flex-shrink-0`}>
              {book.coverEmoji}
            </div>
            <div>
              <p className="font-semibold text-gray-900">{book.title}</p>
              <p className="text-sm text-gray-500">{book.author} 저</p>
              <p className="text-lg font-bold text-brand-700 mt-1">{book.price.toLocaleString()}원</p>
            </div>
          </div>

          {error && (
            <div className="mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600">{error}</div>
          )}

          <div id="toss-payment-method" className="mb-2" />
          <div id="toss-agreement" className="mb-4" />

          <div className="flex gap-3">
            <Button variant="secondary" onClick={onClose} className="flex-1">취소</Button>
            <Button variant="primary" className="flex-1" onClick={handlePayment} disabled={!ready || isLoading}>
              {isLoading ? '처리 중...' : (ready ? `${book.price.toLocaleString()}원 결제하기` : '로딩 중...')}
            </Button>
          </div>
        </div>
      );
    };

    // ========================================
    // PAYMENT SUCCESS HANDLER
    // ========================================
    // 토스가 successUrl에 ?paymentKey=&orderId=&amount= 를 자동 추가함
    // 우리의 successUrl: ...?contentId=1 → 토스 리다이렉트: ...?contentId=1&paymentKey=xxx&orderId=xxx&amount=xxx
    const PaymentSuccessHandler = () => {
      const { addPurchase } = usePurchase();
      const { navigate } = useRouter();
      const [status, setStatus] = useState('processing');
      const [errorMsg, setErrorMsg] = useState('');
      const processedRef = useRef(false);

      useEffect(() => {
        if (processedRef.current) return;
        const params = new URLSearchParams(window.location.search);

        // 토스 결제 성공 리다이렉트 감지 (paymentKey가 있으면 성공 콜백)
        if (params.has('paymentKey')) {
          processedRef.current = true;
          const paymentKey = params.get('paymentKey');
          const orderId = params.get('orderId');
          const amount = Number(params.get('amount'));
          const contentId = parseInt(params.get('contentId'), 10);

          // URL 파라미터 제거 (깔끔하게)
          window.history.replaceState({}, '', window.location.pathname + `#/book/${contentId}`);

          fetch(`${API_BASE_URL}/confirm-payment`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentKey, orderId, amount, userId: USER_ID, contentId }),
          })
            .then(res => res.json())
            .then(data => {
              if (data.success) {
                addPurchase(contentId);
                setStatus('success');
                setTimeout(() => {
                  processedRef.current = false;
                  setStatus('processing');
                  navigate(`/book/${contentId}`);
                }, 2000);
              } else {
                setStatus('error');
                setErrorMsg(data.message || '결제 승인에 실패했습니다.');
              }
            })
            .catch(err => {
              setStatus('error');
              setErrorMsg(err.message);
            });
        } else if (params.get('payment') === 'fail') {
          processedRef.current = true;
          const code = params.get('code') || '';
          const message = params.get('message') || '결제가 실패했습니다.';
          window.history.replaceState({}, '', window.location.pathname + '#/');
          setStatus('error');
          setErrorMsg(message);
        }
      }, []);

      if (!processedRef.current) return null;

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
          <div className="fixed inset-0 bg-black/50 backdrop-blur-sm" />
          <div className="relative bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8 text-center fade-in">
            {status === 'processing' && (
              <>
                <div className="w-16 h-16 mx-auto mb-6 rounded-full border-4 border-brand-200 border-t-brand-600 animate-spin" />
                <p className="text-lg font-semibold text-gray-900">결제 승인 중...</p>
                <p className="text-sm text-gray-500 mt-2">잠시만 기다려주세요</p>
              </>
            )}
            {status === 'success' && (
              <>
                <div className="w-20 h-20 mx-auto mb-6 bg-emerald-50 rounded-full flex items-center justify-center">
                  <CheckIcon className="w-10 h-10 text-emerald-500" />
                </div>
                <h4 className="text-xl font-bold text-gray-900 mb-2">구매 완료!</h4>
                <p className="text-sm text-gray-400">잠금이 해제되었습니다. 잠시 후 이동합니다...</p>
              </>
            )}
            {status === 'error' && (
              <>
                <div className="w-20 h-20 mx-auto mb-6 bg-red-50 rounded-full flex items-center justify-center">
                  <svg className="w-10 h-10 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                </div>
                <h4 className="text-xl font-bold text-gray-900 mb-2">결제 실패</h4>
                <p className="text-sm text-gray-500 mb-6">{errorMsg}</p>
                <Button variant="secondary" onClick={() => { processedRef.current = false; setStatus('processing'); navigate('/'); }}>돌아가기</Button>
              </>
            )}
          </div>
        </div>
      );
    };

    // ========================================
    // PAYMENT MODAL (wraps TossPaymentWidget)
    // ========================================
    const PaymentModal = ({ isOpen, onClose, book }) => {
      if (!isOpen || !book) return null;

      return (
        <Modal isOpen={isOpen} onClose={onClose} title="결제하기" size="lg">
          <TossPaymentWidget book={book} onClose={onClose} />
        </Modal>
      );
    };

    // ========================================
    // PAGE: Book List (Home)
    // ========================================
    const BookListPage = () => {
      const { navigate } = useRouter();
      const { isPurchased } = usePurchase();

      return (
        <div className="fade-in">
          <div className="mb-10 text-center">
            <h1 className="text-3xl sm:text-4xl font-bold text-gray-900 mb-3">Premium E-Books</h1>
            <p className="text-gray-500 text-lg">엄선된 전자책을 만나보세요. 미리보기는 무료입니다.</p>
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
            {BOOKS.map(book => {
              const purchased = isPurchased(book.id);
              return (
                <Card key={book.id} hover onClick={() => navigate(`/book/${book.id}`)} className="overflow-hidden">
                  <div className="flex">
                    <div className={`${book.gradient} w-28 sm:w-32 flex-shrink-0 flex flex-col items-center justify-center p-4 relative`}>
                      <span className="text-4xl mb-2">{book.coverEmoji}</span>
                      <div className="text-white/80 text-xs text-center font-medium leading-tight">{book.title}</div>
                      {purchased && (
                        <div className="absolute top-2 right-2 w-6 h-6 bg-white/20 backdrop-blur rounded-full flex items-center justify-center">
                          <CheckIcon className="w-4 h-4 text-white" />
                        </div>
                      )}
                    </div>
                    <div className="flex-1 p-5 flex flex-col">
                      <div className="flex items-start justify-between gap-2 mb-1">
                        <h3 className="font-bold text-gray-900 text-lg leading-snug">{book.title}</h3>
                      </div>
                      <p className="text-sm text-gray-500 mb-2">{book.author} 저 | {book.pages}쪽 | {book.publishDate}</p>
                      <p className="text-sm text-gray-600 mb-2 line-clamp-2">{book.description}</p>
                      <p className="text-xs text-gray-400 mb-3 line-clamp-3 italic flex-1">
                        {book.chapters.find(c => c.free && c.title.includes('서문'))?.content.split('\n').slice(0, 3).join(' ') || ''}
                      </p>
                      <div className="flex items-center justify-between">
                        {purchased ? (
                          <Badge variant="success"><CheckIcon className="w-3 h-3" /> 구매완료</Badge>
                        ) : (
                          <span className="text-lg font-bold text-brand-700">{book.price.toLocaleString()}원</span>
                        )}
                        <span className="text-sm text-brand-600 font-medium">자세히 보기 &rarr;</span>
                      </div>
                    </div>
                  </div>
                </Card>
              );
            })}
          </div>
        </div>
      );
    };

    // ========================================
    // PAGE: Book Detail
    // ========================================
    const BookDetailPage = ({ params = {} }) => {
      const bookId = parseInt(params.id);
      const book = BOOKS.find(b => b.id === bookId);
      const { isPurchased } = usePurchase();
      const { navigate } = useRouter();
      const [paymentOpen, setPaymentOpen] = useState(false);
      const [activeChapter, setActiveChapter] = useState(null);
      const [downloadToast, setDownloadToast] = useState(false);

      if (!book) {
        return (
          <div className="text-center py-20 fade-in">
            <p className="text-6xl mb-4">📖</p>
            <h2 className="text-xl font-bold text-gray-900 mb-2">전자책을 찾을 수 없습니다</h2>
            <Button variant="secondary" onClick={() => navigate('/')}>서점으로 돌아가기</Button>
          </div>
        );
      }

      const purchased = isPurchased(book.id);

      const handleDownload = () => {
        setDownloadToast(true);
        setTimeout(() => setDownloadToast(false), 3000);
      };

      return (
        <div className="fade-in">
          {/* Toast */}
          {downloadToast && (
            <div className="fixed top-20 right-4 z-50 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-lg fade-in flex items-center gap-2">
              <DownloadIcon className="w-4 h-4" />
              <span className="text-sm">PDF 다운로드가 시작되었습니다 (시뮬레이션)</span>
            </div>
          )}

          {/* Back */}
          <button onClick={() => navigate('/')} className="flex items-center gap-1 text-gray-500 hover:text-gray-700 mb-6 text-sm font-medium transition-colors">
            <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>
            서점으로 돌아가기
          </button>

          {/* Book Header */}
          <Card className="overflow-hidden mb-8">
            <div className="flex flex-col sm:flex-row">
              <div className={`${book.gradient} sm:w-56 h-48 sm:h-auto flex-shrink-0 flex flex-col items-center justify-center p-8 relative`}>
                <span className="text-6xl mb-3">{book.coverEmoji}</span>
                <div className="text-white text-center font-bold text-lg">{book.title}</div>
                {purchased && (
                  <div className="absolute top-3 right-3 bg-white/20 backdrop-blur px-3 py-1 rounded-full text-white text-xs font-medium flex items-center gap-1">
                    <UnlockIcon className="w-3 h-3" /> 잠금 해제됨
                  </div>
                )}
              </div>
              <div className="flex-1 p-6 sm:p-8">
                <div className="flex flex-wrap items-center gap-2 mb-3">
                  {purchased ? <Badge variant="success"><CheckIcon className="w-3 h-3" /> 구매완료</Badge> : <Badge variant="locked"><LockIcon className="w-3 h-3" /> 유료 콘텐츠</Badge>}
                  <Badge variant="default">{book.pages}쪽</Badge>
                  <Badge variant="default">{book.publishDate}</Badge>
                </div>
                <h1 className="text-2xl sm:text-3xl font-bold text-gray-900 mb-2">{book.title}</h1>
                <p className="text-gray-500 mb-4">{book.author} 저</p>
                <p className="text-gray-600 mb-6">{book.description}</p>
                <div className="flex flex-wrap gap-3">
                  {purchased ? (
                    <>
                      <Button variant="success" size="lg" onClick={handleDownload}>
                        <DownloadIcon className="w-4 h-4" /> PDF 다운로드
                      </Button>
                      <Button variant="secondary" size="lg" onClick={() => setActiveChapter(book.chapters[0]?.id)}>
                        <BookIcon className="w-4 h-4" /> 읽기 시작
                      </Button>
                    </>
                  ) : (
                    <Button variant="primary" size="lg" onClick={() => setPaymentOpen(true)}>
                      <ShoppingBagIcon className="w-4 h-4" /> {book.price.toLocaleString()}원 구매하기
                    </Button>
                  )}
                </div>
              </div>
            </div>
          </Card>

          {/* Chapters */}
          <h2 className="text-xl font-bold text-gray-900 mb-4">목차</h2>
          <div className="space-y-3">
            {book.chapters.map((chapter) => {
              const isAccessible = chapter.free || purchased;
              const isActive = activeChapter === chapter.id;

              return (
                <Card key={chapter.id} className="overflow-hidden">
                  <button
                    className="w-full px-5 py-4 flex items-center gap-4 text-left hover:bg-gray-50 transition-colors"
                    onClick={() => isAccessible && setActiveChapter(isActive ? null : chapter.id)}
                    disabled={!isAccessible}
                  >
                    <div className={`w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 ${isAccessible ? (chapter.free ? 'bg-emerald-50 text-emerald-600' : 'bg-brand-50 text-brand-600') : 'bg-gray-100 text-gray-400'}`}>
                      {isAccessible ? (chapter.free ? <UnlockIcon className="w-4 h-4" /> : <CheckIcon className="w-4 h-4" />) : <LockIcon className="w-4 h-4" />}
                    </div>
                    <div className="flex-1 min-w-0">
                      <p className={`font-medium ${isAccessible ? 'text-gray-900' : 'text-gray-400'}`}>{chapter.title}</p>
                      <p className="text-xs text-gray-400 mt-0.5">
                        {chapter.free ? '무료 미리보기' : (purchased ? '잠금 해제됨' : '유료 콘텐츠')}
                      </p>
                    </div>
                    {isAccessible && (
                      <svg className={`w-5 h-5 text-gray-400 transition-transform ${isActive ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                      </svg>
                    )}
                    {!isAccessible && (
                      <Badge variant="locked" className="flex-shrink-0"><LockIcon className="w-3 h-3" /> 잠금</Badge>
                    )}
                  </button>

                  {/* Locked Preview */}
                  {!isAccessible && (
                    <div className="px-5 pb-4 relative">
                      <div className="blur-content text-sm text-gray-600 leading-relaxed">
                        {chapter.content.slice(0, 150)}...
                      </div>
                      <div className="absolute inset-0 flex items-center justify-center">
                        <div className="text-center">
                          <LockIcon className="w-8 h-8 text-gray-300 mx-auto mb-2" />
                          <button
                            onClick={() => setPaymentOpen(true)}
                            className="mt-1 px-4 py-2 bg-brand-700 hover:bg-brand-800 text-white text-sm font-medium rounded-xl shadow transition-all"
                          >
                            결제하고 열람
                          </button>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Chapter Content (expanded) */}
                  {isActive && isAccessible && (
                    <div className="px-5 pb-5 fade-in">
                      <div className="bg-gray-50 rounded-xl p-5 sm:p-6">
                        <div className="text-sm sm:text-base text-gray-700 leading-relaxed whitespace-pre-line">
                          {chapter.content}
                        </div>
                      </div>
                    </div>
                  )}
                </Card>
              );
            })}
          </div>

          {/* CTA for non-purchased */}
          {!purchased && (
            <Card className="mt-8 p-6 text-center bg-gradient-to-r from-brand-50 to-purple-50 border-brand-100">
              <LockIcon className="w-10 h-10 text-brand-400 mx-auto mb-3" />
              <h3 className="text-lg font-bold text-gray-900 mb-2">전체 내용이 궁금하신가요?</h3>
              <p className="text-gray-600 mb-4 text-sm">구매하시면 모든 챕터를 잠금 해제하고 PDF로 다운로드할 수 있습니다.</p>
              <Button variant="primary" size="lg" onClick={() => setPaymentOpen(true)}>
                <ShoppingBagIcon className="w-4 h-4" /> {book.price.toLocaleString()}원 구매하기
              </Button>
            </Card>
          )}

          <PaymentModal
            isOpen={paymentOpen}
            onClose={() => setPaymentOpen(false)}
            book={book}
          />
        </div>
      );
    };

    // ========================================
    // PAGE: Library (My Books)
    // ========================================
    const LibraryPage = () => {
      const { purchasedBooks } = usePurchase();
      const { navigate } = useRouter();
      const [downloadToast, setDownloadToast] = useState(false);

      const handleDownload = (e, bookTitle) => {
        e.stopPropagation();
        setDownloadToast(bookTitle);
        setTimeout(() => setDownloadToast(false), 3000);
      };

      return (
        <div className="fade-in">
          {downloadToast && (
            <div className="fixed top-20 right-4 z-50 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-lg fade-in flex items-center gap-2">
              <DownloadIcon className="w-4 h-4" />
              <span className="text-sm">"{downloadToast}" PDF 다운로드 시작 (시뮬레이션)</span>
            </div>
          )}

          <div className="mb-8">
            <h1 className="text-3xl font-bold text-gray-900 mb-2">내 서재</h1>
            <p className="text-gray-500">구매한 전자책을 확인하고 다운로드하세요.</p>
          </div>

          {purchasedBooks.length === 0 ? (
            <Card className="p-12 text-center">
              <div className="text-6xl mb-4">📚</div>
              <h3 className="text-xl font-bold text-gray-900 mb-2">아직 구매한 전자책이 없습니다</h3>
              <p className="text-gray-500 mb-6">서점에서 마음에 드는 전자책을 찾아보세요!</p>
              <Button variant="primary" size="lg" onClick={() => navigate('/')}>
                <ShoppingBagIcon className="w-4 h-4" /> 서점 둘러보기
              </Button>
            </Card>
          ) : (
            <div className="space-y-4">
              {purchasedBooks.map(book => (
                <Card key={book.id} hover className="overflow-hidden" onClick={() => navigate(`/book/${book.id}`)}>
                  <div className="flex items-center">
                    <div className={`${book.gradient} w-20 sm:w-24 h-24 flex-shrink-0 flex items-center justify-center`}>
                      <span className="text-3xl">{book.coverEmoji}</span>
                    </div>
                    <div className="flex-1 px-5 py-4 min-w-0">
                      <div className="flex items-center gap-2 mb-1">
                        <h3 className="font-bold text-gray-900 truncate">{book.title}</h3>
                        <Badge variant="success" className="flex-shrink-0"><CheckIcon className="w-3 h-3" /> 구매</Badge>
                      </div>
                      <p className="text-sm text-gray-500">{book.author} 저 | {book.chapters.length}개 챕터</p>
                    </div>
                    <div className="flex items-center gap-2 pr-4 flex-shrink-0">
                      <Button variant="secondary" size="sm" onClick={(e) => { e.stopPropagation(); navigate(`/book/${book.id}`); }}>
                        <BookIcon className="w-4 h-4" /> 읽기
                      </Button>
                      <Button variant="success" size="sm" onClick={(e) => handleDownload(e, book.title)}>
                        <DownloadIcon className="w-4 h-4" />
                      </Button>
                    </div>
                  </div>
                </Card>
              ))}

              <div className="pt-4 text-center">
                <p className="text-sm text-gray-400">총 {purchasedBooks.length}권 보유 중</p>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ========================================
    // PAGE: Purchase History
    // ========================================
    const PurchaseHistoryPage = () => {
      const { purchaseHistory, loading } = usePurchase();
      const { navigate } = useRouter();

      const formatDate = (dateStr) => {
        const d = new Date(dateStr);
        return d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      };

      const totalSpent = purchaseHistory.reduce((sum, r) => sum + r.book.price, 0);

      return (
        <div className="fade-in">
          <div className="mb-8">
            <h1 className="text-3xl font-bold text-gray-900 mb-2">구매 이력</h1>
            <p className="text-gray-500">결제한 전자책 내역을 확인할 수 있습니다. 구매한 콘텐츠는 언제든 다시 열람 가능합니다.</p>
          </div>

          {loading ? (
            <div className="text-center py-20">
              <div className="w-12 h-12 mx-auto mb-4 rounded-full border-4 border-brand-200 border-t-brand-600 animate-spin" />
              <p className="text-gray-500">불러오는 중...</p>
            </div>
          ) : purchaseHistory.length === 0 ? (
            <Card className="p-12 text-center">
              <HistoryIcon className="w-16 h-16 text-gray-200 mx-auto mb-4" />
              <h3 className="text-xl font-bold text-gray-900 mb-2">구매 이력이 없습니다</h3>
              <p className="text-gray-500 mb-6">서점에서 전자책을 구매해보세요!</p>
              <Button variant="primary" size="lg" onClick={() => navigate('/')}>
                <ShoppingBagIcon className="w-4 h-4" /> 서점 둘러보기
              </Button>
            </Card>
          ) : (
            <>
              {/* 요약 카드 */}
              <div className="grid grid-cols-2 gap-4 mb-8">
                <Card className="p-5 text-center">
                  <p className="text-sm text-gray-500 mb-1">구매한 전자책</p>
                  <p className="text-3xl font-bold text-brand-700">{purchaseHistory.length}<span className="text-lg font-medium text-gray-400 ml-1">권</span></p>
                </Card>
                <Card className="p-5 text-center">
                  <p className="text-sm text-gray-500 mb-1">총 결제 금액</p>
                  <p className="text-3xl font-bold text-brand-700">{totalSpent.toLocaleString()}<span className="text-lg font-medium text-gray-400 ml-1">원</span></p>
                </Card>
              </div>

              {/* 구매 이력 리스트 */}
              <div className="space-y-3">
                {purchaseHistory.map((record, idx) => (
                  <Card key={record.order_id + idx} hover className="overflow-hidden" onClick={() => navigate(`/book/${record.book.id}`)}>
                    <div className="flex items-center">
                      <div className={`${record.book.gradient} w-16 sm:w-20 h-20 flex-shrink-0 flex items-center justify-center`}>
                        <span className="text-2xl">{record.book.coverEmoji}</span>
                      </div>
                      <div className="flex-1 px-4 py-3 min-w-0">
                        <div className="flex items-center gap-2 mb-0.5">
                          <h3 className="font-bold text-gray-900 truncate text-sm sm:text-base">{record.book.title}</h3>
                          <Badge variant="success" className="flex-shrink-0"><CheckIcon className="w-3 h-3" /> 열람 가능</Badge>
                        </div>
                        <p className="text-xs text-gray-500">{record.book.author} 저</p>
                        <div className="flex items-center gap-3 mt-1.5">
                          <span className="text-xs text-gray-400">{formatDate(record.purchased_at)}</span>
                          <span className="text-xs text-gray-300">|</span>
                          <span className="text-xs font-medium text-brand-600">{record.book.price.toLocaleString()}원</span>
                        </div>
                        {record.order_id !== '-' && (
                          <p className="text-xs text-gray-300 mt-0.5 font-mono truncate">주문번호: {record.order_id}</p>
                        )}
                      </div>
                      <div className="pr-4 flex-shrink-0">
                        <Button variant="secondary" size="sm" onClick={(e) => { e.stopPropagation(); navigate(`/book/${record.book.id}`); }}>
                          <BookIcon className="w-4 h-4" /> 열람
                        </Button>
                      </div>
                    </div>
                  </Card>
                ))}
              </div>

              <div className="pt-6 text-center">
                <p className="text-xs text-gray-400">구매한 콘텐츠는 재결제 없이 언제든 다시 열람할 수 있습니다.</p>
              </div>
            </>
          )}
        </div>
      );
    };

    // ========================================
    // APP COMPONENT
    // ========================================
    const App = () => {
      return (
        <Router>
          <PurchaseProvider>
            <div className="min-h-screen bg-gray-50">
              <PaymentSuccessHandler />
              <Header />
              <main className="max-w-5xl mx-auto px-4 sm:px-6 py-8">
                <Routes>
                  <Route path="/" element={<BookListPage />} />
                  <Route path="/book/:id" element={<BookDetailPage />} />
                  <Route path="/library" element={<LibraryPage />} />
                  <Route path="/history" element={<PurchaseHistoryPage />} />
                </Routes>
              </main>
              <footer className="border-t border-gray-100 mt-16 py-8 text-center text-sm text-gray-400">
                <p>BookVault &copy; 2024. Premium E-Book Store.</p>
                <p className="mt-1">TossPayments 테스트 모드로 동작합니다.</p>
              </footer>
            </div>
          </PurchaseProvider>
        </Router>
      );
    };

    // ========================================
    // RENDERING
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
