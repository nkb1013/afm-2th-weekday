<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자취용품 쇼핑몰 관리자</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sidebar: '#1e1b4b',
            'sidebar-hover': '#312e81',
          }
        }
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; }
    .drop-zone-active { border-color: #6366f1 !important; background-color: #eef2ff !important; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── API Helper ──────────────────────────────────────────
    const api = {
      async get(url) {
        const res = await fetch(url);
        return res.json();
      },
      async post(url, body) {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        return res.json();
      },
      async put(url, body) {
        const res = await fetch(url, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        return res.json();
      },
      async del(url) {
        const res = await fetch(url, { method: 'DELETE' });
        return res.json();
      },
      async upload(file) {
        const formData = new FormData();
        formData.append('image', file);
        const res = await fetch('/api/upload', { method: 'POST', body: formData });
        return res.json();
      },
    };

    // ─── Icons (inline SVG) ──────────────────────────────────
    const Icons = {
      Dashboard: () => (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
        </svg>
      ),
      Products: () => (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
        </svg>
      ),
      Upload: () => (
        <svg className="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
      ),
      Close: () => (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
        </svg>
      ),
      Menu: () => (
        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      ),
    };

    // ─── Stat Card ───────────────────────────────────────────
    function StatCard({ title, value, color, icon }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
          <div className="flex items-center justify-between">
            <div>
              <p className="text-sm font-medium text-gray-500">{title}</p>
              <p className={`text-3xl font-bold mt-1 ${color}`}>{value}</p>
            </div>
            <div className={`w-12 h-12 rounded-lg flex items-center justify-center ${color.replace('text-', 'bg-').replace('600', '100')}`}>
              {icon}
            </div>
          </div>
        </div>
      );
    }

    // ─── Dashboard Page ──────────────────────────────────────
    function DashboardPage() {
      const [stats, setStats] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        api.get('/api/stats').then(res => {
          if (res.success) setStats(res.data);
          setLoading(false);
        });
      }, []);

      if (loading) {
        return (
          <div className="flex items-center justify-center h-64">
            <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
          </div>
        );
      }

      if (!stats) return <p className="text-red-500">통계를 불러올 수 없습니다.</p>;

      return (
        <div>
          <h1 className="text-2xl font-bold text-gray-900 mb-6">대시보드</h1>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <StatCard
              title="총 상품수"
              value={stats.totalProducts}
              color="text-indigo-600"
              icon={<Icons.Products />}
            />
            <StatCard
              title="카테고리 수"
              value={stats.byCategory.length}
              color="text-emerald-600"
              icon={<Icons.Dashboard />}
            />
            <StatCard
              title="총 사용자수"
              value={stats.totalUsers}
              color="text-amber-600"
              icon={
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z" />
                </svg>
              }
            />
          </div>

          <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
            <h2 className="text-lg font-semibold text-gray-900 mb-4">카테고리별 상품 분포</h2>
            <div className="space-y-3">
              {stats.byCategory.map(cat => {
                const pct = stats.totalProducts > 0
                  ? Math.round((parseInt(cat.count) / stats.totalProducts) * 100)
                  : 0;
                return (
                  <div key={cat.category} className="flex items-center gap-4">
                    <span className="text-sm text-gray-600 w-28 shrink-0 truncate">{cat.category}</span>
                    <div className="flex-1 bg-gray-100 rounded-full h-3">
                      <div
                        className="bg-indigo-500 h-3 rounded-full transition-all"
                        style={{ width: `${pct}%` }}
                      ></div>
                    </div>
                    <span className="text-sm font-medium text-gray-700 w-16 text-right">
                      {cat.count}개 ({pct}%)
                    </span>
                  </div>
                );
              })}
              {stats.byCategory.length === 0 && (
                <p className="text-gray-400 text-sm">등록된 상품이 없습니다.</p>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ─── Product Modal ───────────────────────────────────────
    function ProductModal({ product, onClose, onSave }) {
      const [form, setForm] = useState({
        name: product?.name || '',
        price: product?.price || '',
        description: product?.description || '',
        category: product?.category || '',
        image_url: product?.image_url || '',
      });
      const [uploading, setUploading] = useState(false);
      const [preview, setPreview] = useState(product?.image_url || '');
      const [saving, setSaving] = useState(false);
      const [dragActive, setDragActive] = useState(false);
      const fileRef = useRef(null);

      const handleChange = (e) => {
        setForm(prev => ({ ...prev, [e.target.name]: e.target.value }));
      };

      const handleFile = async (file) => {
        if (!file || !file.type.startsWith('image/')) return;

        // Local preview
        const reader = new FileReader();
        reader.onload = (e) => setPreview(e.target.result);
        reader.readAsDataURL(file);

        // Upload to ImageKit
        setUploading(true);
        try {
          const res = await api.upload(file);
          if (res.success) {
            setForm(prev => ({ ...prev, image_url: res.data.url }));
            setPreview(res.data.url);
          } else {
            alert('이미지 업로드 실패: ' + res.message);
          }
        } catch {
          alert('이미지 업로드 중 오류가 발생했습니다.');
        }
        setUploading(false);
      };

      const handleDrop = useCallback((e) => {
        e.preventDefault();
        setDragActive(false);
        const file = e.dataTransfer.files[0];
        handleFile(file);
      }, []);

      const handleDragOver = useCallback((e) => {
        e.preventDefault();
        setDragActive(true);
      }, []);

      const handleDragLeave = useCallback(() => {
        setDragActive(false);
      }, []);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!form.name || !form.price || !form.category) {
          alert('상품명, 가격, 카테고리는 필수입니다.');
          return;
        }
        setSaving(true);
        await onSave(form);
        setSaving(false);
      };

      return (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
            <div className="flex items-center justify-between p-6 border-b border-gray-100">
              <h2 className="text-lg font-bold text-gray-900">
                {product ? '상품 수정' : '상품 등록'}
              </h2>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600">
                <Icons.Close />
              </button>
            </div>

            <form onSubmit={handleSubmit} className="p-6 space-y-4">
              {/* Image Upload */}
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">상품 이미지</label>
                <div
                  className={`border-2 border-dashed rounded-xl p-6 text-center cursor-pointer transition-colors ${
                    dragActive ? 'border-indigo-500 bg-indigo-50' : 'border-gray-300 hover:border-indigo-400'
                  }`}
                  onDrop={handleDrop}
                  onDragOver={handleDragOver}
                  onDragLeave={handleDragLeave}
                  onClick={() => fileRef.current?.click()}
                >
                  {uploading ? (
                    <div className="flex flex-col items-center gap-2">
                      <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
                      <p className="text-sm text-indigo-600">업로드 중...</p>
                    </div>
                  ) : preview ? (
                    <div className="flex flex-col items-center gap-2">
                      <img src={preview} alt="미리보기" className="w-32 h-32 object-cover rounded-lg" />
                      <p className="text-xs text-gray-400">클릭하거나 드래그하여 이미지 변경</p>
                    </div>
                  ) : (
                    <div className="flex flex-col items-center gap-2">
                      <Icons.Upload />
                      <p className="text-sm text-gray-500">이미지를 드래그하거나 클릭하여 업로드</p>
                      <p className="text-xs text-gray-400">JPG, PNG, WebP (최대 10MB)</p>
                    </div>
                  )}
                  <input
                    ref={fileRef}
                    type="file"
                    accept="image/*"
                    className="hidden"
                    onChange={(e) => handleFile(e.target.files[0])}
                  />
                </div>
              </div>

              {/* Name */}
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">상품명 *</label>
                <input
                  name="name"
                  value={form.name}
                  onChange={handleChange}
                  className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none"
                  placeholder="상품명을 입력하세요"
                  required
                />
              </div>

              {/* Price */}
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">가격 (원) *</label>
                <input
                  name="price"
                  type="number"
                  value={form.price}
                  onChange={handleChange}
                  className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none"
                  placeholder="가격을 입력하세요"
                  required
                />
              </div>

              {/* Category */}
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">카테고리 *</label>
                <input
                  name="category"
                  value={form.category}
                  onChange={handleChange}
                  className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none"
                  placeholder="예: 주방용품, 욕실용품, 수납정리"
                  required
                />
              </div>

              {/* Description */}
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">설명</label>
                <textarea
                  name="description"
                  value={form.description}
                  onChange={handleChange}
                  rows={3}
                  className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none resize-none"
                  placeholder="상품 설명을 입력하세요"
                />
              </div>

              {/* Buttons */}
              <div className="flex gap-3 pt-2">
                <button
                  type="button"
                  onClick={onClose}
                  className="flex-1 px-4 py-2.5 border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-50"
                >
                  취소
                </button>
                <button
                  type="submit"
                  disabled={saving || uploading}
                  className="flex-1 px-4 py-2.5 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 disabled:opacity-50"
                >
                  {saving ? '저장 중...' : product ? '수정' : '등록'}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // ─── Delete Confirm Modal ────────────────────────────────
    function DeleteModal({ product, onClose, onConfirm }) {
      const [deleting, setDeleting] = useState(false);

      const handleDelete = async () => {
        setDeleting(true);
        await onConfirm();
        setDeleting(false);
      };

      return (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-2xl w-full max-w-sm p-6">
            <h3 className="text-lg font-bold text-gray-900 mb-2">상품 삭제</h3>
            <p className="text-sm text-gray-600 mb-6">
              <span className="font-semibold text-gray-900">"{product.name}"</span>을(를) 정말 삭제하시겠습니까?
              <br />이 작업은 되돌릴 수 없습니다.
            </p>
            <div className="flex gap-3">
              <button
                onClick={onClose}
                className="flex-1 px-4 py-2.5 border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-50"
              >
                취소
              </button>
              <button
                onClick={handleDelete}
                disabled={deleting}
                className="flex-1 px-4 py-2.5 bg-red-600 text-white rounded-lg text-sm font-medium hover:bg-red-700 disabled:opacity-50"
              >
                {deleting ? '삭제 중...' : '삭제'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Products Page ───────────────────────────────────────
    function ProductsPage() {
      const [products, setProducts] = useState([]);
      const [loading, setLoading] = useState(true);
      const [modalProduct, setModalProduct] = useState(undefined); // undefined=closed, null=new, object=edit
      const [deleteTarget, setDeleteTarget] = useState(null);

      const fetchProducts = async () => {
        setLoading(true);
        const res = await api.get('/api/products');
        if (res.success) setProducts(res.data);
        setLoading(false);
      };

      useEffect(() => { fetchProducts(); }, []);

      const handleSave = async (form) => {
        if (modalProduct) {
          // Edit
          const res = await api.put(`/api/products/${modalProduct.id}`, form);
          if (res.success) {
            await fetchProducts();
            setModalProduct(undefined);
          } else {
            alert(res.message);
          }
        } else {
          // Create
          const res = await api.post('/api/products', form);
          if (res.success) {
            await fetchProducts();
            setModalProduct(undefined);
          } else {
            alert(res.message);
          }
        }
      };

      const handleDelete = async () => {
        const res = await api.del(`/api/products/${deleteTarget.id}`);
        if (res.success) {
          await fetchProducts();
          setDeleteTarget(null);
        } else {
          alert(res.message);
        }
      };

      const formatPrice = (price) => {
        return Number(price).toLocaleString('ko-KR') + '원';
      };

      return (
        <div>
          <div className="flex items-center justify-between mb-6">
            <h1 className="text-2xl font-bold text-gray-900">상품 관리</h1>
            <button
              onClick={() => setModalProduct(null)}
              className="px-4 py-2.5 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 flex items-center gap-2"
            >
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
              </svg>
              상품 등록
            </button>
          </div>

          {loading ? (
            <div className="flex items-center justify-center h-64">
              <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
            </div>
          ) : products.length === 0 ? (
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-12 text-center">
              <Icons.Products />
              <p className="text-gray-500 mt-2">등록된 상품이 없습니다.</p>
              <button
                onClick={() => setModalProduct(null)}
                className="mt-4 px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700"
              >
                첫 상품 등록하기
              </button>
            </div>
          ) : (
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead className="bg-gray-50 border-b border-gray-100">
                    <tr>
                      <th className="text-left text-xs font-semibold text-gray-500 uppercase tracking-wider px-6 py-3">상품</th>
                      <th className="text-left text-xs font-semibold text-gray-500 uppercase tracking-wider px-6 py-3">카테고리</th>
                      <th className="text-right text-xs font-semibold text-gray-500 uppercase tracking-wider px-6 py-3">가격</th>
                      <th className="text-center text-xs font-semibold text-gray-500 uppercase tracking-wider px-6 py-3">액션</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-50">
                    {products.map(product => (
                      <tr key={product.id} className="hover:bg-gray-50 transition-colors">
                        <td className="px-6 py-4">
                          <div className="flex items-center gap-3">
                            {product.image_url ? (
                              <img
                                src={product.image_url}
                                alt={product.name}
                                className="w-10 h-10 rounded-lg object-cover border border-gray-200"
                              />
                            ) : (
                              <div className="w-10 h-10 rounded-lg bg-gray-100 flex items-center justify-center">
                                <svg className="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                </svg>
                              </div>
                            )}
                            <div>
                              <p className="text-sm font-medium text-gray-900">{product.name}</p>
                              {product.description && (
                                <p className="text-xs text-gray-400 truncate max-w-[200px]">{product.description}</p>
                              )}
                            </div>
                          </div>
                        </td>
                        <td className="px-6 py-4">
                          <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-indigo-50 text-indigo-700">
                            {product.category}
                          </span>
                        </td>
                        <td className="px-6 py-4 text-right text-sm font-semibold text-gray-900">
                          {formatPrice(product.price)}
                        </td>
                        <td className="px-6 py-4">
                          <div className="flex items-center justify-center gap-2">
                            <button
                              onClick={() => setModalProduct(product)}
                              className="px-3 py-1.5 text-xs font-medium text-indigo-600 bg-indigo-50 rounded-lg hover:bg-indigo-100"
                            >
                              수정
                            </button>
                            <button
                              onClick={() => setDeleteTarget(product)}
                              className="px-3 py-1.5 text-xs font-medium text-red-600 bg-red-50 rounded-lg hover:bg-red-100"
                            >
                              삭제
                            </button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* Product Create/Edit Modal */}
          {modalProduct !== undefined && (
            <ProductModal
              product={modalProduct}
              onClose={() => setModalProduct(undefined)}
              onSave={handleSave}
            />
          )}

          {/* Delete Confirm Modal */}
          {deleteTarget && (
            <DeleteModal
              product={deleteTarget}
              onClose={() => setDeleteTarget(null)}
              onConfirm={handleDelete}
            />
          )}
        </div>
      );
    }

    // ─── App (Layout + Router) ───────────────────────────────
    function App() {
      const [page, setPage] = useState('dashboard');
      const [sidebarOpen, setSidebarOpen] = useState(false);

      const navItems = [
        { key: 'dashboard', label: '대시보드', Icon: Icons.Dashboard },
        { key: 'products', label: '상품 관리', Icon: Icons.Products },
      ];

      return (
        <div className="flex h-screen bg-gray-50">
          {/* Mobile overlay */}
          {sidebarOpen && (
            <div
              className="fixed inset-0 bg-black/40 z-30 lg:hidden"
              onClick={() => setSidebarOpen(false)}
            />
          )}

          {/* Sidebar */}
          <aside className={`
            fixed lg:static inset-y-0 left-0 z-40
            w-64 bg-sidebar text-white flex flex-col
            transform transition-transform lg:translate-x-0
            ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'}
          `}>
            <div className="p-6 border-b border-white/10">
              <h1 className="text-xl font-bold">자취용품 쇼핑몰</h1>
              <p className="text-indigo-300 text-xs mt-1">관리자 패널</p>
            </div>

            <nav className="flex-1 p-4 space-y-1">
              {navItems.map(({ key, label, Icon }) => (
                <button
                  key={key}
                  onClick={() => { setPage(key); setSidebarOpen(false); }}
                  className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-colors ${
                    page === key
                      ? 'bg-indigo-600 text-white'
                      : 'text-indigo-200 hover:bg-sidebar-hover hover:text-white'
                  }`}
                >
                  <Icon />
                  {label}
                </button>
              ))}
            </nav>

            <div className="p-4 border-t border-white/10">
              <a
                href="/shop"
                className="w-full flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-medium text-indigo-200 hover:bg-sidebar-hover hover:text-white transition-colors"
              >
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z" />
                </svg>
                쇼핑몰 보기
              </a>
            </div>
          </aside>

          {/* Main Content */}
          <div className="flex-1 flex flex-col min-w-0">
            {/* Top Bar */}
            <header className="bg-white border-b border-gray-200 px-6 py-4 flex items-center gap-4">
              <button
                className="lg:hidden text-gray-600 hover:text-gray-900"
                onClick={() => setSidebarOpen(true)}
              >
                <Icons.Menu />
              </button>
              <h2 className="text-lg font-semibold text-gray-800">
                {navItems.find(n => n.key === page)?.label}
              </h2>
            </header>

            {/* Page Content */}
            <main className="flex-1 overflow-y-auto p-6">
              {page === 'dashboard' && <DashboardPage />}
              {page === 'products' && <ProductsPage />}
            </main>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
