      from {

        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes doorOpen {

      100% { transform: perspective(600px) rotateY(-75deg); transform-origin: left center; }

    .door-opening { animation: doorOpen 0.7s ease-in-out forwards; transform-origin: left center; }

    @keyframes checkinSlideIn {
      from { opacity: 0; transform: translateY(12px); }

      to { opacity: 1; transform: translateX(0); }

    @keyframes roomPulse {

      50% { box-shadow: 0 0 20px #D4B36A80, 0 0 40px #D4B36A40; }
    }
    .room-pulse { animation: roomPulse 2s ease-in-out infinite; }

    /* Dot pulse */
    @keyframes dotPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    .dot-pulse { animation: dotPulse 1.5s ease-in-out infinite; }

    /* Modal */
    @keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes modalSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }

    .modal-overlay { animation: modalFadeIn 0.25s ease-out forwards; }
    .modal-content { animation: modalSlideUp 0.3s ease-out forwards; }

    .pill-tap { transition: transform 0.15s ease; }
    .pill-tap:active { transform: scale(0.95); }

    /* Door hover glow */
    .door-hover { transition: all 0.3s ease; }
    .door-hover:hover { box-shadow: 0 0 12px rgba(31, 58, 96, 0.2); }

    .window-overlay { transition: all 0.2s ease; cursor: pointer; }
    .window-overlay:hover { outline: 2px solid rgba(31, 58, 96, 0.35); outline-offset: -1px; }

    .timer-ring-bg { fill: none; stroke: rgba(31, 58, 96, 0.15); stroke-width: 4; }

    ::-webkit-scrollbar-thumb { background: rgba(31, 58, 96, 0.2); border-radius: 2px; }

    .door-shade { transition: background-color 0.5s ease, box-shadow 0.5s ease; }

    /* Door knock shake */
    @keyframes doorShake {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(-3px) rotate(-1deg); }
      30% { transform: translateX(3px) rotate(1deg); }
      45% { transform: translateX(-2px); }
      60% { transform: translateX(2px); }
      75% { transform: translateX(-1px); }
    }
    .door-shake { animation: doorShake 0.3s ease-out; }

    @keyframes hintFadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    }

    .hint-out { animation: hintFadeOut 0.5s ease-out forwards; }
  </style>
</head>

    // 감정/공간 → 추천 방 매핑
    // ========================================
    // 방 추천 알고리즘 (점수 기반)
    // ========================================

    // 축별 점수: 높을수록 해당 축이 강한 시그널
    const MOOD_SCORES = {
      // 무거운 감정 → 1F 강한 시그널
      anxious: 3, irritated: 3, lonely: 3, lethargic: 3, shrunk: 3,
      // 가벼운 감정 → 약한 시그널 (시간/공간에 양보)
      calm: 1, joy: 1, grateful: 1, excited: 1, warm: 1,
    };
    const SPACE_SCORES = {
      // 특수 공간 → 2F 강한 시그널
      moving: 3, cafe: 2, office: 2,
      // 일반 공간 → 약한 시그널
      outside: 1, home: 1,
    };

    function getTimeBand(now) {
      const h = (now || new Date()).getHours();
      if (h >= 0 && h < 6) return 'dawn';       // 새벽
      if (h >= 6 && h < 9) return 'morning';     // 아침
      if (h >= 9 && h < 12) return 'midday';     // 오전
      if (h >= 12 && h < 14) return 'afternoon'; // 점심 후
      if (h >= 14 && h < 18) return 'late_afternoon'; // 오후
      if (h >= 18 && h < 21) return 'evening';   // 저녁
      return 'night';                             // 밤
    }

    const TIME_SCORES = {
      dawn: 3, night: 3, morning: 2, evening: 2,
      midday: 1, afternoon: 1, late_afternoon: 1,
    };

    // 감정 → 1F 방 매핑
    const MOOD_ROOM_MAP = {
      anxious: 102, irritated: 103, lonely: 105, lethargic: 104, shrunk: 101,
      // 가벼운 감정이 1F로 올 경우 fallback
      calm: 107, joy: 101, grateful: 105, excited: 101, warm: 106,
    };
    // 공간 → 2F 방 매핑
    const SPACE_ROOM_MAP = {
      moving: 201, cafe: 202, office: 203, outside: 204, home: 205,
    };
    // 시간대 → 3F 방 매핑
    const TIME_ROOM_MAP = {
      dawn: 301, night: 303, morning: 307, evening: 304,
      midday: 306, afternoon: 306, late_afternoon: 305,
    };
    // 요일 보정: 월요일 아침 → 307
    function getTimeRoomWithDay(timeBand, now) {
      const day = (now || new Date()).getDay(); // 0=일, 1=월
      if (day === 1 && (timeBand === 'morning' || timeBand === 'midday')) return 307;
      return TIME_ROOM_MAP[timeBand] || 305;
    }

    function recommendFloor(placeKey, emotionKey) {
      const now = new Date();
      const timeBand = getTimeBand(now);
      const moodScore = MOOD_SCORES[emotionKey] || 1;
      const spaceScore = SPACE_SCORES[placeKey] || 1;
      const timeScore = TIME_SCORES[timeBand] || 1;

      // 최고 점수 축 결정 (동점 시 감정 > 시간 > 공간)
      const scores = [
        { axis: 'mood', score: moodScore, priority: 3 },
        { axis: 'time', score: timeScore, priority: 2 },
        { axis: 'space', score: spaceScore, priority: 1 },
      ];
      scores.sort((a, b) => b.score - a.score || b.priority - a.priority);
      const winner = scores[0].axis;

      if (winner === 'mood') return '1F';
      if (winner === 'space') return '2F';
      return '3F';
    }

    function recommendRoom(placeKey, emotionKey, floor) {
      const now = new Date();
      const timeBand = getTimeBand(now);
      if (floor === '1F') return MOOD_ROOM_MAP[emotionKey] || 102;
      if (floor === '2F') return SPACE_ROOM_MAP[placeKey] || 201;
      if (floor === '3F') return getTimeRoomWithDay(timeBand, now);
      return 101;
    }

    function getVisitOpacity(count) {
      if (count <= 0) return 0;
      if (count === 1) return 0.30;
      if (count <= 3) return 0.55;
      if (count <= 6) return 0.75;
      return 1.0;
    }

    // ========================================
    // Utility Functions
    // ========================================

    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}.${m}.${d}`;
    }

    function getDateGroupLabel(date) {
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const target = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      const diff = Math.floor((today - target) / (1000 * 60 * 60 * 24));
      if (diff === 0) return '오늘';
      if (diff === 1) return '어제';
      if (diff <= 6) return '이번 주';
      return '이전';
    }

    function groupRecordsByDate(records) {
      const groups = { '오늘': [], '어제': [], '이번 주': [], '이전': [] };
      const sorted = [...records].sort((a, b) => b.createdAt - a.createdAt);
      sorted.forEach(r => {
        const label = getDateGroupLabel(r.createdAt);
        groups[label].push(r);
      });
      return groups;
    }

    function getTodayFormatted() {
      const now = new Date();
      const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
      const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      return `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
    }

    function getEmotionLabel(key) {
      const e = EMOTIONS.find(em => em.key === key);
      return e ? e.label : key;
    }

    function getPlaceLabel(key) {
      const p = PLACES.find(pl => pl.key === key);
      return p ? p.label : key;
    }

    function extractFrequentWords(records) {
      const stopWords = new Set(['나', '내', '는', '은', '이', '가', '을', '를', '의', '에', '에서', '도', '만', '좀', '와', '과', '한', '그', '것', '수', '안', '못', '더', '다', '로', '으로', '하고', '있는', '없는', '하는', '되는', '했다', '있다', '없다', '같다', '되다', '너무', '진짜', '정말', '되게', '약간', '그냥', '좀', '다시']);
      const wordCount = {};
      records.forEach(r => {
        const words = r.text.replace(/[.,!?~\-()'"]/g, ' ').split(/\s+/).filter(w => w.length >= 2);
        words.forEach(w => {
          if (!stopWords.has(w)) wordCount[w] = (wordCount[w] || 0) + 1;
        });
      });
      return Object.entries(wordCount).sort((a, b) => b[1] - a[1]).slice(0, 8).map(([word, count]) => ({ word, count }));
    }

    function getEmotionStats(records) {
      const counts = {};
      records.forEach(r => { counts[r.emotion] = (counts[r.emotion] || 0) + 1; });
      return Object.entries(counts).sort((a, b) => b[1] - a[1]).map(([key, count]) => ({ key, label: getEmotionLabel(key), count }));
    }

    function generateCalendarData(records) {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const recordMap = {};
      records.forEach(r => {
        const key = `${r.createdAt.getDate()}`;
        if (!recordMap[key]) recordMap[key] = [];
        if (r.createdAt.getMonth() === month && r.createdAt.getFullYear() === year) {
          recordMap[key].push(r.emotion);
        }
      });
      const days = [];
      for (let i = 0; i < firstDay; i++) days.push({ day: null, emotions: [] });
      for (let d = 1; d <= daysInMonth; d++) days.push({ day: d, emotions: recordMap[String(d)] || [] });
      return { year, month, days };
    }

    // Room assignment logic
    function assignRoom(placeKey, emotionKey) {
      // Emotion-based: floor 1, Space-based: floor 2, otherwise floor 3
      const negativeEmotions = ['anxious', 'tense', 'lethargic', 'irritated', 'confused', 'lonely', 'fear'];
      if (negativeEmotions.includes(emotionKey)) {
        const rooms = [101, 102, 103, 104];
        return rooms[Math.floor(Math.random() * rooms.length)];
      }
      if (['cafe', 'office', 'outside'].includes(placeKey)) {
        const rooms = [201, 202, 203, 204, 205];
        return rooms[Math.floor(Math.random() * rooms.length)];
      }
      const rooms = [301, 302, 303, 304, 305];
      return rooms[Math.floor(Math.random() * rooms.length)];
    }

      localStorage.setItem('nh_guest_' + key, JSON.stringify(val));

          })
          .catch(() => {}); // fallback: 하드코딩 ROOM_DATA 사용
      }, []);

      const [screen, setScreen] = useState('building');

      const [records, setRecords] = useState(loadGuest('records', []));

      const [checkinData, setCheckinData] = useState({ place: null, emotion: null });
      const [assignedRoom, setAssignedRoom] = useState(null);
      const [assignedMethod, setAssignedMethod] = useState(null);
      const [pendingRecord, setPendingRecord] = useState(null);
      const [roomVisits, setRoomVisits] = useState(loadGuest('roomVisits', {}));
      const [roomNotes, setRoomNotes] = useState(loadGuest('roomNotes', {}));
      const [lastVisitDates, setLastVisitDates] = useState(() => {
        const raw = loadGuest('lastVisitDates', {});
        const parsed = {};
        for (const [k, v] of Object.entries(raw)) parsed[k] = new Date(v);
        return parsed;
      });
      const [authToken, setAuthToken] = useState(localStorage.getItem('nh_token') || null);
      const [authError, setAuthError] = useState('');
      const [notingCount, setNotingCount] = useState(loadGuest('notingCount', 0));

      useEffect(() => { saveGuest('records', records); }, [records]);

      // 로그인 상태면 서버에서 기록 로드
      useEffect(() => {
        if (!authToken) return;
        fetch('/api/rituals', { headers: { 'Authorization': `Bearer ${authToken}` } })
          .then(r => r.json())
          .then(data => {
            if (data.success && data.data.length > 0) {
              const serverRecords = data.data.map(r => ({
                id: String(r.id),
                roomId: r.room_id,
                emotion: r.emotion,
                place: r.place,
                time: r.time_minutes,
                method: r.noting_method,
                text: r.noting_text,
                createdAt: new Date(r.created_at),
              }));
              setRecords(serverRecords);
            }
          })
          .catch(() => {
            localStorage.removeItem('nh_token');
            setAuthToken(null);
          });
      }, [authToken]);

      const addRecord = useCallback((record) => {
        setRecords(prev => [record, ...prev]);
      }, []);

      const addCustomEmotion = useCallback((label) => {
        const key = 'custom_' + Date.now();
        setEmotions(prev => [...prev, { key, label }]);
        return key;
      }, []);

      const [recommendedFloor, setRecommendedFloor] = useState('1F');
      const [currentFloor, setCurrentFloor] = useState('1F');

      const completeNoting = useCallback((roomId) => {
        if (!authToken) return; // 게스트는 기록 쌓지 않음
        setRoomVisits(prev => ({ ...prev, [roomId]: (prev[roomId] || 0) + 1 }));
        setLastVisitDates(prev => ({ ...prev, [roomId]: new Date() }));
        setNotingCount(prev => prev + 1);
      }, [authToken]);

      const addRoomNote = useCallback((roomId, content) => {
        const note = { date: new Date().toISOString().split('T')[0], content };
        setRoomNotes(prev => ({
          ...prev,
          [roomId]: [note, ...(prev[roomId] || [])],
        }));
      }, []);

      const deleteRecord = useCallback((recordId) => {
        setRecords(prev => prev.filter(r => r.id !== recordId));
      }, []);

      const deleteRoomNote = useCallback((roomId, noteIndex) => {
        setRoomNotes(prev => ({
          ...prev,
          [roomId]: (prev[roomId] || []).filter((_, i) => i !== noteIndex),
        }));
      }, []);

      const [skippedRooms, setSkippedRooms] = useState([]);

      const startNoting = useCallback(() => {
        const { place, emotion } = checkinData;
        const floor = recommendFloor(place, emotion);
        setRecommendedFloor(floor);
        setCurrentFloor(floor);
        setSkippedRooms([]);
        const roomId = recommendRoom(place, emotion, floor);
        const room = roomData[roomId] || ROOM_DATA[roomId];
        setAssignedRoom(room);
        setAssignedMethod(getRoomMethod(room));
        setScreen('room-assign');
      }, [checkinData, roomData]);

      const rerollRoom = useCallback(() => {
        const floor = recommendedFloor;
        const currentRooms = floorRooms[floor] || FLOOR_ROOMS[floor] || [];
        const newSkipped = [...skippedRooms, assignedRoom?.id];
        const candidates = currentRooms.filter(r => !newSkipped.includes(r.id));
        if (candidates.length === 0) {
          // 모든 방을 건너뛰면 처음부터
          setSkippedRooms([]);
          const room = currentRooms[Math.floor(Math.random() * currentRooms.length)];
          setAssignedRoom(room);
          setAssignedMethod(getRoomMethod(room));
        } else {
          setSkippedRooms(newSkipped);
          const room = candidates[Math.floor(Math.random() * candidates.length)];
          setAssignedRoom(room);
          setAssignedMethod(getRoomMethod(room));
        }
      }, [recommendedFloor, floorRooms, skippedRooms, assignedRoom]);

      const value = useMemo(() => ({
        screen, setScreen,
        activeTab, setActiveTab,
        records, addRecord,
        roomData, floorRooms,
        emotions, addCustomEmotion,
        checkinData, setCheckinData,
        assignedRoom, setAssignedRoom, assignedMethod,
        startNoting, rerollRoom,
        recommendedFloor, currentFloor, setCurrentFloor,
        roomVisits, completeNoting, roomNotes, addRoomNote, deleteRoomNote, lastVisitDates,
        deleteRecord,
        pendingRecord, setPendingRecord,
        authToken, setAuthToken, authError, setAuthError,
        notingCount, setNotingCount, residentNumber, setResidentNumber, isResident,
      }), [screen, activeTab, records, emotions, checkinData, assignedRoom, assignedMethod, startNoting, addRecord, addCustomEmotion, pendingRecord, authToken, authError, recommendedFloor, currentFloor, roomVisits, completeNoting, roomNotes, addRoomNote, lastVisitDates, notingCount, residentNumber, isResident]);

      return <AppContext.Provider value={value}>{children}</AppContext.Provider>;
    }

    function useApp() { return useContext(AppContext); }

    function NavyButton({ children, onClick, disabled, variant = 'primary', className = '' }) {
      const base = 'rounded-lg text-sm font-medium transition-all duration-200 active:scale-[0.98]';
      const variants = {
        primary: `py-3 px-6 ${disabled ? 'opacity-30 cursor-not-allowed' : ''}`,
        ghost: 'py-2.5 px-4',
      };
      const styles = {
        primary: { backgroundColor: disabled ? COLORS.navy : COLORS.navy, color: COLORS.cream },
        ghost: { color: COLORS.textLight },
      };
      return (
        <button onClick={disabled ? undefined : onClick} className={`${base} ${variants[variant]} ${className}`} style={styles[variant]} disabled={disabled}>
          {children}
        </button>
      );
    }

    function ChoicePill({ label, selected, onClick }) {
      return (
        <button

          className="px-4 py-2 rounded-full text-sm transition-all duration-200 border pill-tap"

    function BuildingScreen() {
      const { setScreen, setActiveTab } = useApp();
      const [opening, setOpening] = useState(false);
      const [knockCount, setKnockCount] = useState(0);
      const [shaking, setShaking] = useState(false);
      const [hint, setHint] = useState('none'); // none | show | hiding
      const timerRef = useRef(null);
      const firstVisit = !localStorage.getItem('nh_first_visit_completed');

      const handleEntranceClick = () => {
        if (opening) return;

        if (knockCount === 0) {
          // 첫 번째 탭 — shake
          setKnockCount(1);
          setShaking(true);
          setTimeout(() => setShaking(false), 300);
          setHint('show');

          // 1.5초 타이머
          timerRef.current = setTimeout(() => {
            setKnockCount(0);
            setHint('hiding');
            setTimeout(() => setHint('none'), 500);
          }, 1500);
        } else if (knockCount === 1) {
          // 두 번째 탭 — 문 열림
          clearTimeout(timerRef.current);
          setKnockCount(0);
          setHint('none');
          setOpening(true);
          localStorage.setItem('nh_first_visit_completed', 'true');
          setTimeout(() => {
            setScreen('checkin');
            setActiveTab('noting');
          }, 700);
        }
      };

      useEffect(() => {
        return () => clearTimeout(timerRef.current);
      }, []);

      return (
        <div className={`min-h-screen pb-20 flex flex-col ${opening ? 'screen-fade-out' : ''}`} style={{ backgroundColor: COLORS.bg }}>
          <div className="flex-1 flex flex-col items-center justify-center px-4 pt-4">

              {firstVisit ? '문을 두 번 두드려 보세요' : '문을 두드려 보세요'}

            {hint !== 'none' && (

    // ========================================
    // Screen: Corridor (복도)
    // ========================================

    function CorridorScreen() {
      const { currentFloor, setScreen, assignedRoom, roomVisits, floorRooms } = useApp();
      const rooms = floorRooms[currentFloor] || [];
      const floorLabels = { '1F': '감정 층', '2F': '공간 층', '3F': '시간 층' };
      const scrollRef = useRef(null);

      // 추천 방으로 자동 스크롤
      useEffect(() => {
        if (!assignedRoom || !scrollRef.current) return;
        const idx = rooms.findIndex(r => r.id === assignedRoom.id);
        if (idx >= 0) {
          setTimeout(() => {
            const el = scrollRef.current.children[idx];
            if (el) el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
          }, 400);
        }
      }, [assignedRoom, rooms]);

      const [openingDoor, setOpeningDoor] = useState(null);
      const anyVisited = Object.values(roomVisits).some(v => v > 0);

      const handleRoomClick = (room) => {
        if (assignedRoom && room.id === assignedRoom.id) {
          setOpeningDoor(room.id);
          setTimeout(() => setScreen('noting'), 500);
        }
      };

      return (
        <div className="min-h-screen flex flex-col screen-slide-in" style={{ backgroundColor: COLORS.bg }}>
          <div className="px-6 pt-10 pb-2">
            <div className="flex items-center gap-3 mb-1">
              <button onClick={() => setScreen('elevator')} className="p-1" style={{ color: COLORS.navy }}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
                  <polyline points="15 18 9 12 15 6" />
                </svg>
              </button>
              <h1 className="font-playfair text-2xl font-semibold" style={{ color: COLORS.navy }}>
                {currentFloor}
              </h1>
              <span className="text-sm" style={{ color: COLORS.textLight }}>{floorLabels[currentFloor]}</span>
            </div>
            <p className="text-xs mt-1 ml-8 fade-in fade-in-d1" style={{ color: COLORS.textLight }}>
              복도를 천천히 둘러보세요
            </p>
          </div>

          <div className="flex-1 flex items-center">
            <div
              ref={scrollRef}
              className="flex gap-6 px-8 overflow-x-auto pb-8"
              style={{ scrollSnapType: 'x proximity', WebkitOverflowScrolling: 'touch', scrollBehavior: 'smooth' }}
            >
              {rooms.map((room, i) => {
                const isAssigned = assignedRoom && room.id === assignedRoom.id;
                const visits = roomVisits[room.id] || 0;
                const isVisited = visits > 0;

                const doorStyle = {
                  borderColor: '#B5C0D0',
                  backgroundColor: isVisited ? 'rgba(31, 58, 96, 0.06)' : 'transparent',
                  boxShadow: isAssigned ? `0 0 16px ${COLORS.gold}AA, 0 0 32px ${COLORS.gold}60` : 'none',
                  transition: 'all 0.5s ease',
                };

                return (
                  <div
                    key={room.id}
                    className={`flex-shrink-0 fade-in ${isAssigned ? 'cursor-pointer' : ''}`}
                    style={{
                      animationDelay: `${i * 0.08}s`,
                      scrollSnapAlign: 'center',
                    }}
                    onClick={() => handleRoomClick(room)}
                  >
                    <div
                      className={`w-28 h-44 rounded-t-xl border-2 flex items-center justify-center ${isAssigned ? 'room-pulse' : ''} ${openingDoor === room.id ? 'door-opening' : ''}`}
                      style={doorStyle}
                    >
                      <span className="font-playfair text-2xl font-bold" style={{ color: isAssigned ? '#1F3A60' : '#B5C0D0' }}>
                        {room.id}
                      </span>
                    </div>
                    {isVisited ? (

    // ========================================
    // Screen 6: Noting (Timer)
    // ========================================

    function NotingScreen() {
      const { assignedRoom, setScreen } = useApp();
      const [currentStep, setCurrentStep] = useState(0);
      const steps = assignedRoom?.steps || [];
      const step = steps[currentStep];
      const isLastStep = currentStep === steps.length - 1;

      const handleNext = () => {
        if (isLastStep) {
          setScreen('writing');
        } else {
          setCurrentStep(prev => prev + 1);
        }
      };

      if (!step) return null;

      return (
        <div className="min-h-screen pb-24 px-6 flex flex-col items-center justify-center" style={{ backgroundColor: COLORS.bg }}>
          <div className="max-w-md w-full">
            {/* Room info */}
            <div className="text-center mb-2 fade-in">
              <p className="text-xs tracking-wider" style={{ color: COLORS.textLight }}>
                {assignedRoom.id}호 · {assignedRoom.title}
              </p>
            </div>

            {/* Step indicator */}
            <div className="flex justify-center gap-2 mb-10 fade-in">
              {steps.map((_, i) => (
                <div key={i} className="h-1 rounded-full transition-all duration-500"
                  style={{
                    width: i === currentStep ? 24 : 8,
                    backgroundColor: i <= currentStep ? COLORS.navy : 'rgba(31,58,96,0.15)',
                  }} />
              ))}
            </div>

            {/* Step content */}
            <div className="text-center fade-in" key={currentStep}>
              <p className="text-[11px] uppercase tracking-[0.2em] mb-4" style={{ color: COLORS.textLight }}>
                Step {currentStep + 1}
              </p>
              <h2 className="font-playfair text-xl font-semibold mb-6" style={{ color: COLORS.navy }}>
                {step.name}
              </h2>
              <p className="text-sm leading-relaxed mb-12 px-2" style={{ color: COLORS.textLight }}>
                {step.guide}
              </p>
            </div>

            {/* Back + Next */}
            <div className="fade-in fade-in-d1 flex gap-3">
              {currentStep > 0 && (
                <button onClick={() => setCurrentStep(prev => prev - 1)}
                  className="py-3 px-4 rounded-lg border"
                  style={{ borderColor: COLORS.navy, color: COLORS.navy }}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
                    <polyline points="15 18 9 12 15 6" />
                  </svg>
                </button>
              )}
              <NavyButton onClick={handleNext} className="flex-1">
                {isLastStep ? '한 문장 적으러 가기' : '다음'}
              </NavyButton>
            </div>
          </div>
        </div>
      );
    }


    // ========================================
    // Screen 7: Writing (One sentence)
    // ========================================

    function WritingScreen() {
      const { setScreen, assignedRoom, assignedMethod, checkinData, setPendingRecord, addRecord, authToken } = useApp();
      const [text, setText] = useState('');
      const maxLen = 100;

      const handleSubmit = async () => {
        if (!text.trim()) return;
        const record = {
          id: String(Date.now()),
          roomId: assignedRoom?.id || 101,
          emotion: checkinData.emotion,
          place: checkinData.place,
          method: assignedMethod?.name || '',
          text: text.trim(),
          createdAt: new Date(),
        };

        if (authToken) {
          // 명패 보유자 → 로컬 + 서버 저장
          addRecord(record);
          try {
            await fetch('/api/rituals', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
              body: JSON.stringify({
                room_id: record.roomId, emotion: record.emotion, place: record.place,
                time_minutes: 0, noting_method: record.method, noting_text: record.text,
              }),
            });
          } catch (e) { console.error('Failed to save:', e); }
          setScreen('checkout');
        } else {
          // 게스트 → 저장 안 함, 명패 유도
          setPendingRecord(record);
          setScreen('checkout');
        }
      };

      return (
        <div className="min-h-screen pb-24 px-6 pt-16 flex flex-col items-center justify-center" style={{ backgroundColor: COLORS.bg }}>
          <div className="max-w-md w-full">
            <div className="fade-in text-center mb-10">

            <div className="fade-in fade-in-d1 mb-6">

                value={text}
                onChange={e => setText(e.target.value.slice(0, maxLen))}

                  {text.length}/{maxLen}

                기록하기

            </div>
          </div>
        </div>
      );
    }


    // ========================================
    // Screen: Signup (after first ritual)
    // ========================================

    function SignupScreen() {
      const { setScreen, setActiveTab, setCheckinData, addRecord, pendingRecord, setPendingRecord, setAuthToken, authError, setAuthError, setResidentNumber } = useApp();
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);
      const [isLogin, setIsLogin] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!email || !password) { setAuthError('이메일과 비밀번호를 입력해주세요'); return; }
        setLoading(true);
        setAuthError('');

        const endpoint = isLogin ? '/api/login' : '/api/signup';
        try {
          const res = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json();
          if (!data.success) { setAuthError(data.message); setLoading(false); return; }

          const token = data.data.token;
          const rn = data.data.user.id;
          localStorage.setItem('nh_token', token);
          setAuthToken(token);
          setResidentNumber(rn);
          saveGuest('residentNumber', rn);

          // 게스트 데이터 서버로 마이그레이션
          if (pendingRecord) {
            addRecord(pendingRecord);
            try {
              await fetch('/api/rituals', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({
                  room_id: pendingRecord.roomId, emotion: pendingRecord.emotion,
                  place: pendingRecord.place, time_minutes: pendingRecord.time,
                  noting_method: pendingRecord.method, noting_text: pendingRecord.text,
                }),
              });
            } catch (e) { console.error('Migration failed:', e); }
            setPendingRecord(null);
          }
          setScreen(isLogin ? 'checkout' : 'welcome');
        } catch (err) {
          setAuthError('서버 연결에 실패했습니다');
        }
        setLoading(false);
      };

      const handleSkip = () => {
        // 게스트 모드: 로컬에만 저장하고 체크아웃
        if (pendingRecord) {
          addRecord(pendingRecord);
          setPendingRecord(null);
        }
        setScreen('checkout');
      };

      return (
        <div className="min-h-screen flex flex-col items-center justify-center px-6" style={{ backgroundColor: COLORS.bg }}>
          <div className="w-full max-w-sm">
            <div className="text-center mb-3 fade-in">
              <h1 className="font-playfair text-xl font-semibold" style={{ color: COLORS.navy }}>
                노팅힐 명패 받기
              </h1>
            </div>
            <div className="text-center mb-10 fade-in fade-in-d1">
              <p className="text-sm leading-relaxed" style={{ color: COLORS.textLight }}>
                명패를 받으시면 다녀간 방들의 기록이<br/>영구히 보관됩니다.
              </p>
            </div>

            <form onSubmit={handleSubmit} className="space-y-4 fade-in fade-in-d2">
              <input
                type="email"
                value={email}
                onChange={e => setEmail(e.target.value)}
                placeholder="이메일"
                className="w-full border rounded-lg px-4 py-3 text-sm"
                style={{ backgroundColor: COLORS.bg, borderColor: COLORS.navy, color: COLORS.navy }}
              />
              <input
                type="password"
                value={password}
                onChange={e => setPassword(e.target.value)}
                placeholder="비밀번호 (4자 이상)"
                className="w-full border rounded-lg px-4 py-3 text-sm"
                style={{ backgroundColor: COLORS.bg, borderColor: COLORS.navy, color: COLORS.navy }}
              />
              {authError && (
                <p className="text-xs text-center" style={{ color: '#c44' }}>{authError}</p>
              )}
              <NavyButton onClick={handleSubmit} disabled={loading} className="w-full">
                {loading ? '처리 중...' : (isLogin ? '로그인' : '명패 받기')}
              </NavyButton>
            </form>

            <button
              onClick={() => { setIsLogin(!isLogin); setAuthError(''); }}
              className="w-full py-2 mt-2 text-xs fade-in fade-in-d3"
              style={{ color: COLORS.navy }}
            >
              {isLogin ? '처음이신가요? 명패 받기' : '이미 명패가 있으신가요? 로그인'}
            </button>

            <button
              onClick={handleSkip}
              className="w-full py-3 mt-2 rounded-lg text-sm fade-in fade-in-d3"
              style={{ color: COLORS.textLight }}
            >
              다음에 할게요
            </button>
          </div>
        </div>
      );
    }

    // ========================================

    function RecordsTab() {
      const { roomVisits, lastVisitDates, setScreen, setAssignedRoom, isResident, residentNumber, roomData } = useApp();
      const [floorFilter, setFloorFilter] = useState('all');
      const [sortBy, setSortBy] = useState('recent');

      if (!isResident) {
        return (
          <div className="min-h-screen pb-24 flex flex-col items-center justify-center px-6" style={{ backgroundColor: COLORS.bg }}>
            <h2 className="font-playfair text-xl font-semibold mb-3" style={{ color: COLORS.navy }}>내가 머문 방들</h2>
            <p className="text-sm mb-8 text-center" style={{ color: COLORS.textLight }}>
              명패를 받으시면 다녀간 방들의<br/>기록이 이곳에 쌓입니다
            </p>
            <NavyButton onClick={() => setScreen('signup')} className="px-8">
              명패 받기
            </NavyButton>
          </div>
        );
      }

      const visitedRooms = useMemo(() => {
        let list = Object.entries(roomVisits)
          .filter(([_, count]) => count > 0)
          .map(([id, count]) => ({
            ...(roomData[id] || ROOM_DATA[id]),
            visits: count,
            lastVisit: lastVisitDates[id] || new Date(),
          }))
          .filter(r => r.id);

        if (floorFilter !== 'all') list = list.filter(r => r.floor === floorFilter);
        if (sortBy === 'recent') list.sort((a, b) => b.lastVisit - a.lastVisit);
        else list.sort((a, b) => b.visits - a.visits);
        return list;
      }, [roomVisits, lastVisitDates, floorFilter, sortBy]);

      const daysAgo = (date) => {
        const diff = Math.floor((Date.now() - new Date(date).getTime()) / 86400000);
        if (diff === 0) return '오늘';
        if (diff === 1) return '어제';
        return `${diff}일 전`;
      };

      const handleRoomClick = (room) => {
        setAssignedRoom(room);
        setScreen('room-note');
      };

      return (
        <div className="min-h-screen pb-24 px-6 pt-10" style={{ backgroundColor: COLORS.bg }}>
          <div className="max-w-md mx-auto">
            <div className="flex items-start justify-between mb-2 fade-in">
              <h1 className="font-playfair text-2xl font-semibold" style={{ color: COLORS.navy }}>
                내가 머문 방들

              {isResident ? (
                <button onClick={() => setScreen('profile')}
                  style={{ backgroundColor: COLORS.gold, borderRadius: 4, padding: '2px 8px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <span className="text-[8px] font-bold" style={{ color: '#3a2f1e' }}>#{residentNumber}</span>
                </button>
              ) : (
                <button onClick={() => setScreen('signup')}
                  className="text-[11px]" style={{ color: COLORS.textLight }}>
                  🔑 명패 받기
                </button>
              )}
            </div>
            <p className="text-sm mb-6 fade-in fade-in-d1" style={{ color: COLORS.textLight }}>
              지금까지 {visitedRooms.length}개의 방을 다녀오셨어요
            </p>

            {/* Filters */}
            <div className="flex gap-2 mb-4 fade-in fade-in-d1">
              {['all', '1F', '2F', '3F'].map(f => (
                <button key={f} onClick={() => setFloorFilter(f)}
                  className="px-3 py-1.5 rounded-full text-xs border transition"
                  style={{
                    backgroundColor: floorFilter === f ? COLORS.navy : 'transparent',
                    color: floorFilter === f ? COLORS.bg : COLORS.navy,
                    borderColor: COLORS.navy,
                  }}>
                  {f === 'all' ? '전체' : f}
                </button>
              ))}
              <button onClick={() => setSortBy(s => s === 'recent' ? 'frequent' : 'recent')}
                className="ml-auto text-[10px] px-2 py-1 rounded"
                style={{ color: COLORS.textLight }}>
                {sortBy === 'recent' ? '최근순' : '자주 간 순'}
              </button>
            </div>

            {/* Visited rooms */}
            {visitedRooms.length > 0 ? (
              <div className="space-y-3">
                {visitedRooms.map((room, i) => {
                  const fillOpacity = getVisitOpacity(room.visits);
                  return (
                    <div key={room.id}
                      className="rounded-xl p-4 border cursor-pointer transition-all hover:shadow-md fade-in"
                      style={{ borderColor: 'rgba(31,58,96,0.15)', animationDelay: `${i * 0.06}s` }}
                      onClick={() => handleRoomClick(room)}>
                      <div className="flex items-center gap-3">
                        {/* Mini door */}
                        <div className="w-10 h-14 rounded-t-lg border flex items-center justify-center flex-shrink-0"
                          style={{
                            borderColor: COLORS.stroke,
                            backgroundColor: `rgba(42, 90, 140, ${fillOpacity})`,
                          }}>
                          <span className="text-[10px] font-bold" style={{ color: fillOpacity > 0.5 ? '#EDE9E3' : COLORS.stroke }}>
                            {room.id}
                          </span>
                        </div>
                        <div className="flex-1 min-w-0">
                          <p className="text-sm font-medium" style={{ color: COLORS.navy }}>
                            {room.id}호 · {room.title}
                          </p>
                          <p className="text-xs" style={{ color: COLORS.textLight }}>
                            {room.floor} · {room.theme}
                          </p>
                        </div>
                        <div className="text-right flex-shrink-0">
                          <p className="text-sm font-semibold" style={{ color: COLORS.navy }}>x {room.visits}</p>
                          <p className="text-[10px]" style={{ color: COLORS.textLight }}>{daysAgo(room.lastVisit)}</p>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            ) : (
              <div className="text-center py-16">
                <p className="text-sm" style={{ color: COLORS.textLight }}>아직 다녀온 방이 없습니다</p>
                <p className="text-xs mt-2" style={{ color: COLORS.textLight }}>파란 문을 두드려 첫 노팅을 시작해보세요</p>
              </div>
            )}

            {/* Guest prompt */}
            {!isResident && visitedRooms.length > 0 && (
              <div className="mt-8 rounded-xl p-4 text-center border border-dashed" style={{ borderColor: COLORS.gold }}>
                <p className="text-sm mb-3" style={{ color: COLORS.navy }}>
                  명패를 받으시면 모든 기록이 영구히 보관됩니다
                </p>
                <button onClick={() => setScreen('signup')}
                  className="text-xs px-4 py-2 rounded-lg"
                  style={{ backgroundColor: COLORS.gold, color: '#3a2f1e' }}>
                  명패 받기
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }


    // ========================================
    // Screen: Room Note (다녀온 방 재방문)
    // ========================================

    function RoomNoteScreen() {
      const { assignedRoom, roomVisits, lastVisitDates, records, roomNotes, addRoomNote, deleteRoomNote, deleteRecord, setScreen, setActiveTab } = useApp();
      const [showInput, setShowInput] = useState(false);
      const [text, setText] = useState('');
      const [saved, setSaved] = useState(false);

      if (!assignedRoom) return null;

      const visits = roomVisits[assignedRoom.id] || 0;
      const lastVisit = lastVisitDates[assignedRoom.id];
      const notes = roomNotes[assignedRoom.id] || [];

      // 이 방의 리추얼 기록들
      const roomRecords = records.filter(r => r.roomId === assignedRoom.id)
        .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

      const daysAgo = (date) => {
        const diff = Math.floor((Date.now() - new Date(date).getTime()) / 86400000);
        if (diff === 0) return '오늘';
        if (diff === 1) return '어제';
        return `${diff}일 전`;
      };

      const handleSave = () => {
        if (!text.trim()) return;
        addRoomNote(assignedRoom.id, text.trim());
        setText('');
        setSaved(true);
        setShowInput(false);
        setTimeout(() => setSaved(false), 2000);
      };

      return (
        <div className="min-h-screen pb-24 px-6 pt-10" style={{ backgroundColor: COLORS.bg }}>
          <div className="max-w-md mx-auto">
            {/* Back */}
            <button onClick={() => { setActiveTab('records'); setScreen('building'); }} className="flex items-center gap-1 mb-6"
              style={{ color: COLORS.textLight }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
                <polyline points="15 18 9 12 15 6" />
              </svg>
              <span className="text-xs">돌아가기</span>
            </button>

            {/* Room info */}
            <div className="fade-in mb-2">
              <h1 className="font-playfair text-2xl font-semibold" style={{ color: COLORS.navy }}>
                {assignedRoom.id}호 · {assignedRoom.title}
              </h1>
            </div>
            <div className="fade-in fade-in-d1 mb-2">
              <p className="text-sm" style={{ color: COLORS.textLight }}>
                {assignedRoom.desc}
              </p>
            </div>
            <div className="fade-in fade-in-d1 mb-8">
              <p className="text-xs" style={{ color: COLORS.textLight }}>
                {visits}회 방문 · 마지막 방문 {lastVisit ? daysAgo(lastVisit) : '-'}
              </p>
            </div>

            {/* 리추얼 기록 */}
            {roomRecords.length > 0 && (
              <div className="fade-in fade-in-d2 mb-8">
                <p className="text-[11px] font-medium uppercase tracking-[0.15em] mb-4" style={{ color: COLORS.textLight }}>
                  이 방에서의 기록
                </p>
                <div className="space-y-3">
                  {roomRecords.map((record, i) => (
                    <div key={record.id} className="rounded-lg p-4 border"
                      style={{ borderColor: 'rgba(31,58,96,0.1)' }}>
                      <div className="flex items-center gap-2 mb-2">
                        <span className="text-[10px]" style={{ color: COLORS.textLight }}>
                          {formatDate(new Date(record.createdAt))}
                        </span>
                        <span className="text-[10px] px-2 py-0.5 rounded-full" style={{ backgroundColor: COLORS.navyLight, color: COLORS.navy }}>
                          {getEmotionLabel(record.emotion)}
                        </span>
                        <button onClick={() => { if (confirm('이 기록을 삭제하시겠어요?')) deleteRecord(record.id); }}
                          className="ml-auto text-[10px] px-2 py-0.5" style={{ color: COLORS.textLight }}>
                          삭제
                        </button>
                      </div>
                      {record.method && (
                        <p className="text-xs mb-1" style={{ color: COLORS.textLight }}>{record.method}</p>
                      )}
                      <p className="font-caveat text-lg" style={{ color: COLORS.navy }}>"{record.text}"</p>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* 노트 */}
            {notes.length > 0 && (
              <div className="fade-in fade-in-d3 mb-8">
                <p className="text-[11px] font-medium uppercase tracking-[0.15em] mb-4" style={{ color: COLORS.textLight }}>
                  한 줄 노트
                </p>
                <div className="space-y-3">
                  {notes.map((note, i) => (
                    <div key={i} className="rounded-lg p-4 border"
                      style={{ borderColor: 'rgba(31,58,96,0.1)' }}>
                      <div className="flex items-center justify-between mb-2">
                        <p className="text-[10px]" style={{ color: COLORS.textLight }}>{note.date}</p>
                        <button onClick={() => { if (confirm('이 노트를 삭제하시겠어요?')) deleteRoomNote(assignedRoom.id, i); }}
                          className="text-[10px] px-2 py-0.5" style={{ color: COLORS.textLight }}>
                          삭제
                        </button>
                      </div>
                      <p className="font-caveat text-lg" style={{ color: COLORS.navy }}>"{note.content}"</p>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* 빈 상태 */}
            {roomRecords.length === 0 && notes.length === 0 && (
              <div className="text-center py-10 fade-in fade-in-d2">
                <p className="text-sm" style={{ color: COLORS.textLight }}>아직 이 방에 남긴 기록이 없습니다</p>
              </div>
            )}

            {/* 노트 추가 토글 */}
            {saved && <p className="text-xs text-center mb-4 fade-in" style={{ color: COLORS.textLight }}>저장되었습니다</p>}

            {!showInput ? (
              <button onClick={() => setShowInput(true)}
                className="w-full py-3 rounded-lg text-sm border border-dashed fade-in"
                style={{ borderColor: COLORS.navy, color: COLORS.navy }}>
                + 한 줄 노트 남기기
              </button>
            ) : (
              <div className="fade-in">
                <textarea
                  value={text}
                  onChange={e => setText(e.target.value)}
                  placeholder="오늘 이 방에서 알아차린 것..."
                  rows={2}
                  className="w-full border rounded-xl px-4 py-3 text-base font-caveat resize-none mb-3"
                  style={{ backgroundColor: COLORS.bg, borderColor: COLORS.navy, color: COLORS.navy }}
                  autoFocus
                />
                <div className="flex gap-2">
                  <NavyButton onClick={handleSave} disabled={!text.trim()} className="flex-1">저장</NavyButton>
                  <button onClick={() => { setShowInput(false); setText(''); }}
                    className="px-4 py-2 rounded-lg text-sm" style={{ color: COLORS.textLight }}>취소</button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }


    // ========================================
    // Insight Tab
    // ========================================

    function InsightTab() {
      const { roomVisits, lastVisitDates, records, setScreen, setAssignedRoom, isResident, roomData, roomNotes, residentNumber } = useApp();
      const [period, setPeriod] = useState(30);
      const [showReview, setShowReview] = useState(false);

      if (!isResident) {
        return (
          <div className="min-h-screen pb-24 flex flex-col items-center justify-center px-6" style={{ backgroundColor: COLORS.bg }}>
            <h2 className="font-playfair text-xl font-semibold mb-3" style={{ color: COLORS.navy }}>마음 풍경</h2>
            <p className="text-sm mb-8 text-center" style={{ color: COLORS.textLight }}>
              명패를 받으시면 다녀간 방들의<br/>패턴이 이곳에 그려집니다
            </p>
            <NavyButton onClick={() => setScreen('signup')} className="px-8">
              명패 받기
            </NavyButton>
          </div>
        );
      }

      const now = Date.now();
      const periodMs = period === 'all' ? Infinity : period * 86400000;

      // 방문 데이터 계산
      const visitedEntries = useMemo(() => {
        return Object.entries(roomVisits)
          .filter(([_, c]) => c > 0)
          .map(([id, count]) => ({ ...(roomData[id] || ROOM_DATA[id]), visits: count, lastVisit: lastVisitDates[id] || new Date() }))
          .filter(r => r.id);
      }, [roomVisits, lastVisitDates]);

      const totalVisits = visitedEntries.reduce((s, r) => s + r.visits, 0);

      // 섹션 1: Top 3
      const top3 = useMemo(() =>
        [...visitedEntries].sort((a, b) => b.visits - a.visits).slice(0, 3)
      , [visitedEntries]);

      // 섹션 2: 층별 분포
      const floorDist = useMemo(() => {
        const dist = { '1F': 0, '2F': 0, '3F': 0 };
        visitedEntries.forEach(r => { dist[r.floor] = (dist[r.floor] || 0) + r.visits; });
        return dist;
      }, [visitedEntries]);

      // 섹션 3: 시간대 (records 기반)
      const timeSlots = useMemo(() => {
        const slots = { '아침 (6-12)': 0, '낮 (12-18)': 0, '저녁 (18-24)': 0, '밤 (0-6)': 0 };
        records.forEach(r => {
          const h = new Date(r.createdAt).getHours();
          if (h >= 6 && h < 12) slots['아침 (6-12)']++;
          else if (h >= 12 && h < 18) slots['낮 (12-18)']++;
          else if (h >= 18) slots['저녁 (18-24)']++;
          else slots['밤 (0-6)']++;
        });
        return slots;
      }, [records]);
      const peakTime = Object.entries(timeSlots).sort((a, b) => b[1] - a[1])[0];
      const maxTimeCount = Math.max(...Object.values(timeSlots), 1);

      // 섹션 4: 오래 안 간 방
      const staleRooms = useMemo(() =>
        visitedEntries
          .filter(r => (now - new Date(r.lastVisit).getTime()) > 5 * 86400000)
          .sort((a, b) => new Date(a.lastVisit) - new Date(b.lastVisit))
          .slice(0, 3)
      , [visitedEntries]);

      // 섹션 5: 이번 달 새로 다녀온 방
      const thisMonth = new Date().getMonth();
      const thisYear = new Date().getFullYear();
      const newRooms = useMemo(() =>
        visitedEntries.filter(r => {
          const d = new Date(r.lastVisit);
          return d.getMonth() === thisMonth && d.getFullYear() === thisYear && r.visits === 1;
        })
      , [visitedEntries]);

      // 위트 인사이트
      const floorInsight = useMemo(() => {
        const sorted = Object.entries(floorDist).sort((a, b) => b[1] - a[1]);
        if (sorted[0][1] === 0) return null;
        const top = sorted[0][0];
        const bottom = sorted[2][0];
        const floorNames = { '1F': '감정 층', '2F': '공간 층', '3F': '시간 층' };
        if (sorted[0][1] > totalVisits * 0.6) {
          return `${top} ${floorNames[top]}을 자주 찾으시네요. ${bottom}의 풍경도 둘러보시겠어요?`;
        }
        return null;
      }, [floorDist, totalVisits]);

      const daysAgo = (date) => {
        const diff = Math.floor((now - new Date(date).getTime()) / 86400000);
        if (diff === 0) return '오늘';
        if (diff === 1) return '어제';
        return `${diff}일 전`;
      };

      const handleRoomClick = (room) => {
        setAssignedRoom(room);
        setScreen('room-note');
      };

      if (visitedEntries.length === 0) {
        return (
          <div className="min-h-screen pb-24 flex flex-col items-center justify-center" style={{ backgroundColor: COLORS.bg }}>
            <h2 className="font-playfair text-2xl font-semibold mb-3" style={{ color: COLORS.navy }}>인사이트</h2>
            <p className="text-sm" style={{ color: COLORS.textLight }}>노팅을 시작하면 마음 풍경이 그려집니다</p>
          </div>
        );
      }

      // 반복 패턴 인사이트 생성
      const patternInsight = useMemo(() => {
        if (totalVisits < 3) return null;
        const insights = [];

        // 가장 자주 가는 방
        if (top3.length > 0 && top3[0].visits >= 3) {
          insights.push(`${top3[0].id}호 ${top3[0].title}을 ${top3[0].visits}번 다녀오셨어요. 자주 만나는 마음이네요.`);
        }

        // 시간대 패턴
        if (peakTime && peakTime[1] >= 3) {
          const timeLabel = peakTime[0].split(' ')[0];
          insights.push(`주로 ${timeLabel}에 문을 두드리시네요.`);
        }

        // 층 편중
        if (floorInsight) insights.push(floorInsight);

        // 새벽 노팅 증가
        const dawnCount = timeSlots['밤 (0-6)'] || 0;
        if (dawnCount >= 2) insights.push('새벽 노팅이 늘어나고 있어요.');

        return insights.length > 0 ? insights[Math.floor(Math.random() * insights.length)] : null;
      }, [top3, peakTime, floorInsight, totalVisits, timeSlots]);

      // 한 달 회고 데이터
      const reviewData = useMemo(() => {
        const allNotes = [];
        Object.entries(roomNotes).forEach(([roomId, notes]) => {
          notes.forEach(n => {
            const room = roomData[roomId] || ROOM_DATA[roomId];
            allNotes.push({ ...n, roomId, roomTitle: room?.title || roomId + '호' });
          });
        });
        // records에서도 한 문장 노팅 수집
        records.forEach(r => {
          if (r.text) {
            const room = roomData[r.roomId] || ROOM_DATA[r.roomId];
            allNotes.push({
              date: new Date(r.createdAt).toISOString().split('T')[0],
              content: r.text,
              roomId: r.roomId,
              roomTitle: room?.title || r.roomId + '호',
            });
          }
        });
        allNotes.sort((a, b) => b.date.localeCompare(a.date));

        // 처음 만난 마음 (visits === 1인 방들)
        const firstMeets = visitedEntries.filter(r => r.visits === 1);

        return { allNotes: allNotes.slice(0, 20), firstMeets };
      }, [roomNotes, records, visitedEntries, roomData]);

      const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

      return (
        <div className="min-h-screen pb-24 px-6 pt-10" style={{ backgroundColor: COLORS.bg }}>
          <div className="max-w-md mx-auto">
            <h1 className="font-playfair text-2xl font-semibold mb-2 fade-in" style={{ color: COLORS.navy }}>
              이번 달의 마음 풍경
            </h1>
            <p className="text-sm mb-4 fade-in fade-in-d1" style={{ color: COLORS.textLight }}>
              이번 달, {visitedEntries.length}개의 방에 {totalVisits}번 머무셨어요
            </p>

            {/* 반복 패턴 인사이트 */}
            {patternInsight && (
              <div className="mb-6 rounded-xl p-4 fade-in fade-in-d1" style={{ backgroundColor: 'rgba(31,58,96,0.04)', border: '1px solid rgba(31,58,96,0.08)' }}>
                <p className="text-sm italic leading-relaxed" style={{ color: COLORS.navy }}>
                  "{patternInsight}"
                </p>
              </div>
            )}

            {/* 한 달 회고 진입점 */}
            {totalVisits >= 3 && (
              <button onClick={() => setShowReview(true)}
                className="w-full mb-8 py-3 rounded-xl text-sm border fade-in fade-in-d1"
                style={{ borderColor: COLORS.gold, color: COLORS.navy }}>
                {monthNames[new Date().getMonth()]}의 회고 보기 →
              </button>
            )}

            {/* 한 달 회고 모달 */}
            {showReview && <ReviewCarousel
              top3={top3} visitedEntries={visitedEntries} totalVisits={totalVisits}
              floorDist={floorDist} reviewData={reviewData} residentNumber={residentNumber}
              onClose={() => setShowReview(false)}
            />}

            {/* 섹션 1: Top 3 */}
            <div className="mb-8 fade-in fade-in-d1">
              <p className="text-[11px] uppercase tracking-[0.15em] mb-4" style={{ color: COLORS.textLight }}>
                가장 자주 머문 방
              </p>
              <div className="space-y-3">
                {top3.map((room, i) => (
                  <div key={room.id} className="flex items-center gap-3 cursor-pointer" onClick={() => handleRoomClick(room)}>
                    <span className="font-playfair text-2xl font-bold w-8" style={{ color: i === 0 ? COLORS.gold : COLORS.navy }}>
                      {i + 1}
                    </span>
                    <div className="flex-1">
                      <p className="text-sm font-medium" style={{ color: COLORS.navy }}>{room.id}호 · {room.title}</p>
                      <p className="text-[10px]" style={{ color: COLORS.textLight }}>{room.floor} · {room.theme}</p>
                    </div>
                    <span className="text-sm font-semibold" style={{ color: COLORS.navy }}>x {room.visits}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* 섹션 2: 층별 분포 */}
            <div className="mb-8 fade-in fade-in-d2">
              <p className="text-[11px] uppercase tracking-[0.15em] mb-4" style={{ color: COLORS.textLight }}>
                어느 층에 자주 머무셨나요
              </p>
              {['1F', '2F', '3F'].map(floor => {
                const count = floorDist[floor] || 0;
                const pct = totalVisits > 0 ? Math.round(count / totalVisits * 100) : 0;
                const floorNames = { '1F': '감정 층', '2F': '공간 층', '3F': '시간 층' };
                return (
                  <div key={floor} className="flex items-center gap-3 mb-2">
                    <span className="text-xs w-16" style={{ color: COLORS.navy }}>{floor} {floorNames[floor]}</span>
                    <div className="flex-1 h-4 rounded-full overflow-hidden" style={{ backgroundColor: COLORS.navyLight }}>
                      <div className="h-full rounded-full transition-all duration-700"
                        style={{ width: `${pct}%`, backgroundColor: COLORS.visitFill }} />
                    </div>
                    <span className="text-xs w-8 text-right" style={{ color: COLORS.textLight }}>{pct}%</span>
                  </div>
                );
              })}
              {floorInsight && (
                <p className="text-xs mt-3 italic" style={{ color: COLORS.textLight }}>{floorInsight}</p>
              )}
            </div>

            {/* 섹션 3: 시간대 */}
            <div className="mb-8 fade-in fade-in-d3">
              <p className="text-[11px] uppercase tracking-[0.15em] mb-4" style={{ color: COLORS.textLight }}>
                언제 두드리셨나요
              </p>
              {Object.entries(timeSlots).map(([slot, count]) => (
                <div key={slot} className="flex items-center gap-3 mb-2">
                  <span className="text-xs w-20" style={{ color: COLORS.navy }}>{slot.split(' ')[0]}</span>
                  <div className="flex-1 h-4 rounded-full overflow-hidden" style={{ backgroundColor: COLORS.navyLight }}>
                    <div className="h-full rounded-full transition-all duration-700"
                      style={{ width: `${(count / maxTimeCount) * 100}%`, backgroundColor: COLORS.stroke }} />
                  </div>
                  <span className="text-xs w-4 text-right" style={{ color: COLORS.textLight }}>{count}</span>
                </div>
              ))}
              {peakTime && peakTime[1] > 0 && (
                <p className="text-xs mt-3 italic" style={{ color: COLORS.textLight }}>
                  주로 {peakTime[0].split(' ')[0]}에 노팅을 하시네요
                </p>
              )}
            </div>

            {/* 섹션 4: 오래 안 간 방 */}
            {staleRooms.length > 0 && (
              <div className="mb-8 fade-in fade-in-d4">
                <p className="text-[11px] uppercase tracking-[0.15em] mb-4" style={{ color: COLORS.textLight }}>
                  다시 들러볼까요?
                </p>
                {staleRooms.map(room => (
                  <div key={room.id}
                    className="rounded-lg p-3 mb-2 border cursor-pointer"
                    style={{ borderColor: 'rgba(31,58,96,0.12)' }}
                    onClick={() => handleRoomClick(room)}>
                    <p className="text-sm" style={{ color: COLORS.navy }}>
                      {daysAgo(room.lastVisit)} {room.id}호를 다녀오셨어요. 다시 들러보시겠어요?
                    </p>
                  </div>
                ))}
              </div>
            )}

            {/* 섹션 5: 이번 달 새 방 */}
            {newRooms.length > 0 && (
              <NewRoomsSection newRooms={newRooms} onRoomClick={handleRoomClick} />
            )}

            {/* Guest prompt */}
            {!isResident && (
              <div className="mt-10 rounded-xl p-4 text-center border border-dashed" style={{ borderColor: COLORS.gold }}>
                <p className="text-sm mb-3" style={{ color: COLORS.navy }}>
                  명패를 받으시면 인사이트가 영구히 보관됩니다

    function ReviewCarousel({ top3, visitedEntries, totalVisits, floorDist, reviewData, residentNumber, onClose }) {
      const [page, setPage] = useState(0);
      const totalPages = 5;
      const now = new Date();
      const monthEn = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][now.getMonth()];
      const monthKr = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'][now.getMonth()];

      // 카드 5: 자기 발견 카피
      const discoveryCopy = useMemo(() => {
        if (top3.length > 0 && top3[0].visits >= 5) return '조용한 단골의 결';
        if (visitedEntries.length >= 6) return '동네 탐험가의 결';
        if (reviewData.firstMeets.length >= 3) return '변화의 결';
        return '머무름의 결';
      }, [top3, visitedEntries, reviewData]);

      // 카드 4: 큐레이션 노트 (가장 짧은 것)
      const curatedNote = useMemo(() => {
        if (reviewData.allNotes.length === 0) return null;
        return [...reviewData.allNotes].sort((a, b) => a.content.length - b.content.length)[0];
      }, [reviewData]);

      const cardStyle = {
        width: '100%', aspectRatio: '9/16', backgroundColor: '#EDE9E3',
        display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
        padding: '2rem', position: 'relative', overflow: 'hidden',
      };

      const saveCard = () => {
        const el = document.getElementById(`review-card-${page}`);
        if (!el) return;
        html2canvas(el, { backgroundColor: '#EDE9E3', scale: 2 }).then(canvas => {
          const link = document.createElement('a');
          link.download = `noting-heal-${monthEn.toLowerCase()}-${page + 1}.png`;
          link.href = canvas.toDataURL();
          link.click();
        });
      };

      const shareCard = () => {
        const el = document.getElementById(`review-card-${page}`);
        if (!el) return;
        html2canvas(el, { backgroundColor: '#EDE9E3', scale: 2 }).then(canvas => {
          canvas.toBlob(blob => {
            if (navigator.share) {
              const file = new File([blob], `noting-heal-${monthEn.toLowerCase()}.png`, { type: 'image/png' });
              navigator.share({ files: [file], title: '노팅힐 월간 회고' }).catch(() => {});
            } else { saveCard(); }
          });
        });
      };

      return (
        <div className="fixed inset-0 bg-black/60 flex flex-col items-center justify-center z-50 modal-overlay"
          onClick={onClose}>
          <div className="w-full max-w-sm px-4" onClick={e => e.stopPropagation()}>

            {/* Card */}
            <div className="rounded-xl overflow-hidden shadow-xl mb-4">

              {/* Page 1: 표지 */}
              {page === 0 && (
                <div id="review-card-0" style={cardStyle}>
                  <p className="text-[10px] tracking-[0.3em] mb-2" style={{ color: '#6B7A8C' }}>{monthEn} {now.getFullYear()}</p>
                  <h1 className="font-playfair text-2xl font-bold mb-8" style={{ color: '#1F3A60' }}>
                    당신의 {monthKr} 풍경
                  </h1>
                  <img src="/image/noting_heal_building.png" className="w-48 h-auto mb-8 opacity-60" draggable="false" />
                  {residentNumber && (
                    <div className="px-4 py-1.5 rounded" style={{ backgroundColor: '#D4B36A' }}>
                      <p className="text-[9px] font-bold tracking-wider" style={{ color: '#3a2f1e' }}>No. {residentNumber}</p>
                    </div>
                  )}
                </div>
              )}

              {/* Page 2: 핵심 숫자 */}
              {page === 1 && (
                <div id="review-card-1" style={cardStyle}>
                  <p className="text-[10px] tracking-[0.2em] mb-6" style={{ color: '#6B7A8C' }}>이번 달의 기록</p>
                  <p className="font-playfair text-5xl font-bold mb-2" style={{ color: '#1F3A60' }}>{visitedEntries.length}</p>
                  <p className="text-sm mb-1" style={{ color: '#6B7A8C' }}>곳의 방에</p>
                  <p className="font-playfair text-5xl font-bold mb-2" style={{ color: '#1F3A60' }}>{totalVisits}</p>
                  <p className="text-sm mb-10" style={{ color: '#6B7A8C' }}>번 머무셨어요</p>
                  {top3.length > 0 && (
                    <div className="text-center">
                      <p className="text-[10px] tracking-wider mb-2" style={{ color: '#D4B36A' }}>가장 자주 머문 방</p>
                      <p className="font-playfair text-lg font-semibold" style={{ color: '#1F3A60' }}>
                        {top3[0].id}호 {top3[0].title}
                      </p>
                      <p className="text-xs" style={{ color: '#6B7A8C' }}>x {top3[0].visits}</p>
                    </div>
                  )}
                </div>
              )}

              {/* Page 3: 마음 풍경 */}
              {page === 2 && (
                <div id="review-card-2" style={cardStyle}>
                  <p className="text-[10px] tracking-[0.2em] mb-8" style={{ color: '#6B7A8C' }}>마음 풍경</p>
                  <div className="w-full px-4 space-y-4 mb-8">
                    {['1F', '2F', '3F'].map(floor => {
                      const count = floorDist[floor] || 0;
                      const pct = totalVisits > 0 ? Math.round(count / totalVisits * 100) : 0;
                      const names = { '1F': '감정 층', '2F': '공간 층', '3F': '시간 층' };
                      return (
                        <div key={floor}>
                          <div className="flex justify-between text-xs mb-1">
                            <span style={{ color: '#1F3A60' }}>{floor} {names[floor]}</span>
                            <span style={{ color: '#6B7A8C' }}>{pct}%</span>
                          </div>
                          <div className="h-3 rounded-full overflow-hidden" style={{ backgroundColor: 'rgba(31,58,96,0.08)' }}>
                            <div className="h-full rounded-full" style={{ width: `${pct}%`, backgroundColor: '#1F3A60', transition: 'width 1s ease' }} />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  {reviewData.firstMeets.length > 0 && (
                    <div className="text-center">
                      <p className="text-[10px] tracking-wider mb-2" style={{ color: '#D4B36A' }}>처음 만난 마음</p>
                      <div className="flex flex-wrap justify-center gap-1">
                        {reviewData.firstMeets.slice(0, 3).map(r => (
                          <span key={r.id} className="text-[10px] px-2 py-1 rounded-full border"
                            style={{ borderColor: '#D4B36A', color: '#1F3A60' }}>
                            {r.title}
                          </span>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* Page 4: 한 줄 */}
              {page === 3 && (
                <div id="review-card-3" style={cardStyle}>
                  <p className="text-[10px] tracking-[0.2em] mb-8" style={{ color: '#6B7A8C' }}>{monthKr}의 한 줄</p>
                  {curatedNote ? (
                    <>
                      <p className="font-caveat text-2xl leading-relaxed text-center px-4 mb-8" style={{ color: '#1F3A60' }}>
                        "{curatedNote.content}"
                      </p>
                      <p className="text-[10px]" style={{ color: '#6B7A8C' }}>
                        {curatedNote.date} · {curatedNote.roomTitle}
                      </p>
                    </>
                  ) : (
                    <p className="text-sm" style={{ color: '#6B7A8C' }}>아직 남긴 한 줄이 없어요</p>
                  )}
                </div>
              )}

              {/* Page 5: Hero Card */}
              {page === 4 && (
                <div id="review-card-4" style={cardStyle}>
                  <p className="text-[10px] tracking-[0.2em] mb-6" style={{ color: '#6B7A8C' }}>{monthKr}의 발견</p>
                  <h2 className="font-playfair text-xl font-semibold mb-2 text-center" style={{ color: '#1F3A60' }}>
                    {monthKr}의 당신은
                  </h2>
                  <p className="font-playfair text-2xl font-bold mb-10" style={{ color: '#D4B36A' }}>
                    {discoveryCopy}
                  </p>
                  {residentNumber && (
                    <div className="px-6 py-3 rounded-lg mb-8" style={{ backgroundColor: '#D4B36A', boxShadow: '0 2px 12px rgba(212,179,106,0.4)' }}>
                      <p className="text-[8px] uppercase tracking-widest" style={{ color: '#3a2f1e' }}>{monthEn} {now.getFullYear()} · RESIDENT</p>
                      <p className="font-playfair text-2xl font-bold" style={{ color: '#3a2f1e' }}>No. {residentNumber}</p>
                    </div>
                  )}
                  <p className="text-[10px]" style={{ color: '#6B7A8C' }}>#notingheal</p>
                </div>
              )}
            </div>

            {/* Page indicators */}
            <div className="flex justify-center gap-2 mb-4">
              {Array.from({ length: totalPages }).map((_, i) => (
                <button key={i} onClick={() => setPage(i)}
                  className="rounded-full transition-all"
                  style={{
                    width: i === page ? 20 : 6, height: 6,
                    backgroundColor: i === page ? '#D4B36A' : 'rgba(255,255,255,0.3)',
                  }} />
              ))}
            </div>

            {/* Navigation + Actions */}
            <div className="flex gap-2 mb-2">
              {page > 0 && (
                <button onClick={() => setPage(p => p - 1)}
                  className="py-2.5 px-4 rounded-lg border"
                  style={{ borderColor: 'rgba(255,255,255,0.3)', color: 'white' }}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
              )}
              <button onClick={saveCard}
                className="flex-1 py-2.5 rounded-lg text-sm border"
                style={{ borderColor: 'rgba(255,255,255,0.3)', color: 'white' }}>
                이미지 저장
              </button>
              <button onClick={shareCard}
                className="flex-1 py-2.5 rounded-lg text-sm"
                style={{ backgroundColor: '#D4B36A', color: '#3a2f1e' }}>
                공유하기
              </button>
              {page < totalPages - 1 && (
                <button onClick={() => setPage(p => p + 1)}
                  className="py-2.5 px-4 rounded-lg border"
                  style={{ borderColor: 'rgba(255,255,255,0.3)', color: 'white' }}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
              )}
            </div>

            <button onClick={onClose} className="w-full py-2 text-sm" style={{ color: 'rgba(255,255,255,0.5)' }}>
              닫기
            </button>
          </div>
        </div>
      );
    }


    function NewRoomsSection({ newRooms, onRoomClick }) {

          {showAll && (
            <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-6 modal-overlay"
              onClick={() => setShowAll(false)}>
              <div className="rounded-xl w-full max-w-sm max-h-[70vh] overflow-y-auto p-6 modal-content"
                style={{ backgroundColor: COLORS.bg }}

                  ))}

              </div>
            </div>
          )}
        </div>
      );

    function PlaceholderTab({ name, desc }) {
      return (
        <div className="min-h-screen pb-24 flex flex-col items-center justify-center" style={{ backgroundColor: COLORS.bg }}>
          <h2 className="font-playfair text-2xl font-semibold mb-3" style={{ color: COLORS.text }}>{name}</h2>
          <p className="text-sm" style={{ color: COLORS.textLight }}>{desc}</p>
        </div>
      );
    }


    // ========================================
    // Bottom Navigation
    // ========================================

    function BottomNav() {
      const { activeTab, setActiveTab, setScreen, screen, setCheckinData } = useApp();

      const tabs = [
        {
          key: 'building', label: '노팅힐', icon: (active) => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
          )
        },
        {
          key: 'noting', label: '체크인', icon: (active) => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.78 7.78 5.5 5.5 0 017.78-7.78zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" />
            </svg>
          )
        },
        {
          key: 'records', label: '기록', icon: (active) => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
            </svg>
          )
        },
        {
          key: 'insight', label: '패턴', icon: (active) => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <path d="M2 12c2-3 4-5 6-5s4 4 6 4 4-3 6-3" />
              <path d="M2 17c2-3 4-5 6-5s4 4 6 4 4-3 6-3" />
            </svg>
          )
        },
      ];

      const handleTabClick = (key) => {
        setActiveTab(key);
        if (key === 'building') setCheckinData({ place: null, emotion: null });
        setScreen('building');
      };

      // Hide nav on certain screens
      if (['signup', 'welcome', 'elevator', 'corridor', 'profile'].includes(screen)) return null;
      if (screen === 'building' && activeTab === 'building') return null;

      return (
        <nav
          className="fixed bottom-0 left-0 right-0 z-40 flex items-center justify-around py-3 border-t"
          style={{ backgroundColor: COLORS.bg, borderColor: 'rgba(26, 26, 94, 0.15)' }}
        >
          {tabs.map(tab => {
            const active = activeTab === tab.key;
            return (
              <button
                key={tab.key}
                onClick={() => handleTabClick(tab.key)}
                className="flex flex-col items-center gap-1 px-1 py-1 transition-opacity"
                style={{ color: COLORS.navy, opacity: active ? 1 : 0.3 }}
              >
                {tab.icon(active)}
                <span className="text-[10px]">{tab.label}</span>
              </button>
            );
          })}
        </nav>
      );
    }


    // ========================================
    // App Component
    // ========================================

    function App() {
      const { screen, activeTab } = useApp();

      // Determine what to render
      if (screen === 'signup') return <SignupScreen />;
      if (screen === 'profile') return <ProfileScreen />;
      if (screen === 'welcome') return <WelcomeScreen />;
      if (screen === 'checkin') return <><CheckinScreen /><BottomNav /></>;
      if (screen === 'elevator') return <ElevatorScreen />;
      if (screen === 'corridor') return <CorridorScreen />;
      if (screen === 'room-assign') return <><RoomAssignScreen /><BottomNav /></>;
      if (screen === 'noting') return <><NotingScreen /><BottomNav /></>;
      if (screen === 'writing') return <><WritingScreen /><BottomNav /></>;
      if (screen === 'checkout') return <><CheckoutScreen /><BottomNav /></>;
      if (screen === 'room-note') return <><RoomNoteScreen /><BottomNav /></>;

      // Main shell with tabs
      let content = null;
      if (activeTab === 'building') content = <BuildingScreen />;
      else if (activeTab === 'noting') content = <PlaceholderTab name="체크인 하시겠어요?" desc="노팅힐 탭에서 파란 문을 두드려 시작하세요" />;
      else if (activeTab === 'records') content = <RecordsTab />;
      else if (activeTab === 'insight') content = <InsightTab />;

      return (
        <>
          {content}
          <BottomNav />
        </>
      );
    }


    // ========================================
    // Rendering
    // ========================================

    ReactDOM.createRoot(document.getElementById('root')).render(
      <AppProvider>
        <App />
      </AppProvider>
    );

  </script>
</body>

</html>
