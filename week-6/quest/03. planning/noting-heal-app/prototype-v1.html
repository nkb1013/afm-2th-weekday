function formatDate(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}.${m}.${d}`;
}

function getDateGroupLabel(date) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const target = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const diff = Math.floor((today - target) / (1000 * 60 * 60 * 24));
  if (diff === 0) return '오늘';
  if (diff === 1) return '어제';
  if (diff <= 6) return '이번 주';
  return '이전';
}

function groupRecordsByDate(records) {
  const groups = { '오늘': [], '어제': [], '이번 주': [], '이전': [] };
  const sorted = [...records].sort((a, b) => b.createdAt - a.createdAt);
  sorted.forEach(r => {
    const label = getDateGroupLabel(r.createdAt);
    groups[label].push(r);
  });
  return groups;
}

function getTodayFormatted() {
  const now = new Date();
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  return `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
}

function getEmotionLabel(key) {
  const e = EMOTIONS.find(em => em.key === key);
  return e ? e.label : key;
}

function getPlaceLabel(key) {
  const p = PLACES.find(pl => pl.key === key);
  return p ? p.label : key;
}

function extractFrequentWords(records) {
  const stopWords = new Set(['나','내','는','은','이','가','을','를','의','에','에서','도','만','좀','와','과','한','그','것','수','안','못','더','다','로','으로','하고','있는','없는','하는','되는','했다','있다','없다','같다','되다','너무','진짜','정말','되게','약간','그냥','좀','다시']);
  const wordCount = {};
  records.forEach(r => {
    const words = r.text.replace(/[.,!?~\-()'"]/g, ' ').split(/\s+/).filter(w => w.length >= 2);
    words.forEach(w => {
      if (!stopWords.has(w)) wordCount[w] = (wordCount[w] || 0) + 1;
    });
  });
  return Object.entries(wordCount).sort((a, b) => b[1] - a[1]).slice(0, 8).map(([word, count]) => ({ word, count }));
}

function getEmotionStats(records) {
  const counts = {};
  records.forEach(r => { counts[r.emotion] = (counts[r.emotion] || 0) + 1; });
  return Object.entries(counts).sort((a, b) => b[1] - a[1]).map(([key, count]) => ({ key, label: getEmotionLabel(key), count }));
}

function generateCalendarData(records) {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const recordMap = {};
  records.forEach(r => {
    const key = `${r.createdAt.getDate()}`;
    if (!recordMap[key]) recordMap[key] = [];
    if (r.createdAt.getMonth() === month && r.createdAt.getFullYear() === year) {
      recordMap[key].push(r.emotion);
    }
  });
  const days = [];
  for (let i = 0; i < firstDay; i++) days.push({ day: null, emotions: [] });
  for (let d = 1; d <= daysInMonth; d++) days.push({ day: d, emotions: recordMap[String(d)] || [] });
  return { year, month, days };
}

// Room assignment logic
function assignRoom(placeKey, emotionKey) {
  // Emotion-based: floor 1, Space-based: floor 2, otherwise floor 3
  const negativeEmotions = ['anxious', 'tense', 'lethargic', 'irritated', 'confused', 'lonely', 'fear'];
  if (negativeEmotions.includes(emotionKey)) {
    const rooms = [101, 102, 103, 104, 105];
    return rooms[Math.floor(Math.random() * rooms.length)];
  }
  if (['cafe', 'office', 'outside'].includes(placeKey)) {
    const rooms = [201, 202, 203, 204, 205];
    return rooms[Math.floor(Math.random() * rooms.length)];
  }
  const rooms = [301, 302, 303, 304, 305];
  return rooms[Math.floor(Math.random() * rooms.length)];
}

const AppContext = createContext();

function AppProvider({ children }) {
  const [screen, setScreen] = useState('login'); // login, gate, building, checkin, room-assign, noting, writing, checkout
  const [activeTab, setActiveTab] = useState('building'); // building, noting, records, insight
  const [records, setRecords] = useState(INITIAL_RECORDS);
  const [emotions, setEmotions] = useState(EMOTIONS);
  const [checkinData, setCheckinData] = useState({ place: null, emotion: null, time: null });
  const [assignedRoom, setAssignedRoom] = useState(null);
  const [assignedMethod, setAssignedMethod] = useState(null);

  const addRecord = useCallback((record) => {
    setRecords(prev => [record, ...prev]);
  }, []);

  const addCustomEmotion = useCallback((label) => {
    const key = 'custom_' + Date.now();
    setEmotions(prev => [...prev, { key, label }]);
    return key;
  }, []);

  const startNoting = useCallback(() => {
    const { place, emotion, time } = checkinData;
    const roomId = assignRoom(place, emotion);
    const room = ROOM_DATA[roomId];
    const method = recommendMethod(place, emotion, time);
    setAssignedRoom(room);
    setAssignedMethod(method);
    setScreen('room-assign');
  }, [checkinData]);

  const value = useMemo(() => ({
    screen, setScreen,
    activeTab, setActiveTab,
    records, addRecord,
    emotions, addCustomEmotion,
    checkinData, setCheckinData,
    assignedRoom, assignedMethod,
    startNoting,
  }), [screen, activeTab, records, emotions, checkinData, assignedRoom, assignedMethod, startNoting, addRecord, addCustomEmotion]);

  return <AppContext.Provider value={value}>{children}</AppContext.Provider>;
}

function useApp() { return useContext(AppContext); }

function NavyButton({ children, onClick, disabled, variant = 'primary', className = '' }) {
  const base = 'rounded-lg text-sm font-medium transition-all duration-200 active:scale-[0.98]';
  const variants = {
    primary: `py-3 px-6 ${disabled ? 'opacity-30 cursor-not-allowed' : ''}`,
    ghost: 'py-2.5 px-4',
  };
  const styles = {
    primary: { backgroundColor: disabled ? COLORS.navy : COLORS.navy, color: COLORS.cream },
    ghost: { color: COLORS.textLight },
  };
  return (
    <button onClick={disabled ? undefined : onClick} className={`${base} ${variants[variant]} ${className}`} style={styles[variant]} disabled={disabled}>
      {children}
    </button>
  );
}

function ChoicePill({ label, selected, onClick }) {
  return (
    <button
      onClick={onClick}
      className="px-4 py-2 rounded-full text-sm transition-all duration-200 border"
      style={{
        backgroundColor: selected ? COLORS.navy : COLORS.cream,
        color: selected ? COLORS.cream : COLORS.navy,
        borderColor: COLORS.navy,
      }}
    >
      {label}
    </button>
  );
}

function DottedDivider() {
  return <div className="border-b border-dashed my-6" style={{ borderColor: 'rgba(26, 26, 94, 0.2)' }}></div>;
}

  const selectTime = (key) => setCheckinData(prev => ({ ...prev, time: key }));

    if (customInput.trim()) {

            {getTodayFormatted()}

        </div>

        <div className="checkin-item mb-2">
          <p className="text-[11px] font-medium uppercase tracking-[0.2em] mb-4" style={{ color: COLORS.navy }}>
            지금 어디에 있나요?
          </p>
          <div className="flex flex-wrap gap-2 mb-2">
            {PLACES.map(p => (
              <ChoicePill key={p.key} label={p.label} selected={place === p.key} onClick={() => selectPlace(p.key)} />
            ))}
          </div>
          {place && (
            <div className="mt-3 border-b pb-1" style={{ borderColor: 'rgba(26, 26, 94, 0.3)', borderStyle: 'dotted' }}>
              <span className="font-caveat text-xl selected-write" style={{ color: COLORS.navy }}>
                {getPlaceLabel(place)}
              </span>
            </div>
          )}
        </div>

        <DottedDivider />

        {/* Question 2: Emotion */}
        <div className="checkin-item mb-2">
          <p className="text-[11px] font-medium uppercase tracking-[0.2em] mb-4" style={{ color: COLORS.navy }}>

// ========================================
// Screen 6: Noting (Timer)
// ========================================

function NotingScreen() {
  const { checkinData, assignedMethod, setScreen } = useApp();
  const totalSeconds = TIMES.find(t => t.key === checkinData.time)?.seconds || 60;
  const [remaining, setRemaining] = useState(totalSeconds);
  const [isRunning, setIsRunning] = useState(true);
  const intervalRef = useRef(null);

  useEffect(() => {
    if (isRunning && remaining > 0) {
      intervalRef.current = setInterval(() => {
        setRemaining(prev => {
          if (prev <= 1) {
            clearInterval(intervalRef.current);
            setIsRunning(false);
            return 0;
          }
          return prev - 1;
        });
      }, 1000);
    }
    return () => clearInterval(intervalRef.current);
  }, [isRunning, remaining]);

  const progress = 1 - (remaining / totalSeconds);
  const circumference = 2 * Math.PI * 54;
  const dashOffset = circumference * (1 - progress);

  const formatTime = (sec) => {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m}:${String(s).padStart(2, '0')}`;
  };

  const handleComplete = () => {
    clearInterval(intervalRef.current);
    setScreen('writing');
  };

  return (
    <div className="min-h-screen pb-24 px-6 flex flex-col items-center justify-center" style={{ backgroundColor: COLORS.cream }}>
      <div className="max-w-md w-full text-center">
        {/* Timer ring */}
        <div className="fade-in mb-8">
          <svg width="140" height="140" viewBox="0 0 120 120" className="mx-auto">
            <circle className="timer-ring-bg" cx="60" cy="60" r="54" />
            <circle
              className="timer-ring-fg"
              cx="60" cy="60" r="54"
              strokeDasharray={circumference}
              strokeDashoffset={dashOffset}
              transform="rotate(-90 60 60)"
            />
          </svg>
          <p className="font-playfair text-3xl font-semibold mt-4" style={{ color: COLORS.navy }}>
            {formatTime(remaining)}
          </p>
        </div>

        {/* Method guide */}
        <div className="fade-in fade-in-d1 mb-10 px-4">
          <p className="font-caveat text-xl leading-relaxed" style={{ color: COLORS.navy }}>
            {assignedMethod?.name}
          </p>
          <p className="text-sm mt-3 leading-relaxed" style={{ color: COLORS.textLight }}>
            {assignedMethod?.guide}
          </p>
        </div>

        {/* Complete button */}
        <div className="fade-in fade-in-d2">
          <NavyButton onClick={handleComplete} className="w-full">
            {remaining === 0 ? '완료' : '일찍 마치기'}
          </NavyButton>
        </div>
      </div>
    </div>
  );
}

// ========================================

function WritingScreen() {
  const { setScreen, addRecord, assignedRoom, assignedMethod, checkinData } = useApp();
  const [text, setText] = useState('');
  const maxLen = 100;

  const handleSubmit = () => {
    if (!text.trim()) return;
    const record = {
      id: String(Date.now()),
      roomId: assignedRoom?.id || 101,
      emotion: checkinData.emotion,
      place: checkinData.place,
      time: checkinData.time,
      method: assignedMethod?.name || '',
      text: text.trim(),
      createdAt: new Date(),

    addRecord(record);
    setScreen('checkout');

  return (

          <textarea

            placeholder="여기에 적어보세요..."

            className="w-full border rounded-xl px-5 py-4 text-lg font-caveat resize-none"

                    key={record.id}
                    className="rounded-xl p-4 border"
                    style={{ borderColor: 'rgba(26, 26, 94, 0.15)', backgroundColor: COLORS.cream }}
                  >
                    <div className="flex items-center gap-2 mb-2 flex-wrap">
                      <span className="text-[10px] tracking-wide" style={{ color: COLORS.textLight }}>
                        {formatDate(record.createdAt)}
                      </span>
                      <span className="text-[10px] px-2 py-0.5 rounded-full border" style={{ borderColor: COLORS.navy, color: COLORS.navy }}>
                        Room {record.roomId}
                      </span>
                      <span className="text-[10px] px-2 py-0.5 rounded-full" style={{ backgroundColor: COLORS.navyLight, color: COLORS.navy }}>
                        {getEmotionLabel(record.emotion)}
                      </span>
                    </div>
                    {record.method && (
                      <p className="text-xs mb-2" style={{ color: COLORS.textLight }}>
                        {record.method}
                      </p>
                    )}
                    <p className="font-caveat text-lg" style={{ color: COLORS.navy }}>
                      "{record.text}"
                    </p>
                  </div>
                ))}
              </div>
            </div>
          );
        })}

        {records.length === 0 && (
          <div className="text-center py-16">
            <p className="text-sm" style={{ color: COLORS.textLight }}>아직 기록이 없습니다</p>
          </div>
        )}
      </div>
    </div>
  );
}


// ========================================
// Insight Tab
// ========================================

function InsightTab() {
  const { records } = useApp();
  const emotionStats = useMemo(() => getEmotionStats(records), [records]);
  const frequentWords = useMemo(() => extractFrequentWords(records), [records]);
  const calendarData = useMemo(() => generateCalendarData(records), [records]);
  const maxCount = emotionStats.length > 0 ? emotionStats[0].count : 1;
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const dayHeaders = ['일','월','화','수','목','금','토'];

  return (
    <div className="min-h-screen pb-24 px-6 pt-10" style={{ backgroundColor: COLORS.cream }}>
      <div className="max-w-md mx-auto">
        <h1 className="font-playfair text-2xl font-semibold mb-8 fade-in" style={{ color: COLORS.navy }}>
          인사이트
        </h1>

        {/* Emotion stats bar chart */}
        <div className="mb-10 fade-in fade-in-d1">
          <p className="text-[11px] uppercase tracking-[0.15em] mb-4" style={{ color: COLORS.textLight }}>
            감정 통계
          </p>
          <div className="space-y-3">
            {emotionStats.map(stat => (
              <div key={stat.key} className="flex items-center gap-3">
                <span className="text-xs w-12 text-right" style={{ color: COLORS.navy }}>{stat.label}</span>
                <div className="flex-1 h-5 rounded-full overflow-hidden" style={{ backgroundColor: COLORS.navyLight }}>
                  <div
                    className="h-full rounded-full transition-all duration-500"
                    style={{ width: `${(stat.count / maxCount) * 100}%`, backgroundColor: COLORS.navy }}
                  />
                </div>
                <span className="text-xs w-4" style={{ color: COLORS.textLight }}>{stat.count}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Frequent words */}
        <div className="mb-10 fade-in fade-in-d2">
          <p className="text-[11px] uppercase tracking-[0.15em] mb-4" style={{ color: COLORS.textLight }}>
            반복 단어
          </p>
          <div className="flex flex-wrap gap-2">
            {frequentWords.map(({ word, count }) => (
              <span
                key={word}
                className="px-3 py-1.5 rounded-full text-xs border"
                style={{ borderColor: COLORS.navy, color: COLORS.navy }}
              >
                {word} ({count})
              </span>
            ))}
          </div>
          {frequentWords.length === 0 && (
            <p className="text-sm" style={{ color: COLORS.textLight }}>기록이 더 쌓이면 표시됩니다</p>
          )}
        </div>

        {/* Emotion calendar */}
        <div className="fade-in fade-in-d3">
          <p className="text-[11px] uppercase tracking-[0.15em] mb-4" style={{ color: COLORS.textLight }}>
            {calendarData.year}년 {monthNames[calendarData.month]} 감정 캘린더
          </p>
          <div className="grid grid-cols-7 gap-1 text-center">
            {dayHeaders.map(d => (
              <div key={d} className="text-[10px] py-1" style={{ color: COLORS.textLight }}>{d}</div>
            ))}
            {calendarData.days.map((day, i) => (
              <div key={i} className="aspect-square flex items-center justify-center relative">
                {day.day && (
                  <>
                    <span className="text-[11px]" style={{ color: COLORS.navy }}>{day.day}</span>
                    {day.emotions.length > 0 && (
                      <div className="absolute bottom-0.5 left-1/2 -translate-x-1/2 w-1.5 h-1.5 rounded-full" style={{ backgroundColor: COLORS.navy }}></div>
                    )}
                  </>
                )}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}


// ========================================
// Bottom Navigation
// ========================================

function BottomNav() {
  const { activeTab, setActiveTab, setScreen, screen } = useApp();

  const tabs = [
    { key: 'building', label: '노팅힐', icon: (active) => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
        <polyline points="9 22 9 12 15 12 15 22" />
      </svg>
    )},
    { key: 'noting', label: '노팅', icon: (active) => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10" />
        <polyline points="12 6 12 12 16 14" />
      </svg>
    )},
    { key: 'records', label: '기록', icon: (active) => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
        <polyline points="14 2 14 8 20 8" />
        <line x1="16" y1="13" x2="8" y2="13" />
        <line x1="16" y1="17" x2="8" y2="17" />
      </svg>
    )},
    { key: 'insight', label: '인사이트', icon: (active) => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
        <line x1="18" y1="20" x2="18" y2="10" />
        <line x1="12" y1="20" x2="12" y2="4" />
        <line x1="6" y1="20" x2="6" y2="14" />
      </svg>
    )},
  ];

  const handleTabClick = (key) => {
    setActiveTab(key);
    if (key === 'building') setScreen('building');
    else if (key === 'noting') setScreen('checkin');
    else if (key === 'records' || key === 'insight') setScreen('building'); // stay in main shell
  };

  // Hide nav on certain screens
  if (['login', 'gate', 'gate-closeup'].includes(screen)) return null;

  return (
    <nav
      className="fixed bottom-0 left-0 right-0 z-40 flex items-center justify-around py-3 border-t"
      style={{ backgroundColor: COLORS.cream, borderColor: 'rgba(26, 26, 94, 0.15)' }}
    >
      {tabs.map(tab => {
        const active = activeTab === tab.key;
        return (
          <button
            key={tab.key}
            onClick={() => handleTabClick(tab.key)}
            className="flex flex-col items-center gap-1 px-3 py-1 transition-opacity"
            style={{ color: COLORS.navy, opacity: active ? 1 : 0.3 }}
          >
            {tab.icon(active)}
            <span className="text-[10px]">{tab.label}</span>
          </button>
        );
      })}
    </nav>
  );
}


// ========================================
// App Component
// ========================================

function App() {
  const { screen, activeTab } = useApp();

  // Determine what to render
  if (screen === 'login') return <LoginScreen />;
  if (screen === 'gate') return <GateCloseupScreen />;
  if (screen === 'gate-closeup') return <GateCloseupScreen />;
  if (screen === 'checkin') return <><CheckinScreen /><BottomNav /></>;
  if (screen === 'room-assign') return <><RoomAssignScreen /><BottomNav /></>;
  if (screen === 'noting') return <><NotingScreen /><BottomNav /></>;
  if (screen === 'writing') return <><WritingScreen /><BottomNav /></>;
  if (screen === 'checkout') return <><CheckoutScreen /><BottomNav /></>;

  // Main shell with tabs
  let content = null;
  if (activeTab === 'building') content = <BuildingScreen />;
  else if (activeTab === 'noting') content = <CheckinScreen />;
  else if (activeTab === 'records') content = <RecordsTab />;
  else if (activeTab === 'insight') content = <InsightTab />;

  return (
    <>
      {content}
      <BottomNav />
    </>
  );
}


// ========================================
// Rendering
// ========================================

ReactDOM.createRoot(document.getElementById('root')).render(
  <AppProvider>
    <App />
  </AppProvider>
);

  </script>
</body>
</html>
