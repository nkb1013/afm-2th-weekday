<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>noting heal - admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    input:focus, textarea:focus, select:focus { outline: none; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useCallback } = React;

const EMOTIONS = ['anxious','tense','lethargic','irritated','confused','lonely','calm','joy','excited','grateful','fear','energetic'];
const EMOTION_KR = { anxious:'불안', tense:'긴장', lethargic:'무기력', irritated:'짜증', confused:'혼란', lonely:'외로움', calm:'차분함', joy:'기쁨', excited:'기대', grateful:'감사', fear:'두려움', energetic:'활기' };
const PLACES = ['home','office','cafe','outside','moving'];
const PLACE_KR = { home:'집', office:'오피스', cafe:'카페', outside:'밖', moving:'이동 중' };
const TIMES = [1, 3, 5];

function AdminLogin({ onLogin }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setLoading(true);
    setError('');
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!data.success) { setError(data.message); setLoading(false); return; }
      if (data.data.user.role !== 'admin') { setError('관리자 권한이 없습니다'); setLoading(false); return; }
      localStorage.setItem('nh_admin_token', data.data.token);
      onLogin(data.data.token);
    } catch { setError('서버 연결 실패'); }
    setLoading(false);
  };

  return (
    <div className="min-h-screen flex items-center justify-center bg-gray-50 px-4">
      <div className="w-full max-w-sm">
        <h1 className="text-2xl font-bold text-indigo-900 text-center mb-2">noting heal</h1>
        <p className="text-sm text-gray-500 text-center mb-8">관리자 로그인</p>
        <form onSubmit={handleSubmit} className="space-y-4">
          <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="관리자 이메일"
            className="w-full border rounded-lg px-4 py-3 text-sm" />
          <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="비밀번호"
            className="w-full border rounded-lg px-4 py-3 text-sm" />
          {error && <p className="text-xs text-red-500 text-center">{error}</p>}
          <button type="submit" disabled={loading}
            className="w-full bg-indigo-900 text-white py-3 rounded-lg text-sm font-medium">
            {loading ? '로그인 중...' : '로그인'}
          </button>
        </form>
      </div>
    </div>
  );
}

function App() {
  const [token, setToken] = useState(localStorage.getItem('nh_admin_token') || null);
  const [tab, setTab] = useState('rooms');
  const [rooms, setRooms] = useState([]);
  const [methods, setMethods] = useState([]);
  const [editRoom, setEditRoom] = useState(null);
  const [editMethod, setEditMethod] = useState(null);

  const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };

  const load = useCallback(async () => {
    if (!token) return;
    try {
      const [r, m] = await Promise.all([
        fetch('/api/admin/rooms', { headers }).then(r => r.json()),
        fetch('/api/admin/methods', { headers }).then(r => r.json()),
      ]);
      if (r.success) setRooms(r.data);
      else { localStorage.removeItem('nh_admin_token'); setToken(null); }
      if (m.success) setMethods(m.data);
    } catch { localStorage.removeItem('nh_admin_token'); setToken(null); }
  }, [token]);

  useEffect(() => { load(); }, [load]);

  if (!token) return <AdminLogin onLogin={setToken} />;

  const logout = () => { localStorage.removeItem('nh_admin_token'); setToken(null); };

  return (
    <div className="max-w-4xl mx-auto px-4 py-8">
      <div className="flex items-center justify-between mb-8">
        <div>
          <h1 className="text-2xl font-bold text-indigo-900">noting heal admin</h1>
          <p className="text-sm text-gray-500 mt-1">노팅 룸 & 노팅 방법 관리</p>
        </div>
        <div className="flex items-center gap-4">
          <a href="/" className="text-sm text-indigo-600 hover:underline">앱으로 돌아가기</a>
          <button onClick={logout} className="text-sm text-gray-400 hover:text-red-500">로그아웃</button>
        </div>
      </div>

      {/* Tabs */}
      <div className="flex gap-1 mb-6 bg-gray-100 rounded-lg p-1">
        {[['rooms', '노팅 룸 (' + rooms.length + ')'], ['methods', '노팅 방법 (' + methods.length + ')']].map(([key, label]) => (
          <button key={key} onClick={() => setTab(key)}
            className={`flex-1 py-2 rounded-md text-sm font-medium transition ${tab === key ? 'bg-white text-indigo-900 shadow-sm' : 'text-gray-500'}`}>
            {label}
          </button>
        ))}
      </div>

      {tab === 'rooms' && <RoomsTab rooms={rooms} onEdit={setEditRoom} onReload={load} />}
      {tab === 'methods' && <MethodsTab methods={methods} rooms={rooms} onEdit={setEditMethod} onReload={load} />}

      {editRoom && <RoomModal room={editRoom} onClose={() => setEditRoom(null)} onSave={load} />}
      {editMethod && <MethodModal method={editMethod} rooms={rooms} onClose={() => setEditMethod(null)} onSave={load} />}
    </div>
  );
}

// ========== Rooms Tab ==========
function RoomsTab({ rooms, onEdit, onReload }) {
  const floors = ['1F', '2F', '3F'];
  const handleNew = () => onEdit({ id: '', floor: '1F', theme: '감정 룸', title: '', description: '', conditions: {}, is_active: true, _isNew: true });
  const handleDelete = async (id) => {
    if (!confirm(`Room ${id}를 삭제하시겠습니까?`)) return;
    await fetch(`/api/admin/rooms/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${localStorage.getItem('nh_admin_token')}` } });
    onReload();
  };

  return (
    <div>
      <div className="flex justify-end mb-4">
        <button onClick={handleNew} className="bg-indigo-900 text-white px-4 py-2 rounded-lg text-sm">+ 새 방 추가</button>
      </div>
      {floors.map(floor => {
        const floorRooms = rooms.filter(r => r.floor === floor);
        if (floorRooms.length === 0) return null;
        const themeLabel = floor === '1F' ? '감정 룸' : floor === '2F' ? '공간 룸' : '시간 룸';
        return (
          <div key={floor} className="mb-6">
            <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">{floor} - {themeLabel}</h3>
            <div className="space-y-2">
              {floorRooms.map(room => (
                <div key={room.id} className={`border rounded-lg p-4 bg-white flex items-start gap-4 ${!room.is_active ? 'opacity-50' : ''}`}>
                  <div className="flex-1">
                    <div className="flex items-center gap-2 mb-1">
                      <span className="text-xs font-mono bg-indigo-50 text-indigo-800 px-2 py-0.5 rounded">Room {room.id}</span>
                      <span className="font-semibold">{room.title}</span>
                      {!room.is_active && <span className="text-[10px] bg-gray-200 px-2 py-0.5 rounded">비활성</span>}
                    </div>
                    <p className="text-sm text-gray-500">{room.description}</p>
                    <div className="flex flex-wrap gap-1 mt-2">
                      {(room.conditions?.emotions || []).map(e => (
                        <span key={e} className="text-[10px] bg-blue-50 text-blue-700 px-2 py-0.5 rounded-full">{EMOTION_KR[e] || e}</span>
                      ))}
                      {(room.conditions?.places || []).map(p => (
                        <span key={p} className="text-[10px] bg-green-50 text-green-700 px-2 py-0.5 rounded-full">{PLACE_KR[p] || p}</span>
                      ))}
                      {(room.conditions?.times || []).map(t => (
                        <span key={t} className="text-[10px] bg-amber-50 text-amber-700 px-2 py-0.5 rounded-full">{t}분</span>
                      ))}
                    </div>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={() => onEdit(room)} className="text-xs text-indigo-600 hover:underline">수정</button>
                    <button onClick={() => handleDelete(room.id)} className="text-xs text-red-400 hover:underline">삭제</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ========== Methods Tab ==========
function MethodsTab({ methods, rooms, onEdit, onReload }) {
  const handleNew = () => onEdit({ room_id: null, name: '', guide: '', places: [], emotions: [], times: [], is_active: true, _isNew: true });
  const handleDelete = async (id) => {
    if (!confirm('이 노팅 방법을 삭제하시겠습니까?')) return;
    await fetch(`/api/admin/methods/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${localStorage.getItem('nh_admin_token')}` } });
    onReload();
  };

  return (
    <div>
      <div className="flex justify-end mb-4">
        <button onClick={handleNew} className="bg-indigo-900 text-white px-4 py-2 rounded-lg text-sm">+ 새 노팅 방법 추가</button>
      </div>
      <div className="space-y-2">
        {methods.map(m => (
          <div key={m.id} className={`border rounded-lg p-4 bg-white ${!m.is_active ? 'opacity-50' : ''}`}>
            <div className="flex items-start justify-between gap-4">
              <div className="flex-1">
                <div className="flex items-center gap-2 mb-1">
                  <span className="font-semibold text-sm">{m.name}</span>
                  {m.room_id && <span className="text-[10px] bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded">Room {m.room_id} 전용</span>}
                  {!m.is_active && <span className="text-[10px] bg-gray-200 px-2 py-0.5 rounded">비활성</span>}
                </div>
                <p className="text-sm text-gray-500 mb-2">{m.guide}</p>
                <div className="flex flex-wrap gap-1">
                  {(m.places || []).map(p => (
                    <span key={p} className="text-[10px] bg-green-50 text-green-700 px-2 py-0.5 rounded-full">{PLACE_KR[p] || p}</span>
                  ))}
                  {(m.emotions || []).map(e => (
                    <span key={e} className="text-[10px] bg-blue-50 text-blue-700 px-2 py-0.5 rounded-full">{EMOTION_KR[e] || e}</span>
                  ))}
                  {(m.times || []).map(t => (
                    <span key={t} className="text-[10px] bg-amber-50 text-amber-700 px-2 py-0.5 rounded-full">{t}분</span>
                  ))}
                </div>
              </div>
              <div className="flex gap-2">
                <button onClick={() => onEdit(m)} className="text-xs text-indigo-600 hover:underline">수정</button>
                <button onClick={() => handleDelete(m.id)} className="text-xs text-red-400 hover:underline">삭제</button>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ========== Room Modal ==========
function RoomModal({ room, onClose, onSave }) {
  const defaultSteps = [{ name: '', guide: '' }, { name: '', guide: '' }, { name: '한 문장 노팅', guide: '지금 떠오르는 것을 한 문장으로 적어보세요.' }];
  const [form, setForm] = useState({
    id: room.id || '',
    floor: room.floor || '1F',
    theme: room.theme || '감정 층',
    title: room.title || '',
    description: room.description || '',
    conditions: room.conditions || {},
    steps: (room.steps && room.steps.length > 0) ? room.steps : defaultSteps,
    is_active: room.is_active !== false,
  });
  const [saving, setSaving] = useState(false);

  const floorThemes = { '1F': '감정 층', '2F': '공간 층', '3F': '시간 층' };

  const updateStep = (idx, field, val) => {
    setForm(prev => {
      const steps = [...prev.steps];
      steps[idx] = { ...steps[idx], [field]: val };
      return { ...prev, steps };
    });
  };
  const setFloor = (f) => setForm(prev => ({ ...prev, floor: f, theme: floorThemes[f] }));

  const toggleCondition = (type, val) => {
    setForm(prev => {
      const arr = prev.conditions[type] || [];
      const next = arr.includes(val) ? arr.filter(v => v !== val) : [...arr, val];
      return { ...prev, conditions: { ...prev.conditions, [type]: next } };
    });
  };

  const handleSave = async () => {
    setSaving(true);
    const url = room._isNew ? '/api/admin/rooms' : `/api/admin/rooms/${room.id}`;
    const method = room._isNew ? 'POST' : 'PUT';
    await fetch(url, { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('nh_admin_token')}` }, body: JSON.stringify(form) });
    await onSave();
    setSaving(false);
    onClose();
  };

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-xl w-full max-w-lg max-h-[90vh] overflow-y-auto p-6" onClick={e => e.stopPropagation()}>
        <h2 className="text-lg font-bold mb-4">{room._isNew ? '새 방 추가' : `Room ${room.id} 수정`}</h2>

        <div className="space-y-4">
          {room._isNew && (
            <div>
              <label className="text-xs font-medium text-gray-500 block mb-1">방 번호</label>
              <input type="number" value={form.id} onChange={e => setForm(prev => ({ ...prev, id: parseInt(e.target.value) || '' }))}
                className="w-full border rounded-lg px-3 py-2 text-sm" placeholder="예: 106" />
            </div>
          )}

          <div>
            <label className="text-xs font-medium text-gray-500 block mb-1">층</label>
            <div className="flex gap-2">
              {['1F', '2F', '3F'].map(f => (
                <button key={f} onClick={() => setFloor(f)}
                  className={`px-4 py-2 rounded-lg text-sm border ${form.floor === f ? 'bg-indigo-900 text-white border-indigo-900' : 'border-gray-200'}`}>
                  {f} {floorThemes[f]}
                </button>
              ))}
            </div>
          </div>

          <div>
            <label className="text-xs font-medium text-gray-500 block mb-1">제목</label>
            <input value={form.title} onChange={e => setForm(prev => ({ ...prev, title: e.target.value }))}
              className="w-full border rounded-lg px-3 py-2 text-sm" placeholder="예: 비교" />
          </div>

          <div>
            <label className="text-xs font-medium text-gray-500 block mb-1">설명</label>
            <input value={form.description} onChange={e => setForm(prev => ({ ...prev, description: e.target.value }))}
              className="w-full border rounded-lg px-3 py-2 text-sm" placeholder="예: SNS 보다 내가 작아질 때" />
          </div>

          {/* 3-STEP 노팅 방법 */}
          <div>
            <label className="text-xs font-medium text-gray-500 block mb-2">3-STEP 노팅 방법</label>
            {form.steps.map((step, idx) => (
              <div key={idx} className="mb-3 p-3 rounded-lg bg-gray-50">
                <p className="text-[10px] font-semibold text-gray-400 mb-1">Step {idx + 1}</p>
                <input value={step.name} onChange={e => updateStep(idx, 'name', e.target.value)}
                  className="w-full border rounded px-2 py-1.5 text-sm mb-1" placeholder="스텝 이름 (예: 발바닥 착지)" />
                <textarea value={step.guide} onChange={e => updateStep(idx, 'guide', e.target.value)}
                  className="w-full border rounded px-2 py-1.5 text-sm resize-none" rows={2} placeholder="가이드 텍스트" />
              </div>
            ))}
          </div>

          <div>
            <label className="text-xs font-medium text-gray-500 block mb-2">입장 조건 - 감정</label>
            <div className="flex flex-wrap gap-1">
              {EMOTIONS.map(e => (
                <button key={e} onClick={() => toggleCondition('emotions', e)}
                  className={`text-xs px-3 py-1 rounded-full border ${(form.conditions.emotions || []).includes(e) ? 'bg-blue-600 text-white border-blue-600' : 'border-gray-200'}`}>
                  {EMOTION_KR[e]}
                </button>
              ))}
            </div>
          </div>

          <div>
            <label className="text-xs font-medium text-gray-500 block mb-2">입장 조건 - 공간</label>
            <div className="flex flex-wrap gap-1">
              {PLACES.map(p => (
                <button key={p} onClick={() => toggleCondition('places', p)}
                  className={`text-xs px-3 py-1 rounded-full border ${(form.conditions.places || []).includes(p) ? 'bg-green-600 text-white border-green-600' : 'border-gray-200'}`}>
                  {PLACE_KR[p]}
                </button>
              ))}
            </div>
          </div>

          <div>
            <label className="text-xs font-medium text-gray-500 block mb-2">입장 조건 - 시간</label>
            <div className="flex flex-wrap gap-1">
              {TIMES.map(t => (
                <button key={t} onClick={() => toggleCondition('times', t)}
                  className={`text-xs px-3 py-1 rounded-full border ${(form.conditions.times || []).includes(t) ? 'bg-amber-600 text-white border-amber-600' : 'border-gray-200'}`}>
                  {t}분
                </button>
              ))}
            </div>
          </div>

          <div className="flex items-center gap-2">
            <input type="checkbox" checked={form.is_active} onChange={e => setForm(prev => ({ ...prev, is_active: e.target.checked }))} id="room-active" />
            <label htmlFor="room-active" className="text-sm">활성 상태</label>
          </div>
        </div>

        <div className="flex gap-2 mt-6">
          <button onClick={handleSave} disabled={saving} className="flex-1 bg-indigo-900 text-white py-2 rounded-lg text-sm">
            {saving ? '저장 중...' : '저장'}
          </button>
          <button onClick={onClose} className="flex-1 border py-2 rounded-lg text-sm text-gray-500">취소</button>
        </div>
      </div>
    </div>
  );
}

// ========== Method Modal ==========
function MethodModal({ method, rooms, onClose, onSave }) {
  const [form, setForm] = useState({
    room_id: method.room_id || '',
    name: method.name || '',
    guide: method.guide || '',
    places: method.places || [],
    emotions: method.emotions || [],
    times: method.times || [],
    is_active: method.is_active !== false,
  });
  const [saving, setSaving] = useState(false);

  const toggleArr = (key, val) => {
    setForm(prev => {
      const arr = prev[key];
      return { ...prev, [key]: arr.includes(val) ? arr.filter(v => v !== val) : [...arr, val] };
    });
  };

  const handleSave = async () => {
    setSaving(true);
    const url = method._isNew ? '/api/admin/methods' : `/api/admin/methods/${method.id}`;
    const meth = method._isNew ? 'POST' : 'PUT';
    await fetch(url, { method: meth, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('nh_admin_token')}` }, body: JSON.stringify(form) });
    await onSave();
    setSaving(false);
    onClose();
  };

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-xl w-full max-w-lg max-h-[90vh] overflow-y-auto p-6" onClick={e => e.stopPropagation()}>
        <h2 className="text-lg font-bold mb-4">{method._isNew ? '새 노팅 방법 추가' : '노팅 방법 수정'}</h2>

        <div className="space-y-4">
          <div>
            <label className="text-xs font-medium text-gray-500 block mb-1">이름</label>
            <input value={form.name} onChange={e => setForm(prev => ({ ...prev, name: e.target.value }))}
              className="w-full border rounded-lg px-3 py-2 text-sm" placeholder="예: 복식호흡 3분" />
          </div>

          <div>
            <label className="text-xs font-medium text-gray-500 block mb-1">가이드 텍스트</label>
            <textarea value={form.guide} onChange={e => setForm(prev => ({ ...prev, guide: e.target.value }))}
              className="w-full border rounded-lg px-3 py-2 text-sm resize-none" rows={3}
              placeholder="예: 편하게 누워서 배 위에 손을 올려보세요..." />
          </div>

          <div>
            <label className="text-xs font-medium text-gray-500 block mb-1">전용 방 (선택사항)</label>
            <select value={form.room_id} onChange={e => setForm(prev => ({ ...prev, room_id: e.target.value ? parseInt(e.target.value) : null }))}
              className="w-full border rounded-lg px-3 py-2 text-sm">
              <option value="">공통 (모든 방에서 사용)</option>
              {rooms.map(r => <option key={r.id} value={r.id}>Room {r.id} - {r.title}</option>)}
            </select>
          </div>

          <div>
            <label className="text-xs font-medium text-gray-500 block mb-2">매칭 조건 - 공간</label>
            <div className="flex flex-wrap gap-1">
              {PLACES.map(p => (
                <button key={p} onClick={() => toggleArr('places', p)}
                  className={`text-xs px-3 py-1 rounded-full border ${form.places.includes(p) ? 'bg-green-600 text-white border-green-600' : 'border-gray-200'}`}>
                  {PLACE_KR[p]}
                </button>
              ))}
            </div>
          </div>

          <div>
            <label className="text-xs font-medium text-gray-500 block mb-2">매칭 조건 - 감정</label>
            <div className="flex flex-wrap gap-1">
              {EMOTIONS.map(e => (
                <button key={e} onClick={() => toggleArr('emotions', e)}
                  className={`text-xs px-3 py-1 rounded-full border ${form.emotions.includes(e) ? 'bg-blue-600 text-white border-blue-600' : 'border-gray-200'}`}>
                  {EMOTION_KR[e]}
                </button>
              ))}
            </div>
          </div>

          <div>
            <label className="text-xs font-medium text-gray-500 block mb-2">매칭 조건 - 시간</label>
            <div className="flex flex-wrap gap-1">
              {TIMES.map(t => (
                <button key={t} onClick={() => toggleArr('times', t)}
                  className={`text-xs px-3 py-1 rounded-full border ${form.times.includes(t) ? 'bg-amber-600 text-white border-amber-600' : 'border-gray-200'}`}>
                  {t}분
                </button>
              ))}
            </div>
          </div>

          <div className="flex items-center gap-2">
            <input type="checkbox" checked={form.is_active} onChange={e => setForm(prev => ({ ...prev, is_active: e.target.checked }))} id="method-active" />
            <label htmlFor="method-active" className="text-sm">활성 상태</label>
          </div>
        </div>

        <div className="flex gap-2 mt-6">
          <button onClick={handleSave} disabled={saving} className="flex-1 bg-indigo-900 text-white py-2 rounded-lg text-sm">
            {saving ? '저장 중...' : '저장'}
          </button>
          <button onClick={onClose} className="flex-1 border py-2 rounded-lg text-sm text-gray-500">취소</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
