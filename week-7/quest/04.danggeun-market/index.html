    // ========================================
    // Auth Context
    // ========================================
    const AuthContext = createContext(null);

    function AuthProvider({ children }) {
      const [user, setUser] = useState(() => {
        const saved = localStorage.getItem('karrot_user');
        return saved ? JSON.parse(saved) : null;
      });
      const [token, setToken] = useState(() => localStorage.getItem('karrot_token') || null);

      const login = useCallback(async (email, password) => {
        try {
          const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json();
          if (data.success) {
            setUser(data.data.user);
            setToken(data.data.token);
            localStorage.setItem('karrot_user', JSON.stringify(data.data.user));
            localStorage.setItem('karrot_token', data.data.token);
            return { success: true };
          }
          return { success: false, message: data.message };
        } catch {
          return { success: false, message: '서버 연결에 실패했습니다.' };
        }
      }, []);

      const signup = useCallback(async (email, password, nickname, location) => {
        try {
          const res = await fetch('/api/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password, nickname, location }),
          });
          const data = await res.json();
          if (data.success) {
            setUser(data.data.user);
            setToken(data.data.token);
            localStorage.setItem('karrot_user', JSON.stringify(data.data.user));
            localStorage.setItem('karrot_token', data.data.token);
            return { success: true };
          }
          return { success: false, message: data.message };
        } catch {
          return { success: false, message: '서버 연결에 실패했습니다.' };
        }
      }, []);

      const logout = useCallback(() => {
        setUser(null);
        setToken(null);
        localStorage.removeItem('karrot_user');
        localStorage.removeItem('karrot_token');
      }, []);

      const updateLocation = useCallback((location) => {
        if (user) {
          const updated = { ...user, location };
          setUser(updated);
          localStorage.setItem('karrot_user', JSON.stringify(updated));
        }
      }, [user]);

      return (
        <AuthContext.Provider value={{ user, token, login, signup, logout, updateLocation }}>
          {children}
        </AuthContext.Provider>
      );
    }

    function useAuth() {
      return useContext(AuthContext);
    }

    const RouterContext = createContext({ path: '#home', navigate: () => {} });

    function Router({ children }) {
      const [path, setPath] = useState(window.location.hash || '#home');

      useEffect(() => {
        const handler = () => setPath(window.location.hash || '#home');
        window.addEventListener('hashchange', handler);
        if (!window.location.hash) window.location.hash = '#home';
        return () => window.removeEventListener('hashchange', handler);
      }, []);

      const navigate = useCallback((hash) => {
        window.location.hash = hash;
      }, []);

      return (
        <RouterContext.Provider value={{ path, navigate }}>
          {children}
        </RouterContext.Provider>
      );
    }

    function useRouter() {
      return useContext(RouterContext);

      '취미/게임/음반', '뷰티/미용', '반려동물용품', '도서/티켓/음반',
      '식물', '기타 중고물품', '삽니다',

    // ========================================
    // Utility Functions
    // ========================================
    function formatPrice(price) {
      if (price === 0) return '나눔';
      return price.toLocaleString() + '원';
    }

    function getTimeAgo(dateStr) {
      const now = new Date();
      const date = new Date(dateStr);
      const diff = Math.floor((now - date) / 1000);
      if (diff < 60) return '방금 전';
      if (diff < 3600) return `${Math.floor(diff / 60)}분 전`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}시간 전`;
      if (diff < 604800) return `${Math.floor(diff / 86400)}일 전`;
      return `${Math.floor(diff / 2592000)}달 전`;
    }

    // ========================================
    // Products Context (Global Store)
    // ========================================
    const ProductsContext = createContext(null);

    function ProductsProvider({ children }) {
      const [serverProducts, setServerProducts] = useState([]);
      const [likedIds, setLikedIds] = useState(() => {
        const saved = localStorage.getItem('karrot_liked');
        return saved ? JSON.parse(saved) : [];
      });
      const { token } = useAuth();

      const fetchProducts = useCallback(async () => {
        try {
          const res = await fetch('/api/products');
          const data = await res.json();
          if (data.success) {
            setServerProducts(data.data.map(p => ({
              id: 'srv_' + p.id,
              serverId: p.id,
              title: p.title,
              price: p.price,
              description: p.description,
              category: p.category,
              images: p.images || [],
              image: (p.images && p.images[0]) || PRODUCT_IMAGES[0],
              status: p.status,
              likes: p.likes,
              chats: p.chats,
              location: p.location,
              nickname: p.nickname,
              authorName: p.nickname,
              mannerTemp: p.manner_temp,
              userId: p.user_id,
              createdAt: p.created_at,
              time: getTimeAgo(p.created_at),
              isServer: true,
            })));
          }
        } catch {}
      }, []);

      useEffect(() => { fetchProducts(); }, [fetchProducts]);

      const products = useMemo(() => [...serverProducts, ...DUMMY_PRODUCTS], [serverProducts]);

      useEffect(() => {
        localStorage.setItem('karrot_liked', JSON.stringify(likedIds));
      }, [likedIds]);

      const addProduct = useCallback(async (product) => {
        try {
          const res = await fetch('/api/products', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
            body: JSON.stringify(product),
          });
          const data = await res.json();
          if (data.success) { await fetchProducts(); return { success: true }; }
          return { success: false, message: data.message };
        } catch { return { success: false, message: '상품 등록에 실패했습니다.' }; }
      }, [token, fetchProducts]);

      const deleteProduct = useCallback(async (serverId) => {
        try {
          const res = await fetch('/api/products/' + serverId, {
            method: 'DELETE',
            headers: { Authorization: 'Bearer ' + token },
          });
          const data = await res.json();
          if (data.success) { await fetchProducts(); return { success: true }; }
          return { success: false, message: data.message };
        } catch { return { success: false, message: '삭제에 실패했습니다.' }; }
      }, [token, fetchProducts]);

      const updateProduct = useCallback(async (serverId, updates) => {
        try {
          const res = await fetch('/api/products/' + serverId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
            body: JSON.stringify(updates),
          });
          const data = await res.json();
          if (data.success) { await fetchProducts(); return { success: true }; }
          return { success: false, message: data.message };
        } catch { return { success: false, message: '수정에 실패했습니다.' }; }
      }, [token, fetchProducts]);

      const toggleLike = useCallback((id) => {
        setLikedIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
      }, []);

      const isLiked = useCallback((id) => likedIds.includes(id), [likedIds]);

      return (
        <ProductsContext.Provider value={{ products, addProduct, deleteProduct, updateProduct, toggleLike, isLiked, likedIds, fetchProducts }}>
          {children}
        </ProductsContext.Provider>
      );
    }

    function useProducts() {
      return useContext(ProductsContext);
    }

    // ========================================
    // Page: Home (Product Feed)
    // ========================================
    function HomePage() {
      const { products } = useProducts();
      const { navigate } = useRouter();
      const { user } = useAuth();
      const [searchQuery, setSearchQuery] = useState('');
      const [showSearch, setShowSearch] = useState(false);
      const [selectedCategory, setSelectedCategory] = useState('전체');

      const allCategories = useMemo(() => {
        const cats = new Set(products.map(p => p.category).filter(Boolean));
        return ['전체', ...Array.from(cats)];
      }, [products]);

      const filteredProducts = useMemo(() => {
        let result = [...products];
        if (selectedCategory !== '전체') {
          result = result.filter(p => p.category === selectedCategory);
        }
        if (searchQuery.trim()) {
          const q = searchQuery.toLowerCase();
          result = result.filter(p =>
            p.title.toLowerCase().includes(q) ||
            (p.description && p.description.toLowerCase().includes(q)) ||
            (p.category && p.category.toLowerCase().includes(q))
          );
        }
        result.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
        return result;
      }, [products, searchQuery, selectedCategory]);

      return (
        <div className="pb-[70px]">

            <div className="flex items-center justify-between h-[52px] px-4">

                <button className="p-1.5" onClick={() => setShowSearch(!showSearch)}>

                <button className="p-1.5 relative">
                  <Icons.Bell />
                  <span className="absolute top-1 right-1 w-2 h-2 bg-karrot rounded-full"></span>

      const { user } = useAuth();
      const product = products.find(p => p.id === productId);
      const liked = isLiked(productId);

      const [deleting, setDeleting] = useState(false);
      const touchRef = useRef({ startX: 0, startY: 0 });

      const isOwner = user && product?.isServer && product?.userId === user.id;
      const allImages = product?.images?.length > 0 ? product.images : (product?.image ? [product.image] : [PRODUCT_IMAGES[0]]);
      const mannerTemp = product?.mannerTemp || 36.5;
      const tempColor = mannerTemp >= 40 ? 'text-orange-500' : mannerTemp >= 37 ? 'text-karrot' : 'text-blue-500';
      const tempBarW = Math.min(Math.max(((mannerTemp - 30) / 20) * 100, 5), 100);

      const handleDelete = async () => {
        if (!confirm('정말 삭제하시겠습니까?')) return;
        setDeleting(true);
        const result = await deleteProduct(product.serverId);
        if (result.success) navigate('#home');
        else { alert(result.message); setDeleting(false); }
      };

      const onTouchStart = (e) => {
        touchRef.current.startX = e.touches[0].clientX;
        touchRef.current.startY = e.touches[0].clientY;
      };
      const onTouchEnd = (e) => {
        const dx = e.changedTouches[0].clientX - touchRef.current.startX;
        const dy = e.changedTouches[0].clientY - touchRef.current.startY;
        if (Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx)) return;
        if (dx < 0 && imgIdx < allImages.length - 1) setImgIdx(i => i + 1);
        if (dx > 0 && imgIdx > 0) setImgIdx(i => i - 1);
      };

      if (!product) {
        return (
          <div className="flex flex-col items-center justify-center h-screen">
            <p className="text-karrot-sub">상품을 찾을 수 없습니다.</p>

            </div>
            {allImages.length > 1 && (
              <>
                <div className="absolute bottom-3 left-1/2 -translate-x-1/2 bg-black/30 rounded-full px-2.5 py-1 flex gap-1.5">

                    <button key={i} onClick={() => setImgIdx(i)} className={`w-1.5 h-1.5 rounded-full transition-all ${i === imgIdx ? 'bg-white w-4' : 'bg-white/50'}`} />

                이 게시글에 관심이 있다면 관심 버튼을 눌러보세요.
              </p>
            </div>

    // ========================================
    // Page: Chat Room (1:1 Messaging)
    // ========================================
    function ChatRoomPage({ roomId }) {
      const { navigate } = useRouter();
      const { user, token } = useAuth();
      const [messages, setMessages] = useState([]);
      const [roomInfo, setRoomInfo] = useState(null);
      const [input, setInput] = useState('');
      const [sending, setSending] = useState(false);
      const messagesEndRef = useRef(null);
      const lastTimestamp = useRef('1970-01-01');

      const partnerName = roomInfo
        ? (roomInfo.buyer_id === user?.id ? roomInfo.seller_name : roomInfo.buyer_name)
        : '';

      const fetchMessages = useCallback(async (isInitial) => {
        if (!token) return;
        const after = isInitial ? '1970-01-01' : lastTimestamp.current;
        try {
          const res = await fetch(`/api/chat/rooms/${roomId}/messages?after=${encodeURIComponent(after)}`, {
            headers: { Authorization: 'Bearer ' + token },
          });
          const data = await res.json();
          if (data.success) {
            if (isInitial) {
              setRoomInfo(data.data.room);
              setMessages(data.data.messages);
            } else if (data.data.messages.length > 0) {
              setMessages(prev => [...prev, ...data.data.messages]);
            }
            const msgs = data.data.messages;
            if (msgs.length > 0) lastTimestamp.current = msgs[msgs.length - 1].created_at;
          }
        } catch {}
      }, [token, roomId]);

      useEffect(() => { fetchMessages(true); }, [fetchMessages]);

      // Polling every 2s
      useEffect(() => {
        const timer = setInterval(() => fetchMessages(false), 2000);
        return () => clearInterval(timer);
      }, [fetchMessages]);

      // Auto-scroll
      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      const handleSend = async () => {
        if (!input.trim() || sending) return;
        setSending(true);
        try {
          const res = await fetch(`/api/chat/rooms/${roomId}/messages`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
            body: JSON.stringify({ content: input.trim() }),
          });
          const data = await res.json();
          if (data.success) {
            setMessages(prev => [...prev, { ...data.data, sender_name: user.nickname }]);
            lastTimestamp.current = data.data.created_at;
            setInput('');
          }
        } catch {}
        setSending(false);
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
      };

      const formatTime = (ts) => {
        const d = new Date(ts);
        return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: true });
      };

      const formatDateSeparator = (ts) => {
        const d = new Date(ts);
        return d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
      };

      const getDateKey = (ts) => new Date(ts).toDateString();

      return (
        <div className="flex flex-col h-screen bg-[#f5ede6]">
          {/* Header */}
          <header className="sticky top-0 z-30 bg-white border-b border-karrot-border flex-shrink-0">
            <div className="flex items-center h-[52px] px-4">
              <button onClick={() => navigate('#chat')} className="p-1 -ml-1"><Icons.Back /></button>
              <h1 className="ml-2 font-bold text-base flex-1">{partnerName || '채팅'}</h1>
            </div>
            {roomInfo && (
              <div
                onClick={() => navigate('#product-detail-srv_' + roomInfo.product_id)}
                className="flex items-center gap-3 px-4 py-2 bg-gray-50 border-b border-karrot-divider cursor-pointer"
              >
                <img src={roomInfo.product_images?.[0] || PRODUCT_IMAGES[0]} className="w-10 h-10 rounded-md object-cover bg-gray-200" />
                <div className="flex-1 min-w-0">
                  <p className="text-[13px] text-karrot-text truncate">{roomInfo.product_title}</p>
                  <p className="text-[12px] font-bold">{formatPrice(roomInfo.product_price)}</p>
                </div>
              </div>
            )}
          </header>

          {/* Messages */}
          <div className="flex-1 overflow-y-auto px-4 py-3 hide-scrollbar">
            {messages.length === 0 && (
              <div className="flex justify-center py-8">
                <p className="text-xs text-karrot-sub bg-white/60 px-3 py-1.5 rounded-full">채팅을 시작해보세요</p>
              </div>
            )}
            {messages.map((msg, idx) => {
              const isMine = msg.sender_id === user?.id;
              const showDate = idx === 0 || getDateKey(msg.created_at) !== getDateKey(messages[idx - 1].created_at);
              return (
                <React.Fragment key={msg.id}>
                  {showDate && (
                    <div className="flex justify-center my-4">
                      <span className="text-[11px] text-karrot-sub bg-white/60 px-3 py-1 rounded-full">{formatDateSeparator(msg.created_at)}</span>
                    </div>
                  )}
                  <div className={`flex mb-2 ${isMine ? 'justify-end' : 'justify-start'}`}>
                    {!isMine && (
                      <div className="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-sm mr-2 flex-shrink-0 mt-0.5">👤</div>
                    )}
                    <div className={`flex flex-col ${isMine ? 'items-end' : 'items-start'} max-w-[70%]`}>
                      {!isMine && <span className="text-[11px] text-karrot-sub mb-0.5 ml-0.5">{msg.sender_name}</span>}
                      <div className={`flex items-end gap-1.5 ${isMine ? 'flex-row-reverse' : ''}`}>
                        <div className={`px-3 py-2 rounded-2xl text-[14px] leading-relaxed break-words ${
                          isMine ? 'bg-karrot text-white rounded-tr-sm' : 'bg-white text-karrot-text rounded-tl-sm shadow-sm'
                        }`}>
                          {msg.content}
                        </div>
                        <span className="text-[10px] text-karrot-sub flex-shrink-0">{formatTime(msg.created_at)}</span>
                      </div>
                    </div>
                  </div>
                </React.Fragment>
              );
            })}
            <div ref={messagesEndRef} />
          </div>

          {/* Input */}
          <div className="flex-shrink-0 bg-white border-t border-karrot-border px-3 py-2 bottom-tab-safe">
            <div className="flex items-end gap-2">
              <textarea
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={handleKeyDown}
                placeholder="메시지 보내기"
                rows={1}
                className="flex-1 px-3 py-2.5 bg-gray-100 rounded-2xl text-[14px] placeholder-karrot-sub resize-none max-h-[100px]"
                style={{ minHeight: '40px' }}
              />
              <button
                onClick={handleSend}
                disabled={!input.trim() || sending}
                className={`w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0 transition ${
                  input.trim() ? 'bg-karrot' : 'bg-gray-200'
                }`}
              >
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // Page: Write (Create Product)
    // ========================================
    function WritePage() {
      const { navigate } = useRouter();
      const { addProduct } = useProducts();
      const { user } = useAuth();
      const [title, setTitle] = useState('');
      const [price, setPrice] = useState('');
      const [category, setCategory] = useState('');
      const [content, setContent] = useState('');
      const [isFree, setIsFree] = useState(false);
      const [showCategoryPicker, setShowCategoryPicker] = useState(false);
      const [imageFiles, setImageFiles] = useState([]);
      const [imagePreviews, setImagePreviews] = useState([]);
      const [submitting, setSubmitting] = useState(false);
      const fileInputRef = useRef(null);

      const canSubmit = title.trim() && category && (isFree || price) && !submitting;

      const handleImageSelect = (e) => {
        const files = Array.from(e.target.files);
        const remaining = 3 - imageFiles.length;
        const selected = files.slice(0, remaining);
        const newFiles = [...imageFiles, ...selected];
        setImageFiles(newFiles);
        const newPreviews = [...imagePreviews];
        selected.forEach(f => newPreviews.push(URL.createObjectURL(f)));
        setImagePreviews(newPreviews);
        e.target.value = '';
      };

      const removeImage = (idx) => {
        URL.revokeObjectURL(imagePreviews[idx]);
        setImageFiles(prev => prev.filter((_, i) => i !== idx));
        setImagePreviews(prev => prev.filter((_, i) => i !== idx));
      };

      const handleSubmit = async () => {
        if (!canSubmit) return;
        setSubmitting(true);
        try {
          let imageUrls = [];
          if (imageFiles.length > 0) {
            const formData = new FormData();
            imageFiles.forEach(f => formData.append('images', f));
            const uploadRes = await fetch('/api/upload', { method: 'POST', body: formData });
            const uploadData = await uploadRes.json();
            if (uploadData.success) imageUrls = uploadData.data.urls;
          }
          const result = await addProduct({
            title: title.trim(),
            price: isFree ? 0 : parseInt(price.replace(/,/g, ''), 10),
            description: content.trim(),
            category,
            images: imageUrls,
          });
          if (result.success) navigate('#home');
          else alert(result.message || '등록 실패');
        } catch { alert('상품 등록 중 오류가 발생했습니다.'); }
        setSubmitting(false);
      };

      const handlePriceChange = (e) => {
        const raw = e.target.value.replace(/[^0-9]/g, '');
        if (raw) {
          setPrice(parseInt(raw, 10).toLocaleString());
        } else {
          setPrice('');
        }
      };

      return (
        <div className="pb-[80px]">
          <header className="sticky top-0 z-30 bg-white border-b border-karrot-border">
            <div className="flex items-center justify-between h-[52px] px-4">
              <button onClick={() => navigate('#home')} className="p-1 -ml-1">
                <Icons.Close />
              </button>
              <h1 className="font-bold text-base">내 물건 팔기</h1>
              <button
                onClick={handleSubmit}
                disabled={!canSubmit}
                className={`text-sm font-semibold px-1 ${canSubmit ? 'text-karrot' : 'text-gray-300'}`}
              >
                {submitting ? '등록중...' : '완료'}
              </button>
            </div>
          </header>

          <div className="px-4 py-4">
            {/* Image Upload Area */}
            <input ref={fileInputRef} type="file" accept="image/*" multiple className="hidden" onChange={handleImageSelect} />
            <div className="flex gap-2 mb-5 overflow-x-auto hide-scrollbar">
              {imageFiles.length < 3 && (
                <button
                  onClick={() => fileInputRef.current?.click()}
                  className="w-[72px] h-[72px] rounded-xl border-2 border-dashed border-gray-300 flex flex-col items-center justify-center gap-1 flex-shrink-0"
                >
                  <Icons.Camera />
                  <span className="text-[11px] text-karrot-sub">{imageFiles.length}/3</span>
                </button>
              )}
              {imagePreviews.map((src, idx) => (
                <div key={idx} className="relative w-[72px] h-[72px] flex-shrink-0">
                  <img src={src} className="w-full h-full rounded-xl object-cover" />
                  {idx === 0 && (
                    <span className="absolute bottom-0 left-0 right-0 bg-karrot text-white text-[10px] text-center rounded-b-xl py-0.5">대표</span>
                  )}
                  <button
                    onClick={() => removeImage(idx)}
                    className="absolute -top-1.5 -right-1.5 w-5 h-5 bg-gray-700 text-white rounded-full text-[11px] flex items-center justify-center"
                  >×</button>
                </div>
              ))}
            </div>

            {/* Title */}
            <input
              type="text"
              placeholder="글 제목"
              value={title}
              onChange={(e) => setTitle(e.target.value)}
              className="w-full text-[16px] py-3 border-b border-karrot-divider placeholder-gray-400"
            />

            {/* Category */}
            <button
              onClick={() => setShowCategoryPicker(true)}
              className="w-full flex items-center justify-between py-3 border-b border-karrot-divider"
            >
              <span className={`text-[15px] ${category ? 'text-karrot-text' : 'text-gray-400'}`}>
                {category || '카테고리 선택'}
              </span>
              <Icons.ChevronRight />
            </button>

            {/* Price */}
            <div className="py-3 border-b border-karrot-divider">
              <div className="flex items-center gap-2">
                <span className="text-[15px] text-karrot-sub">&#8361;</span>
                <input
                  type="text"
                  placeholder="가격 (선택사항)"
                  value={isFree ? '' : price}
                  onChange={handlePriceChange}
                  disabled={isFree}
                  className={`flex-1 text-[15px] placeholder-gray-400 ${isFree ? 'bg-gray-100 rounded px-2' : ''}`}
                />
              </div>
              <label className="flex items-center gap-2 mt-2.5 cursor-pointer">
                <input
                  type="checkbox"
                  checked={isFree}
                  onChange={(e) => setIsFree(e.target.checked)}
                  className="w-5 h-5 rounded border-gray-300 text-karrot accent-karrot"
                />
                <span className="text-[14px] text-karrot-text">나눔</span>
              </label>
            </div>

            {/* Content */}
            <textarea
              placeholder={`${user?.location}에 올릴 게시글 내용을 작성해 주세요. (판매 금지 물품은 게시가 제한될 수 있어요.)\n\n신뢰할 수 있는 거래를 위해 자세히 적어주세요.`}
              value={content}
              onChange={(e) => setContent(e.target.value)}
              rows={8}
              className="w-full text-[15px] py-3 placeholder-gray-400 resize-none leading-relaxed"
            />
          </div>

          {/* Loading Overlay */}
          {submitting && (
            <div className="fixed inset-0 z-50 bg-black/30 flex items-center justify-center">
              <div className="bg-white rounded-2xl px-8 py-6 flex flex-col items-center gap-3 shadow-xl">
                <div className="w-8 h-8 border-3 border-karrot border-t-transparent rounded-full animate-spin"></div>
                <p className="text-sm text-karrot-text font-medium">상품 등록 중...</p>
              </div>
            </div>
          )}

          {/* Category Picker Modal */}
          {showCategoryPicker && (
            <div className="fixed inset-0 z-50 bg-black/40 flex items-end justify-center" onClick={() => setShowCategoryPicker(false)}>
              <div
                className="w-full max-w-[430px] bg-white rounded-t-2xl max-h-[70vh] slide-up"
                onClick={(e) => e.stopPropagation()}
              >
                <div className="flex items-center justify-between px-4 py-3 border-b border-karrot-divider">
                  <h3 className="font-bold text-base">카테고리 선택</h3>
                  <button onClick={() => setShowCategoryPicker(false)} className="p-1"><Icons.Close /></button>
                </div>
                <div className="overflow-y-auto max-h-[60vh]">
                  {CATEGORIES.map(cat => (
                    <button
                      key={cat}
                      onClick={() => { setCategory(cat); setShowCategoryPicker(false); }}
                      className={`w-full text-left px-4 py-3.5 border-b border-karrot-divider text-[14px] active:bg-gray-50 ${
                        category === cat ? 'text-karrot font-semibold' : 'text-karrot-text'
                      }`}
                    >
                      {cat}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // Page: Login
    // ========================================
    function LoginPage() {
      const { navigate } = useRouter();
      const { login } = useAuth();
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');

      const [loading, setLoading] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        if (!email.trim() || !password) {
          setError('이메일과 비밀번호를 입력해주세요.');
          return;
        }
        setLoading(true);
        const result = await login(email.trim(), password);
        if (result.success) {
          navigate('#home');
        } else {
          setError(result.message);
        }
        setLoading(false);
      };

      return (
        <div className="min-h-screen bg-white">
          <header className="flex items-center h-[52px] px-4">
            <button onClick={() => navigate('#home')} className="p-1 -ml-1"><Icons.Close /></button>
          </header>

          <div className="px-6 pt-4 pb-8">
            <div className="flex flex-col items-center mb-10">
              <div className="w-16 h-16 bg-karrot rounded-2xl flex items-center justify-center mb-4">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
                  <path d="M12 2C6.48 2 2 6 2 11c0 2.8 1.3 5.3 3.4 7l-.4 4 4-2c.9.3 1.9.4 3 .4 5.52 0 10-4 10-9.4C22 6 17.52 2 12 2z" fill="white"/>
                </svg>
              </div>
              <h1 className="text-2xl font-bold text-karrot-text">당근마켓</h1>
              <p className="text-sm text-karrot-sub mt-1">내 근처에서 찾는 중고거래</p>
            </div>

            <form onSubmit={handleLogin} className="space-y-3">
              <div>
                <input
                  type="email"
                  placeholder="이메일"
                  value={email}
                  onChange={(e) => { setEmail(e.target.value); setError(''); }}
                  className="w-full px-4 py-3.5 bg-gray-100 rounded-xl text-[15px] placeholder-gray-400 focus:ring-2 focus:ring-karrot focus:bg-white transition"
                />
              </div>
              <div>
                <input
                  type="password"
                  placeholder="비밀번호"
                  value={password}
                  onChange={(e) => { setPassword(e.target.value); setError(''); }}
                  className="w-full px-4 py-3.5 bg-gray-100 rounded-xl text-[15px] placeholder-gray-400 focus:ring-2 focus:ring-karrot focus:bg-white transition"
                />
              </div>

              {error && (
                <p className="text-red-500 text-[13px] px-1 fade-in">{error}</p>
              )}

              <button
                type="submit"
                disabled={loading}
                className="w-full py-3.5 bg-karrot text-white rounded-xl font-semibold text-[15px] active:bg-karrot-dark transition mt-2 disabled:opacity-60"
              >
                {loading ? '로그인 중...' : '로그인'}
              </button>
            </form>

            <div className="mt-6 text-center">
              <p className="text-sm text-karrot-sub">
                아직 계정이 없으신가요?{' '}
                <button onClick={() => navigate('#signup')} className="text-karrot font-semibold">
                  회원가입
                </button>
              </p>
            </div>

            <div className="mt-8 flex items-center gap-3">
              <div className="flex-1 h-px bg-gray-200"></div>
              <span className="text-xs text-karrot-sub">또는</span>
              <div className="flex-1 h-px bg-gray-200"></div>
            </div>

            <button
              onClick={() => navigate('#home')}
              className="w-full mt-4 py-3 border border-gray-300 rounded-xl text-[14px] text-karrot-sub font-medium active:bg-gray-50 transition"
            >
              둘러보기
            </button>
          </div>
        </div>
      );
    }

    // ========================================
    // Page: Signup
    // ========================================
    function SignupPage() {
      const { navigate } = useRouter();
      const { signup } = useAuth();
      const [step, setStep] = useState(1); // 1: info, 2: location
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [passwordConfirm, setPasswordConfirm] = useState('');
      const [nickname, setNickname] = useState('');
      const [location, setLocation] = useState('');
      const [locationSearch, setLocationSearch] = useState('');
      const [error, setError] = useState('');
      const [geoLoading, setGeoLoading] = useState(false);

      const filteredLocations = useMemo(() => {
        if (!locationSearch.trim()) return LOCATIONS;
        return LOCATIONS.filter(l => l.includes(locationSearch));
      }, [locationSearch]);

      const handleStep1 = (e) => {
        e.preventDefault();
        setError('');
        if (!email.trim()) { setError('이메일을 입력해주세요.'); return; }
        if (!email.includes('@')) { setError('올바른 이메일 형식이 아닙니다.'); return; }
        if (password.length < 4) { setError('비밀번호는 4자 이상이어야 합니다.'); return; }
        if (password !== passwordConfirm) { setError('비밀번호가 일치하지 않습니다.'); return; }
        if (!nickname.trim()) { setError('닉네임을 입력해주세요.'); return; }
        setStep(2);
      };

      const handleGeoLocation = () => {
        if (!navigator.geolocation) {
          setError('위치 서비스를 지원하지 않는 브라우저입니다.');
          return;
        }
        setGeoLoading(true);
        setError('');
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            // Map approximate coordinates to dummy locations
            const randomIdx = Math.floor(Math.random() * LOCATIONS.length);
            setLocation(LOCATIONS[randomIdx]);
            setGeoLoading(false);
          },
          (err) => {
            // Fallback: assign random location
            const randomIdx = Math.floor(Math.random() * LOCATIONS.length);
            setLocation(LOCATIONS[randomIdx]);
            setGeoLoading(false);
          },
          { timeout: 5000 }
        );
      };

      const [signupLoading, setSignupLoading] = useState(false);

      const handleSignup = async () => {
        if (!location) { setError('동네를 선택해주세요.'); return; }
        setSignupLoading(true);
        const result = await signup(email.trim(), password, nickname.trim(), location);
        if (result.success) {
          navigate('#home');
        } else {
          setError(result.message);
        }
        setSignupLoading(false);
      };

      return (
        <div className="min-h-screen bg-white">
          <header className="flex items-center h-[52px] px-4">
            <button onClick={() => step === 1 ? navigate('#login') : setStep(1)} className="p-1 -ml-1">
              <Icons.Back />
            </button>
            <h1 className="ml-2 font-bold text-base">회원가입</h1>
          </header>

          {/* Progress bar */}
          <div className="px-4 mb-6">
            <div className="flex gap-2">
              <div className={`flex-1 h-1 rounded-full ${step >= 1 ? 'bg-karrot' : 'bg-gray-200'}`} />
              <div className={`flex-1 h-1 rounded-full ${step >= 2 ? 'bg-karrot' : 'bg-gray-200'}`} />
            </div>
          </div>

          {step === 1 && (
            <form onSubmit={handleStep1} className="px-6 fade-in">
              <h2 className="text-xl font-bold text-karrot-text mb-1">기본 정보 입력</h2>
              <p className="text-sm text-karrot-sub mb-6">당근마켓에서 사용할 정보를 입력해주세요.</p>

              <div className="space-y-3">
                <div>
                  <label className="block text-[13px] font-medium text-karrot-text mb-1.5">이메일</label>
                  <input
                    type="email"
                    placeholder="example@email.com"
                    value={email}
                    onChange={(e) => { setEmail(e.target.value); setError(''); }}
                    className="w-full px-4 py-3 bg-gray-100 rounded-xl text-[15px] placeholder-gray-400 focus:ring-2 focus:ring-karrot focus:bg-white transition"
                  />
                </div>
                <div>
                  <label className="block text-[13px] font-medium text-karrot-text mb-1.5">비밀번호</label>
                  <input
                    type="password"
                    placeholder="비밀번호 (4자 이상)"
                    value={password}
                    onChange={(e) => { setPassword(e.target.value); setError(''); }}
                    className="w-full px-4 py-3 bg-gray-100 rounded-xl text-[15px] placeholder-gray-400 focus:ring-2 focus:ring-karrot focus:bg-white transition"
                  />
                </div>
                <div>
                  <label className="block text-[13px] font-medium text-karrot-text mb-1.5">비밀번호 확인</label>
                  <input
                    type="password"
                    placeholder="비밀번호 확인"
                    value={passwordConfirm}
                    onChange={(e) => { setPasswordConfirm(e.target.value); setError(''); }}
                    className="w-full px-4 py-3 bg-gray-100 rounded-xl text-[15px] placeholder-gray-400 focus:ring-2 focus:ring-karrot focus:bg-white transition"
                  />
                </div>
                <div>
                  <label className="block text-[13px] font-medium text-karrot-text mb-1.5">닉네임</label>
                  <input
                    type="text"
                    placeholder="닉네임"
                    value={nickname}
                    onChange={(e) => { setNickname(e.target.value); setError(''); }}
                    className="w-full px-4 py-3 bg-gray-100 rounded-xl text-[15px] placeholder-gray-400 focus:ring-2 focus:ring-karrot focus:bg-white transition"
                  />
                </div>
              </div>

              {error && <p className="text-red-500 text-[13px] mt-3 px-1 fade-in">{error}</p>}

              <button
                type="submit"
                className="w-full py-3.5 bg-karrot text-white rounded-xl font-semibold text-[15px] active:bg-karrot-dark transition mt-6"
              >
                다음
              </button>
            </form>
          )}

          {step === 2 && (
            <div className="px-6 fade-in">
              <h2 className="text-xl font-bold text-karrot-text mb-1">내 동네 설정</h2>
              <p className="text-sm text-karrot-sub mb-6">동네를 설정하면 가까운 이웃과 거래할 수 있어요.</p>

              {/* Geo Location Button */}
              <button
                onClick={handleGeoLocation}
                disabled={geoLoading}
                className="w-full flex items-center justify-center gap-2 py-3.5 border-2 border-karrot text-karrot rounded-xl font-semibold text-[14px] active:bg-karrot-light transition mb-4"
              >
                <Icons.MapPin />
                {geoLoading ? (
                  <span className="flex items-center gap-2">
                    <svg className="animate-spin h-4 w-4" viewBox="0 0 24 24">
                      <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"/>
                      <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.37 0 0 5.37 0 12h4z"/>
                    </svg>
                    위치 확인 중...
                  </span>
                ) : '현재 위치로 동네 설정'}
              </button>

              <div className="flex items-center gap-3 mb-4">
                <div className="flex-1 h-px bg-gray-200"></div>
                <span className="text-xs text-karrot-sub">또는 직접 검색</span>
                <div className="flex-1 h-px bg-gray-200"></div>
              </div>

              {/* Search */}
              <div className="flex items-center bg-gray-100 rounded-xl px-4 py-3 mb-3">
                <Icons.Search />
                <input
                  type="text"
                  placeholder="동네 이름으로 검색 (예: 역삼동)"
                  value={locationSearch}
                  onChange={(e) => setLocationSearch(e.target.value)}
                  className="ml-2 flex-1 bg-transparent text-[14px] placeholder-gray-400"
                />
              </div>

              {/* Location List */}
              <div className="max-h-[240px] overflow-y-auto rounded-xl border border-karrot-border">
                {filteredLocations.length === 0 ? (
                  <div className="py-8 text-center text-karrot-sub text-sm">검색 결과가 없어요</div>
                ) : (
                  filteredLocations.map(loc => (
                    <button
                      key={loc}
                      onClick={() => setLocation(loc)}
                      className={`w-full text-left px-4 py-3 border-b border-karrot-divider last:border-b-0 text-[14px] transition ${
                        location === loc ? 'bg-karrot-light text-karrot font-semibold' : 'text-karrot-text active:bg-gray-50'
                      }`}
                    >
                      <div className="flex items-center gap-2">
                        {location === loc && <Icons.MapPin />}
                        <span>{loc}</span>
                      </div>
                    </button>
                  ))
                )}
              </div>

              {location && (
                <div className="mt-4 p-3 bg-karrot-light rounded-xl flex items-center gap-2 fade-in">
                  <Icons.MapPin />
                  <span className="text-sm font-semibold text-karrot">선택된 동네: {location}</span>
                </div>
              )}

              {error && <p className="text-red-500 text-[13px] mt-3 px-1 fade-in">{error}</p>}

              <button
                onClick={handleSignup}
                disabled={!location || signupLoading}
                className={`w-full py-3.5 rounded-xl font-semibold text-[15px] transition mt-6 ${
                  location && !signupLoading ? 'bg-karrot text-white active:bg-karrot-dark' : 'bg-gray-200 text-gray-400'
                }`}
              >
                {signupLoading ? '가입 중...' : '가입 완료'}
              </button>
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================
    function App() {
      const { path } = useRouter();
      const currentPath = path.replace('#', '');

      const renderPage = () => {
        if (currentPath.startsWith('chat-room-')) {
          const id = currentPath.replace('chat-room-', '');
          return <ChatRoomPage roomId={id} />;
        }
        if (currentPath.startsWith('product-detail-')) {
          const id = currentPath.replace('product-detail-', '');
          return <ProductDetailPage productId={id} />;
        }
        switch (currentPath) {
          case 'login': return <LoginPage />;
          case 'signup': return <SignupPage />;
          case 'community': return <CommunityPage />;
          case 'chat': return <ChatPage />;
          case 'mypage': return <MyPage />;
          case 'write': return <WritePage />;
          case 'home':
          default: return <HomePage />;
        }
      };

      const hideTab = currentPath.startsWith('chat-room-');
      return (
        <div className="app-shell">
          {renderPage()}
          {!hideTab && <BottomTab />}
        </div>
      );
    }

    // ========================================
    // Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(
      <Router>
        <AuthProvider>
          <ProductsProvider>
            <App />
          </ProductsProvider>
        </AuthProvider>
      </Router>
    );
  </script>
</body>
</html>
