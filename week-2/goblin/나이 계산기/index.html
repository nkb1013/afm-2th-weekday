<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>만 나이 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeIn 0.4s ease-out;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Card({ children, className = "" }) {
      return (
        <div className={`bg-white rounded-2xl shadow-lg p-6 sm:p-8 ${className}`}>
          {children}
        </div>
      );
    }

    function Input({ label, type = "text", value, onChange, min, max, className = "" }) {
      return (
        <div className={`flex flex-col gap-1.5 ${className}`}>
          <label className="text-sm font-medium text-gray-600">{label}</label>
          <input
            type={type}
            value={value}
            onChange={onChange}
            min={min}
            max={max}
            className="w-full px-4 py-3 border border-gray-300 rounded-xl text-center text-lg
                       focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent
                       transition-all"
          />
        </div>
      );
    }

    function Button({ children, onClick, variant = "primary", size = "md", disabled = false, className = "" }) {
      const base = "font-semibold rounded-xl transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed";
      const variants = {
        primary: "bg-indigo-600 text-white hover:bg-indigo-700 shadow-md hover:shadow-lg",
        secondary: "bg-gray-100 text-gray-700 hover:bg-gray-200",
      };
      const sizes = {
        sm: "px-4 py-2 text-sm",
        md: "px-6 py-3 text-base",
        lg: "px-8 py-4 text-lg",
      };
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}
        >
          {children}
        </button>
      );
    }

    function Badge({ children, color = "indigo", className = "" }) {
      const colors = {
        indigo: "bg-indigo-100 text-indigo-700",
        green: "bg-green-100 text-green-700",
        amber: "bg-amber-100 text-amber-700",
        rose: "bg-rose-100 text-rose-700",
      };
      return (
        <span className={`inline-block px-3 py-1 rounded-full text-sm font-medium ${colors[color]} ${className}`}>
          {children}
        </span>
      );
    }

    // ========================================
    // 📄 만 나이 계산 로직
    // ========================================

    function calculateAge(birthDate, baseDate) {
      const birth = new Date(birthDate);
      const base = new Date(baseDate);

      if (isNaN(birth.getTime()) || isNaN(base.getTime())) return null;
      if (birth > base) return null;

      let years = base.getFullYear() - birth.getFullYear();
      let months = base.getMonth() - birth.getMonth();
      let days = base.getDate() - birth.getDate();

      if (days < 0) {
        months--;
        const prevMonth = new Date(base.getFullYear(), base.getMonth(), 0);
        days += prevMonth.getDate();
      }

      if (months < 0) {
        years--;
        months += 12;
      }

      // 총 일수 계산
      const diffTime = base.getTime() - birth.getTime();
      const totalDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

      // 다음 생일 계산
      let nextBirthday = new Date(base.getFullYear(), birth.getMonth(), birth.getDate());
      if (nextBirthday <= base) {
        nextBirthday = new Date(base.getFullYear() + 1, birth.getMonth(), birth.getDate());
      }
      const daysUntilBirthday = Math.ceil((nextBirthday.getTime() - base.getTime()) / (1000 * 60 * 60 * 24));

      // 띠 계산
      const zodiacAnimals = ["원숭이", "닭", "개", "돼지", "쥐", "소", "호랑이", "토끼", "용", "뱀", "말", "양"];
      const zodiac = zodiacAnimals[birth.getFullYear() % 12];

      // 별자리 계산
      const constellations = [
        { name: "염소자리", emoji: "♑", end: [1, 19] },
        { name: "물병자리", emoji: "♒", end: [2, 18] },
        { name: "물고기자리", emoji: "♓", end: [3, 20] },
        { name: "양자리", emoji: "♈", end: [4, 19] },
        { name: "황소자리", emoji: "♉", end: [5, 20] },
        { name: "쌍둥이자리", emoji: "♊", end: [6, 21] },
        { name: "게자리", emoji: "♋", end: [7, 22] },
        { name: "사자자리", emoji: "♌", end: [8, 22] },
        { name: "처녀자리", emoji: "♍", end: [9, 22] },
        { name: "천칭자리", emoji: "♎", end: [10, 23] },
        { name: "전갈자리", emoji: "♏", end: [11, 22] },
        { name: "사수자리", emoji: "♐", end: [12, 21] },
        { name: "염소자리", emoji: "♑", end: [12, 31] },
      ];
      const m = birth.getMonth() + 1;
      const d = birth.getDate();
      const constellation = constellations.find(c => m < c.end[0] || (m === c.end[0] && d <= c.end[1]));

      // 연 나이 (년 나이): 기준연도 - 출생연도 (청소년보호법 등에서 사용)
      const yearAge = base.getFullYear() - birth.getFullYear();

      // 한국 나이 (세는 나이): 기준연도 - 출생연도 + 1 (2023년 폐지, 참고용)
      const koreanAge = base.getFullYear() - birth.getFullYear() + 1;

      return {
        years,
        months,
        days,
        totalDays,
        yearAge,
        koreanAge,
        daysUntilBirthday,
        zodiac,
        constellation: constellation ? `${constellation.emoji} ${constellation.name}` : "",
      };
    }

    // ========================================
    // 📄 결과 표시 컴포넌트
    // ========================================

    function ResultItem({ label, value, sub, color = "indigo" }) {
      return (
        <div className="text-center">
          <p className="text-sm text-gray-500 mb-1">{label}</p>
          <p className={`text-3xl sm:text-4xl font-bold text-${color}-600`}>{value}</p>
          {sub && <p className="text-xs text-gray-400 mt-1">{sub}</p>}
        </div>
      );
    }

    function AgeTypeCard({ label, age, unit = "세", desc, color, official = false }) {
      const colorMap = {
        indigo: { bg: "bg-indigo-50", text: "text-indigo-600", border: "border-indigo-200", badge: "bg-indigo-600" },
        emerald: { bg: "bg-emerald-50", text: "text-emerald-600", border: "border-emerald-200", badge: "bg-emerald-600" },
        amber: { bg: "bg-amber-50", text: "text-amber-600", border: "border-amber-200", badge: "bg-amber-600" },
      };
      const c = colorMap[color];
      return (
        <div className={`relative rounded-xl border ${c.border} ${c.bg} p-4 text-center`}>
          {official && (
            <span className={`absolute -top-2.5 left-1/2 -translate-x-1/2 ${c.badge} text-white text-xs font-bold px-2.5 py-0.5 rounded-full`}>
              법적 기준
            </span>
          )}
          <p className="text-xs text-gray-500 mb-1">{label}</p>
          <p className={`text-4xl font-extrabold ${c.text}`}>{age}<span className="text-lg">{unit}</span></p>
          <p className="text-xs text-gray-400 mt-2 leading-relaxed">{desc}</p>
        </div>
      );
    }

    function ResultCard({ result }) {
      return (
        <div className="fade-in space-y-6">
          {/* 3가지 나이 비교 */}
          <div className="grid grid-cols-1 gap-4">
            <AgeTypeCard
              label="만 나이"
              age={result.years}
              color="indigo"
              official={true}
              desc={`${result.years}년 ${result.months}개월 ${result.days}일 — 생일 지나야 +1세 (민법 기준, 2023~ 통일)`}
            />
            <div className="grid grid-cols-2 gap-4">
              <AgeTypeCard
                label="연 나이"
                age={result.yearAge}
                color="emerald"
                desc="올해 - 출생연도 (청소년보호법 등 일부 법령)"
              />
              <AgeTypeCard
                label="한국 나이"
                age={result.koreanAge}
                color="amber"
                desc="올해 - 출생연도 + 1 (세는 나이, 2023년 폐지)"
              />
            </div>
          </div>

          <hr className="border-gray-100" />

          {/* 상세 정보 */}
          <div className="grid grid-cols-2 gap-6">
            <ResultItem label="살아온 날" value={result.totalDays.toLocaleString()} sub="일" />
            <ResultItem
              label="다음 생일까지"
              value={result.daysUntilBirthday}
              sub="일 남음"
              color={result.daysUntilBirthday <= 30 ? "rose" : "amber"}
            />
          </div>

          <hr className="border-gray-100" />

          {/* 띠 & 별자리 */}
          <div className="flex justify-center gap-3 flex-wrap">
            <Badge color="amber">🐾 {result.zodiac}띠</Badge>
            <Badge color="indigo">{result.constellation}</Badge>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================

    function App() {
      const today = new Date().toISOString().split("T")[0];
      const [birthDate, setBirthDate] = useState("");
      const [baseDate, setBaseDate] = useState(today);

      const result = useMemo(() => {
        if (!birthDate) return null;
        return calculateAge(birthDate, baseDate);
      }, [birthDate, baseDate]);

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50 flex items-center justify-center p-4">
          <div className="w-full max-w-md space-y-5">
            {/* 헤더 */}
            <div className="text-center">
              <h1 className="text-3xl sm:text-4xl font-extrabold text-gray-800">🎂 나이 계산기</h1>
              <p className="text-gray-500 mt-2">생년월일을 입력하면 만 나이·연 나이·한국 나이를 한눈에!</p>
            </div>

            {/* 입력 카드 */}
            <Card>
              <div className="space-y-4">
                <Input
                  label="생년월일"
                  type="date"
                  value={birthDate}
                  onChange={(e) => setBirthDate(e.target.value)}
                  max={today}
                />
                <Input
                  label="기준일 (오늘)"
                  type="date"
                  value={baseDate}
                  onChange={(e) => setBaseDate(e.target.value)}
                />
                {birthDate && (
                  <div className="flex gap-2">
                    <Button
                      variant="secondary"
                      size="sm"
                      onClick={() => setBaseDate(today)}
                      className="flex-1"
                    >
                      오늘 기준
                    </Button>
                    <Button
                      variant="secondary"
                      size="sm"
                      onClick={() => { setBirthDate(""); setBaseDate(today); }}
                      className="flex-1"
                    >
                      초기화
                    </Button>
                  </div>
                )}
              </div>
            </Card>

            {/* 결과 카드 */}
            {result && (
              <Card>
                <ResultCard result={result} />
              </Card>
            )}

            {/* 에러 메시지 */}
            {birthDate && !result && (
              <div className="fade-in text-center text-rose-500 text-sm">
                올바른 생년월일을 입력해주세요. 기준일보다 이전이어야 합니다.
              </div>
            )}
          </div>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
