<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>세금 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeIn 0.35s ease-out;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useCallback } = React;

    // ========================================
    // 1. 유틸리티 함수
    // ========================================

    function formatKRW(num) {
      if (num === 0) return "0";
      return Math.round(num).toLocaleString("ko-KR");
    }

    function formatKRWUnit(num) {
      const man = num / 10000;
      if (man >= 1) {
        const eok = Math.floor(man / 10000);
        const remainMan = Math.round(man % 10000);
        if (eok > 0 && remainMan > 0) return `${eok}억 ${formatKRW(remainMan)}만원`;
        if (eok > 0) return `${eok}억원`;
        return `${formatKRW(remainMan)}만원`;
      }
      return `${formatKRW(num)}원`;
    }

    // ========================================
    // 2. 세금 계산 로직
    // ========================================

    // 종합소득세 누진세율 구간 (배열 + 반복문 사용)
    const INCOME_TAX_BRACKETS = [
      { limit: 14000000,   rate: 0.06, deduction: 0 },
      { limit: 50000000,   rate: 0.15, deduction: 1260000 },
      { limit: 88000000,   rate: 0.24, deduction: 5760000 },
      { limit: 150000000,  rate: 0.35, deduction: 15440000 },
      { limit: 300000000,  rate: 0.38, deduction: 19940000 },
      { limit: 500000000,  rate: 0.40, deduction: 25940000 },
      { limit: 1000000000, rate: 0.42, deduction: 35940000 },
      { limit: Infinity,   rate: 0.45, deduction: 65940000 },
    ];

    const BRACKET_LABELS = [
      "1,400만원 이하 (6%)",
      "1,400만원 초과 ~ 5,000만원 이하 (15%)",
      "5,000만원 초과 ~ 8,800만원 이하 (24%)",
      "8,800만원 초과 ~ 1억 5천만원 이하 (35%)",
      "1억 5천만원 초과 ~ 3억원 이하 (38%)",
      "3억원 초과 ~ 5억원 이하 (40%)",
      "5억원 초과 ~ 10억원 이하 (42%)",
      "10억원 초과 (45%)",
    ];

    function calculateIncomeTax(income) {
      if (income <= 0) return null;

      // 구간별 세금 내역을 배열에 저장
      const breakdown = [];
      let remainingIncome = income;
      let totalTax = 0;
      let appliedBracketIndex = -1;
      let prevLimit = 0;

      // 반복문으로 각 구간을 순회하며 계산
      for (let i = 0; i < INCOME_TAX_BRACKETS.length; i++) {
        const bracket = INCOME_TAX_BRACKETS[i];
        const bracketFloor = prevLimit;
        const bracketCeiling = bracket.limit;
        const bracketWidth = bracketCeiling - bracketFloor;

        if (remainingIncome <= 0) {
          breakdown.push({ label: BRACKET_LABELS[i], taxableInBracket: 0, rate: bracket.rate, taxInBracket: 0 });
        } else if (remainingIncome <= bracketWidth) {
          // 이 구간에서 끝남
          const taxInBracket = remainingIncome * bracket.rate;
          totalTax += taxInBracket;
          appliedBracketIndex = i;
          breakdown.push({ label: BRACKET_LABELS[i], taxableInBracket: remainingIncome, rate: bracket.rate, taxInBracket });
          remainingIncome = 0;
        } else {
          // 이 구간 전체 사용
          const taxInBracket = bracketWidth * bracket.rate;
          totalTax += taxInBracket;
          appliedBracketIndex = i;
          breakdown.push({ label: BRACKET_LABELS[i], taxableInBracket: bracketWidth, rate: bracket.rate, taxInBracket });
          remainingIncome -= bracketWidth;
        }

        prevLimit = bracketCeiling;
      }

      // 간편계산: 소득 * 해당 세율 - 누진공제
      const simpleBracket = INCOME_TAX_BRACKETS[appliedBracketIndex];
      const simpleCalc = income * simpleBracket.rate - simpleBracket.deduction;

      return {
        income,
        totalTax: Math.round(totalTax),
        effectiveRate: (totalTax / income) * 100,
        appliedBracketLabel: BRACKET_LABELS[appliedBracketIndex],
        appliedRate: simpleBracket.rate * 100,
        deduction: simpleBracket.deduction,
        breakdown: breakdown.filter(b => b.taxableInBracket > 0),
        afterTax: income - Math.round(totalTax),
      };
    }

    function calculateVAT(amount, isTaxIncluded) {
      if (amount <= 0) return null;

      // 조건 분기: 세금 포함 vs 미포함
      if (isTaxIncluded) {
        // 세금 포함 금액인 경우
        const supplyPrice = Math.round(amount / 1.1);
        const vat = amount - supplyPrice;
        return {
          inputAmount: amount,
          supplyPrice,
          vat,
          total: amount,
          isTaxIncluded: true,
        };
      } else {
        // 세금 미포함 금액인 경우
        const supplyPrice = amount;
        const vat = Math.round(amount * 0.1);
        const total = supplyPrice + vat;
        return {
          inputAmount: amount,
          supplyPrice,
          vat,
          total,
          isTaxIncluded: false,
        };
      }
    }

    // ========================================
    // 3. 디자인 시스템 컴포넌트
    // ========================================

    function Card({ children, className = "" }) {
      return (
        <div className={`bg-white rounded-2xl shadow-sm border border-gray-100 p-6 ${className}`}>
          {children}
        </div>
      );
    }

    function Button({ children, variant = "primary", size = "md", onClick, disabled = false, className = "" }) {
      const baseClasses = "font-semibold rounded-xl transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2";
      const sizeClasses = {
        sm: "px-3 py-1.5 text-sm",
        md: "px-5 py-2.5 text-base",
        lg: "px-7 py-3.5 text-lg",
      };
      const variantClasses = {
        primary: "bg-blue-600 text-white hover:bg-blue-700 focus:ring-blue-500 shadow-md hover:shadow-lg",
        secondary: "bg-gray-100 text-gray-700 hover:bg-gray-200 focus:ring-gray-400",
        ghost: "bg-transparent text-gray-600 hover:bg-gray-100 focus:ring-gray-300",
      };
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className={`${baseClasses} ${sizeClasses[size]} ${variantClasses[variant]} ${disabled ? "opacity-50 cursor-not-allowed" : "cursor-pointer"} ${className}`}
        >
          {children}
        </button>
      );
    }

    function TabButton({ active, onClick, children }) {
      return (
        <button
          onClick={onClick}
          className={`flex-1 py-3.5 px-4 text-center font-semibold rounded-xl transition-all duration-200 cursor-pointer ${
            active
              ? "bg-blue-600 text-white shadow-md"
              : "bg-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-100"
          }`}
        >
          {children}
        </button>
      );
    }

    function ToggleButton({ active, onClick, children }) {
      return (
        <button
          onClick={onClick}
          className={`flex-1 py-2.5 px-4 text-center text-sm font-medium rounded-lg transition-all duration-200 cursor-pointer ${
            active
              ? "bg-emerald-600 text-white shadow-sm"
              : "bg-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-50"
          }`}
        >
          {children}
        </button>
      );
    }

    function AmountInput({ value, onChange, placeholder = "금액을 입력하세요" }) {
      const displayValue = value ? formatKRW(value) : "";

      const handleChange = (e) => {
        const raw = e.target.value.replace(/[^0-9]/g, "");
        onChange(raw ? parseInt(raw, 10) : 0);
      };

      return (
        <div className="relative">
          <input
            type="text"
            inputMode="numeric"
            value={displayValue}
            onChange={handleChange}
            placeholder={placeholder}
            className="w-full px-4 py-4 pr-12 text-xl font-semibold text-gray-800 bg-gray-50 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 focus:bg-white transition-all duration-200"
            aria-label="금액 입력"
          />
          <span className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 font-medium text-lg">원</span>
        </div>
      );
    }

    function ResultRow({ label, value, highlight = false, sub = false }) {
      return (
        <div className={`flex justify-between items-center py-2.5 ${sub ? "pl-4" : ""} ${highlight ? "border-t-2 border-gray-800 pt-3 mt-1" : ""}`}>
          <span className={`${highlight ? "text-gray-900 font-bold text-lg" : sub ? "text-gray-500 text-sm" : "text-gray-600"}`}>
            {label}
          </span>
          <span className={`${highlight ? "text-blue-700 font-bold text-xl" : sub ? "text-gray-500 text-sm font-medium" : "text-gray-800 font-semibold text-lg"}`}>
            {value}
          </span>
        </div>
      );
    }

    // ========================================
    // 4. 종합소득세 결과 컴포넌트
    // ========================================

    function IncomeTaxResult({ result }) {
      if (!result) return null;

      return (
        <div className="fade-in space-y-4">
          {/* 요약 */}
          <Card className="bg-gradient-to-br from-blue-50 to-indigo-50 border-blue-100">
            <h3 className="text-sm font-semibold text-blue-600 uppercase tracking-wider mb-4">계산 결과</h3>
            <ResultRow label="세금 매기는 기준 금액" value={`${formatKRW(result.income)}원`} />
            <ResultRow label="내야 할 세금" value={`${formatKRW(result.totalTax)}원`} highlight />
            <ResultRow label="실제 세금 비율" value={`${result.effectiveRate.toFixed(2)}%`} />
            <ResultRow label="세금 내고 남는 돈" value={`${formatKRW(result.afterTax)}원`} />
          </Card>

          {/* 적용 구간 */}
          <Card>
            <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">어떤 세금 구간이 적용됐나요?</h3>
            <div className="bg-amber-50 border border-amber-200 rounded-xl p-4">
              <p className="text-amber-800 font-semibold">{result.appliedBracketLabel}</p>
              <p className="text-amber-600 text-sm mt-1">
                빠른 계산: {formatKRW(result.income)}원 × {result.appliedRate}% - {formatKRW(result.deduction)}원 = {formatKRW(result.totalTax)}원
              </p>
              <p className="text-amber-500 text-xs mt-1.5">돈을 많이 벌수록 더 높은 세금 비율이 적용돼요</p>
            </div>
          </Card>

          {/* 구간별 상세 내역 */}
          <Card>
            <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">구간별로 세금이 얼마씩 나왔나요?</h3>
            <div className="space-y-3">
              {result.breakdown.map((item, index) => (
                <div key={index} className="bg-gray-50 rounded-xl p-4">
                  <div className="flex justify-between items-start mb-1.5">
                    <span className="text-sm font-medium text-gray-700">{item.label}</span>
                    <span className="text-sm font-bold text-blue-700 whitespace-nowrap ml-3">{formatKRW(item.taxInBracket)}원</span>
                  </div>
                  <p className="text-xs text-gray-400">
                    {formatKRW(item.taxableInBracket)}원 x {(item.rate * 100)}%
                  </p>
                  {/* 비율 바 */}
                  <div className="mt-2 h-1.5 bg-gray-200 rounded-full overflow-hidden">
                    <div
                      className="h-full bg-blue-500 rounded-full transition-all duration-500"
                      style={{ width: `${(item.taxInBracket / result.totalTax) * 100}%` }}
                    />
                  </div>
                </div>
              ))}
            </div>
          </Card>
        </div>
      );
    }

    // ========================================
    // 5. 부가가치세 결과 컴포넌트
    // ========================================

    function VATResult({ result }) {
      if (!result) return null;

      return (
        <div className="fade-in space-y-4">
          <Card className="bg-gradient-to-br from-emerald-50 to-teal-50 border-emerald-100">
            <h3 className="text-sm font-semibold text-emerald-600 uppercase tracking-wider mb-4">계산 결과</h3>
            <ResultRow
              label={result.isTaxIncluded ? "입력한 금액 (세금 포함)" : "입력한 금액 (세금 빠짐)"}
              value={`${formatKRW(result.inputAmount)}원`}
            />
            <div className="border-t border-gray-200 my-2" />
            <ResultRow label="물건값 (세금 빼고)" value={`${formatKRW(result.supplyPrice)}원`} />
            <ResultRow label="붙는 세금 (10%)" value={`${formatKRW(result.vat)}원`} />
            <ResultRow label="총 내야 할 금액" value={`${formatKRW(result.total)}원`} highlight />
          </Card>

          {/* 계산 과정 */}
          <Card>
            <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">이렇게 계산했어요</h3>
            <div className="bg-gray-50 rounded-xl p-4 space-y-2 text-sm text-gray-600 font-mono">
              {result.isTaxIncluded ? (
                <>
                  <p>입력한 금액 (세금 포함): {formatKRW(result.inputAmount)}원</p>
                  <p>물건값 = {formatKRW(result.inputAmount)} ÷ 1.1 = {formatKRW(result.supplyPrice)}원</p>
                  <p>세금 = {formatKRW(result.supplyPrice)} × 10% = {formatKRW(result.vat)}원</p>
                  <p className="font-bold text-gray-800">총 금액 = {formatKRW(result.total)}원</p>
                </>
              ) : (
                <>
                  <p>입력한 금액 (물건값): {formatKRW(result.inputAmount)}원</p>
                  <p>물건값 = {formatKRW(result.supplyPrice)}원</p>
                  <p>세금 = {formatKRW(result.supplyPrice)} × 10% = {formatKRW(result.vat)}원</p>
                  <p className="font-bold text-gray-800">총 금액 = {formatKRW(result.supplyPrice)} + {formatKRW(result.vat)} = {formatKRW(result.total)}원</p>
                </>
              )}
            </div>
          </Card>
        </div>
      );
    }

    // ========================================
    // 6. App 컴포넌트
    // ========================================

    function App() {
      const [taxType, setTaxType] = useState("income"); // "income" | "vat"
      const [vatAmount, setVatAmount] = useState(0);
      const [vatMode, setVatMode] = useState("excluded"); // "excluded" | "included"

      // 종합소득세: 쉬운 입력 필드 3개
      const [earned, setEarned] = useState(0);       // 1년 동안 번 돈
      const [expenses, setExpenses] = useState(0);    // 사업에 쓴 비용
      const [deductions, setDeductions] = useState(0); // 공제 금액

      // 내부적으로 과세표준 계산: 번 돈 - 비용 - 공제
      const taxBase = useMemo(() => {
        const base = earned - expenses - deductions;
        return base > 0 ? base : 0;
      }, [earned, expenses, deductions]);

      const result = useMemo(() => {
        // 조건 분기: 세금 종류에 따라 계산 방식 분리
        if (taxType === "income") {
          if (taxBase <= 0) return null;
          return calculateIncomeTax(taxBase);
        } else if (taxType === "vat") {
          if (!vatAmount || vatAmount <= 0) return null;
          if (vatMode === "included") {
            return calculateVAT(vatAmount, true);
          } else {
            return calculateVAT(vatAmount, false);
          }
        } else {
          return null;
        }
      }, [taxBase, vatAmount, taxType, vatMode]);

      const handleReset = useCallback(() => {
        setEarned(0);
        setExpenses(0);
        setDeductions(0);
        setVatAmount(0);
      }, []);

      return (
        <div className="min-h-screen bg-gradient-to-b from-gray-50 to-gray-100">
          {/* 헤더 */}
          <header className="bg-white border-b border-gray-200 sticky top-0 z-10">
            <div className="max-w-lg mx-auto px-4 py-4 flex items-center justify-between">
              <h1 className="text-xl font-bold text-gray-900">세금 계산기</h1>
              <span className="text-xs text-gray-400">2025년 기준</span>
            </div>
          </header>

          <main className="max-w-lg mx-auto px-4 py-6 space-y-5">
            {/* 세금 종류 선택 탭 */}
            <Card>
              <h2 className="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">세금 종류 선택</h2>
              <div className="flex gap-2 bg-gray-100 p-1.5 rounded-xl">
                <TabButton active={taxType === "income"} onClick={() => { setTaxType("income"); setAmount(0); }}>
                  종합소득세
                </TabButton>
                <TabButton active={taxType === "vat"} onClick={() => { setTaxType("vat"); setAmount(0); }}>
                  부가가치세
                </TabButton>
              </div>
            </Card>

            {/* 금액 입력 */}
            {taxType === "income" ? (
              <Card>
                <h2 className="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">소득 정보 입력</h2>

                <div className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1.5">
                      1년 동안 번 돈
                      <span className="text-xs text-gray-400 ml-1.5">월급, 사업 수입 등을 모두 합한 금액</span>
                    </label>
                    <AmountInput value={earned} onChange={setEarned} placeholder="예: 50,000,000" />
                    {earned > 0 && <p className="text-xs text-gray-400 mt-1">{formatKRWUnit(earned)}</p>}
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1.5">
                      사업에 쓴 비용
                      <span className="text-xs text-gray-400 ml-1.5">재료비, 임대료 등 (없으면 0)</span>
                    </label>
                    <AmountInput value={expenses} onChange={setExpenses} placeholder="예: 10,000,000" />
                    {expenses > 0 && <p className="text-xs text-gray-400 mt-1">{formatKRWUnit(expenses)}</p>}
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1.5">
                      공제 금액
                      <span className="text-xs text-gray-400 ml-1.5">인적공제, 보험료 등 빼주는 금액 (없으면 0)</span>
                    </label>
                    <AmountInput value={deductions} onChange={setDeductions} placeholder="예: 5,000,000" />
                    {deductions > 0 && <p className="text-xs text-gray-400 mt-1">{formatKRWUnit(deductions)}</p>}
                  </div>
                </div>

                {/* 세금 매기는 기준 금액 표시 */}
                {earned > 0 && (
                  <div className="mt-4 bg-blue-50 rounded-xl p-4 border border-blue-100">
                    <p className="text-sm text-blue-700">
                      <span className="font-semibold">세금 매기는 기준 금액:</span>{" "}
                      {formatKRW(earned)}원 - {formatKRW(expenses)}원 - {formatKRW(deductions)}원 ={" "}
                      <span className="font-bold">{formatKRW(taxBase)}원</span>
                    </p>
                    <p className="text-xs text-blue-500 mt-1">번 돈에서 비용과 공제를 뺀 금액에 세금이 매겨져요</p>
                  </div>
                )}

                <div className="flex flex-wrap gap-2 mt-3">
                  <Button variant="ghost" size="sm" onClick={handleReset}>
                    전체 초기화
                  </Button>
                </div>
              </Card>
            ) : (
              <Card>
                <h2 className="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">금액 입력</h2>

                {/* 부가가치세: 세금 포함/미포함 토글 */}
                <div className="flex gap-2 bg-gray-100 p-1 rounded-lg mb-4">
                  <ToggleButton active={vatMode === "excluded"} onClick={() => setVatMode("excluded")}>
                    세금 빼고 적은 금액
                  </ToggleButton>
                  <ToggleButton active={vatMode === "included"} onClick={() => setVatMode("included")}>
                    세금 포함된 금액
                  </ToggleButton>
                </div>
                <p className="text-xs text-gray-400 mb-3">
                  {vatMode === "excluded"
                    ? "물건값만 입력하면, 세금(10%)을 더해서 총 얼마인지 알려줘요"
                    : "세금이 이미 포함된 금액을 입력하면, 물건값과 세금을 따로 알려줘요"}
                </p>

                <AmountInput value={vatAmount} onChange={setVatAmount} />

                {/* 빠른 금액 버튼 */}
                <div className="flex flex-wrap gap-2 mt-3">
                  {[
                    { label: "+100만", value: 1000000 },
                    { label: "+500만", value: 5000000 },
                    { label: "+1,000만", value: 10000000 },
                    { label: "+1억", value: 100000000 },
                  ].map((item) => (
                    <Button key={item.value} variant="secondary" size="sm" onClick={() => setVatAmount(prev => prev + item.value)}>
                      {item.label}
                    </Button>
                  ))}
                  <Button variant="ghost" size="sm" onClick={handleReset}>
                    초기화
                  </Button>
                </div>

                {vatAmount > 0 && (
                  <p className="text-sm text-gray-400 mt-2">{formatKRWUnit(vatAmount)}</p>
                )}
              </Card>
            )}

            {/* 결과 */}
            {result && taxType === "income" && <IncomeTaxResult result={result} />}
            {result && taxType === "vat" && <VATResult result={result} />}

            {/* 안내 문구 */}
            {!result && (
              <div className="text-center py-12 text-gray-400">
                <div className="text-5xl mb-4">{taxType === "income" ? "💰" : "🧾"}</div>
                <p className="text-lg font-medium">금액을 입력하면 자동으로 계산돼요</p>
                <p className="text-sm mt-1">
                  {taxType === "income"
                    ? "번 돈이 많을수록 세금 비율이 올라가요 (6%~45%)"
                    : "물건값에 10%가 세금으로 붙어요"}
                </p>
              </div>
            )}
          </main>

          {/* 푸터 */}
          <footer className="max-w-lg mx-auto px-4 py-6 text-center text-xs text-gray-400">
            <p>이 계산기는 참고용이에요. 실제 세금 신고할 때는 세무사에게 물어보세요.</p>
            <p className="mt-1">종합소득세는 기본 세금만 계산하며, 세부적인 공제 항목은 포함되지 않았어요.</p>
          </footer>
        </div>
      );
    }

    // ========================================
    // 7. 렌더링
    // ========================================

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
