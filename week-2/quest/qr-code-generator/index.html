<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR코드 생성기</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: white;
      margin: 0;
      padding: 40px 20px;
    }
    .wrap {
      max-width: 880px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: #818cf8;
      margin-bottom: 8px;
    }
    .desc {
      text-align: center;
      color: #aaa;
      font-size: 14px;
      margin-bottom: 36px;
    }
    .row {
      display: flex;
      gap: 28px;
    }
    @media (max-width: 700px) {
      .row { flex-direction: column; }
      .left { width: 100% !important; }
    }
    .left {
      width: 340px;
      flex-shrink: 0;
    }
    .right {
      flex: 1;
    }
    .box {
      background: #2a2a3c;
      border: 1px solid #3a3a4c;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .box h2 {
      font-size: 15px;
      margin: 0 0 14px 0;
      color: #ddd;
    }
    textarea {
      display: block;
      width: 100%;
      height: 100px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      background: #1e1e2e;
      color: white;
      border: 1px solid #555;
      border-radius: 8px;
      resize: none;
    }
    textarea:focus {
      border-color: #818cf8;
      outline: none;
    }
    .count {
      font-size: 12px;
      color: #888;
      margin-top: 6px;
    }
    .slider-head {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #ccc;
      margin-bottom: 6px;
    }
    .slider-head span:last-child {
      color: #818cf8;
      font-family: monospace;
    }
    input[type="range"] {
      width: 100%;
      accent-color: #818cf8;
    }
    .btns {
      display: flex;
      gap: 10px;
    }
    .btns button {
      flex: 1;
      padding: 12px 0;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      color: white;
    }
    .btns button:focus {
      outline: none;
    }
    .btns button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .btn-dl { background: #059669; }
    .btn-dl:not(:disabled):hover { background: #047857; }
    .btn-rs { background: #dc2626; }
    .btn-rs:hover { background: #b91c1c; }
    .preview-area {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 260px;
    }
    .preview-area img {
      max-width: 100%;
      border-radius: 8px;
      image-rendering: pixelated;
    }
    .empty {
      text-align: center;
      color: #666;
      font-size: 14px;
      line-height: 1.8;
    }
    .empty-icon {
      font-size: 44px;
      opacity: 0.3;
      margin-bottom: 10px;
    }
    .meta {
      text-align: center;
      font-size: 12px;
      color: #666;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [text, setText] = useState("");
      const [size, setSize] = useState(300);
      const [src, setSrc] = useState("");

      useEffect(() => {
        if (!text.trim()) { setSrc(""); return; }

        let stop = false;
        QRCode.toDataURL(text, {
          width: size, margin: 2,
          color: { dark: "#000000", light: "#ffffff" },
          errorCorrectionLevel: "M",
        }).then(u => { if (!stop) setSrc(u); })
          .catch(() => { if (!stop) setSrc(""); });
        return () => { stop = true; };
      }, [text, size]);

      return (
        React.createElement("div", { className: "wrap" },
          React.createElement("h1", null, "QR코드 생성기"),
          React.createElement("p", { className: "desc" }, "텍스트나 URL을 입력하면 QR코드를 만들어드립니다"),
          React.createElement("div", { className: "row" },

            React.createElement("div", { className: "left" },
              React.createElement("div", { className: "box" },
                React.createElement("h2", null, "내용 입력"),
                React.createElement("textarea", {
                  value: text,
                  onChange: function(e) { setText(e.target.value); },
                  placeholder: "URL, 텍스트, 연락처 등을 입력하세요",
                }),
                text ? React.createElement("p", { className: "count" }, text.length + "자 입력됨") : null
              ),

              React.createElement("div", { className: "box" },
                React.createElement("h2", null, "크기 설정"),
                React.createElement("div", { className: "slider-head" },
                  React.createElement("span", null, "QR코드 크기"),
                  React.createElement("span", null, size + "px")
                ),
                React.createElement("input", {
                  type: "range", min: 150, max: 600, step: 50,
                  value: size,
                  onChange: function(e) { setSize(Number(e.target.value)); },
                })
              ),

              React.createElement("div", { className: "btns" },
                React.createElement("button", {
                  className: "btn-dl",
                  disabled: !src,
                  onClick: function() {
                    if (!src) return;
                    var a = document.createElement("a");
                    a.download = "qrcode.png";
                    a.href = src;
                    a.click();
                  }
                }, "PNG 다운로드"),
                React.createElement("button", {
                  className: "btn-rs",
                  onClick: function() { setText(""); setSize(300); setSrc(""); }
                }, "초기화")
              )
            ),

            React.createElement("div", { className: "right" },
              React.createElement("div", { className: "box" },
                React.createElement("h2", { style: { textAlign: "center" } }, "미리보기"),
                React.createElement("div", { className: "preview-area" },
                  src
                    ? React.createElement("img", { src: src, alt: "QR코드" })
                    : React.createElement("div", { className: "empty" },
                        React.createElement("div", { className: "empty-icon" }, "\uD83D\uDCF1"),
                        "텍스트나 URL을 입력하면", React.createElement("br"),
                        "QR코드가 여기에 표시됩니다"
                      )
                ),
                src ? React.createElement("p", { className: "meta" }, size + " x " + size + "px") : null
              )
            )
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
