<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Money Tracker - 가계부</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            income: { light: '#e0f2fe', DEFAULT: '#0284c7', dark: '#075985' },
            expense: { light: '#fee2e2', DEFAULT: '#dc2626', dark: '#991b1b' },
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .slide-down { animation: slideDown 0.3s ease-out; }
    @keyframes slideDown { from { opacity: 0; max-height: 0; } to { opacity: 1; max-height: 500px; } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;

    // ========================================
    // Utility Functions
    // ========================================

    // API helper: map snake_case DB row to camelCase frontend object
    function mapEntry(row) {
      return {
        id: row.id,
        type: row.type,
        date: typeof row.date === 'string' ? row.date.slice(0, 10) : row.date,
        amount: Number(row.amount),
        originalAmount: row.original_amount ? Number(row.original_amount) : null,
        currency: row.currency || 'KRW',
        category: row.category,
        memo: row.memo || '',
        createdAt: row.created_at,
      };
    }

    async function fetchEntries() {
      const res = await fetch('/api/entries');
      const json = await res.json();
      if (!json.success) throw new Error(json.message);
      return json.data.map(mapEntry);
    }

    async function createEntry(entry) {
      const res = await fetch('/api/entries', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: entry.type,
          date: entry.date,
          amount: entry.amount,
          originalAmount: entry.originalAmount,
          currency: entry.currency,
          category: entry.category,
          memo: entry.memo,
        }),
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.message);
      return mapEntry(json.data);
    }

    async function deleteEntry(id) {
      const res = await fetch(`/api/entries/${id}`, { method: 'DELETE' });
      const json = await res.json();
      if (!json.success) throw new Error(json.message);
    }

    function formatWon(amount) {
      return '₩' + Math.round(Number(amount)).toLocaleString('ko-KR');
    }

    function formatCurrency(amount, currency) {
      const symbols = { KRW: '₩', USD: '$', JPY: '¥', EUR: '€', GBP: '£', CNY: '¥' };
      const sym = symbols[currency] || currency + ' ';
      if (currency === 'KRW' || currency === 'JPY') {
        return sym + Math.round(Number(amount)).toLocaleString('ko-KR');
      }
      return sym + Number(amount).toLocaleString('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    const CURRENCIES = [
      { code: 'KRW', label: '🇰🇷 원 (KRW)', symbol: '₩' },
      { code: 'USD', label: '🇺🇸 달러 (USD)', symbol: '$' },
      { code: 'JPY', label: '🇯🇵 엔화 (JPY)', symbol: '¥' },
      { code: 'EUR', label: '🇪🇺 유로 (EUR)', symbol: '€' },
      { code: 'GBP', label: '🇬🇧 파운드 (GBP)', symbol: '£' },
      { code: 'CNY', label: '🇨🇳 위안 (CNY)', symbol: '¥' },
    ];

    const RATE_CACHE_KEY = 'money-tracker-rates';
    const RATE_CACHE_TTL = 60 * 60 * 1000; // 1 hour

    function useExchangeRates() {
      const [rates, setRates] = useState({});
      const [loading, setLoading] = useState(false);
      const [lastUpdate, setLastUpdate] = useState(null);
      const [error, setError] = useState(null);

      const fetchRates = useCallback(async () => {
        // Check cache first
        try {
          const cached = JSON.parse(localStorage.getItem(RATE_CACHE_KEY));
          if (cached && Date.now() - cached.timestamp < RATE_CACHE_TTL) {
            setRates(cached.rates);
            setLastUpdate(new Date(cached.timestamp));
            return;
          }
        } catch {}

        setLoading(true);
        setError(null);
        try {
          const res = await fetch('https://open.er-api.com/v6/latest/KRW');
          const data = await res.json();
          if (data.result === 'success') {
            // data.rates has KRW-based rates (1 KRW = X foreign)
            // We need: 1 foreign = X KRW, so invert
            const krwRates = {};
            for (const [code, rate] of Object.entries(data.rates)) {
              krwRates[code] = rate > 0 ? 1 / rate : 0;
            }
            krwRates['KRW'] = 1;
            setRates(krwRates);
            const now = Date.now();
            setLastUpdate(new Date(now));
            localStorage.setItem(RATE_CACHE_KEY, JSON.stringify({ rates: krwRates, timestamp: now }));
          } else {
            throw new Error('API error');
          }
        } catch (e) {
          setError('환율 정보를 불러올 수 없습니다');
          // fallback rates
          setRates({ KRW: 1, USD: 1380, JPY: 9.2, EUR: 1520, GBP: 1750, CNY: 190 });
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { fetchRates(); }, [fetchRates]);

      const convertToKRW = useCallback((amount, currency) => {
        if (currency === 'KRW') return amount;
        const rate = rates[currency];
        if (!rate) return amount;
        return Math.round(amount * rate);
      }, [rates]);

      return { rates, loading, lastUpdate, error, convertToKRW, refresh: fetchRates };
    }

    function getTodayStr() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    // ========================================
    // Category Definitions
    // ========================================

    const CATEGORIES = {
      expense: [
        { id: 'food', label: '식비', emoji: '🍚' },
        { id: 'transport', label: '교통', emoji: '🚌' },
        { id: 'housing', label: '주거', emoji: '🏠' },
        { id: 'subscription', label: '구독료', emoji: '📱' },
        { id: 'events', label: '경조사', emoji: '🎉' },
        { id: 'other_expense', label: '기타지출', emoji: '💸' },
      ],
      income: [
        { id: 'salary', label: '급여', emoji: '💰' },
        { id: 'other_income', label: '기타수입', emoji: '📈' },
      ],
    };

    function getCategoryInfo(categoryId) {
      const all = [...CATEGORIES.expense, ...CATEGORIES.income];
      return all.find(c => c.id === categoryId) || { id: categoryId, label: categoryId, emoji: '📌' };
    }

    // ========================================
    // Design System Components
    // ========================================

    function Button({ children, variant = 'primary', size = 'md', disabled = false, onClick, className = '', type = 'button' }) {
      const base = 'font-medium rounded-xl transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 inline-flex items-center justify-center';
      const variants = {
        primary: 'bg-sky-600 hover:bg-sky-700 text-white focus:ring-sky-500 shadow-sm hover:shadow',
        secondary: 'bg-gray-100 hover:bg-gray-200 text-gray-700 focus:ring-gray-400',
        danger: 'bg-red-50 hover:bg-red-100 text-red-600 focus:ring-red-400',
        ghost: 'hover:bg-gray-100 text-gray-600 focus:ring-gray-300',
        income: 'bg-sky-600 hover:bg-sky-700 text-white focus:ring-sky-500 shadow-sm',
        expense: 'bg-red-500 hover:bg-red-600 text-white focus:ring-red-400 shadow-sm',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-4 py-2.5 text-sm',
        lg: 'px-6 py-3 text-base',
      };
      return (
        <button
          type={type}
          disabled={disabled}
          onClick={onClick}
          className={`${base} ${variants[variant]} ${sizes[size]} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}
        >
          {children}
        </button>
      );
    }

    function Input({ label, type = 'text', value, onChange, placeholder, error, disabled, className = '', ...rest }) {
      return (
        <div className={className}>
          {label && <label className="block text-sm font-medium text-gray-600 mb-1.5">{label}</label>}
          <input
            type={type}
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            disabled={disabled}
            className={`w-full px-4 py-2.5 rounded-xl border ${error ? 'border-red-400 focus:ring-red-300' : 'border-gray-200 focus:ring-sky-300'} focus:outline-none focus:ring-2 focus:border-transparent transition-all text-gray-800 bg-white`}
            {...rest}
          />
          {error && <p className="text-red-500 text-xs mt-1">{error}</p>}
        </div>
      );
    }

    function Select({ label, value, onChange, options, className = '' }) {
      return (
        <div className={className}>
          {label && <label className="block text-sm font-medium text-gray-600 mb-1.5">{label}</label>}
          <select
            value={value}
            onChange={onChange}
            className="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-sky-300 focus:border-transparent transition-all text-gray-800 bg-white appearance-none"
          >
            {options.map(opt => (
              <option key={opt.value} value={opt.value}>{opt.label}</option>
            ))}
          </select>
        </div>
      );
    }

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-sm border border-gray-100 ${className}`}>
          {children}
        </div>
      );
    }

    function Modal({ isOpen, onClose, title, children }) {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={onClose}>
          <div className="fixed inset-0 bg-black/40 backdrop-blur-sm" />
          <div className="bg-white rounded-2xl shadow-xl w-full max-w-md relative z-10 fade-in" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between p-5 border-b border-gray-100">
              <h3 className="text-lg font-semibold text-gray-800">{title}</h3>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 transition-colors text-xl leading-none p-1">&#10005;</button>
            </div>
            <div className="p-5">{children}</div>
          </div>
        </div>
      );
    }

    // ========================================
    // Dashboard Summary Component
    // ========================================

    function Dashboard({ entries }) {
      const totals = useMemo(() => {
        let income = 0, expense = 0;
        entries.forEach(e => {
          if (e.type === 'income') income += e.amount;
          else expense += e.amount;
        });
        return { income, expense, balance: income - expense };
      }, [entries]);

      const balanceColor = totals.balance >= 0 ? 'text-sky-700' : 'text-red-600';

      return (
        <div className="bg-gradient-to-br from-slate-800 via-slate-900 to-gray-900 rounded-2xl p-6 md:p-8 text-white shadow-lg">
          <div className="flex items-center gap-3 mb-6">
            <span className="text-2xl">💵</span>
            <h1 className="text-xl md:text-2xl font-bold tracking-tight">나의 가계부</h1>
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div className="bg-white/10 backdrop-blur rounded-xl p-4">
              <p className="text-sm text-sky-300 font-medium mb-1">총 수입</p>
              <p className="text-xl md:text-2xl font-bold text-sky-300">{formatWon(totals.income)}</p>
            </div>
            <div className="bg-white/10 backdrop-blur rounded-xl p-4">
              <p className="text-sm text-red-300 font-medium mb-1">총 지출</p>
              <p className="text-xl md:text-2xl font-bold text-red-300">{formatWon(totals.expense)}</p>
            </div>
            <div className="bg-white/10 backdrop-blur rounded-xl p-4">
              <p className="text-sm text-gray-300 font-medium mb-1">잔액</p>
              <p className={`text-xl md:text-2xl font-bold ${totals.balance >= 0 ? 'text-emerald-300' : 'text-red-300'}`}>
                {totals.balance >= 0 ? '+' : ''}{formatWon(totals.balance)}
              </p>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // Entry Form Component
    // ========================================

    function EntryForm({ onAdd, exchangeRate }) {
      const [type, setType] = useState('expense');
      const [date, setDate] = useState(getTodayStr());
      const [amount, setAmount] = useState('');
      const [currency, setCurrency] = useState('KRW');
      const [category, setCategory] = useState('food');
      const [memo, setMemo] = useState('');
      const [errors, setErrors] = useState({});

      useEffect(() => {
        const cats = CATEGORIES[type];
        setCategory(cats[0].id);
      }, [type]);

      const categoryOptions = CATEGORIES[type].map(c => ({
        value: c.id,
        label: `${c.emoji} ${c.label}`,
      }));

      const currencyOptions = CURRENCIES.map(c => ({
        value: c.code,
        label: c.label,
      }));

      const krwConverted = useMemo(() => {
        if (currency === 'KRW' || !amount || Number(amount) <= 0) return null;
        return exchangeRate.convertToKRW(Number(amount), currency);
      }, [amount, currency, exchangeRate]);

      function handleSubmit(e) {
        e.preventDefault();
        const newErrors = {};
        if (!date) newErrors.date = '날짜를 입력하세요';
        if (!amount || Number(amount) <= 0) newErrors.amount = '올바른 금액을 입력하세요';
        if (Object.keys(newErrors).length > 0) { setErrors(newErrors); return; }

        const krwAmount = currency === 'KRW' ? Number(amount) : exchangeRate.convertToKRW(Number(amount), currency);

        onAdd({
          type,
          date,
          amount: krwAmount,
          originalAmount: Number(amount),
          currency,
          category,
          memo: memo.trim(),
        });

        setAmount('');
        setMemo('');
        setErrors({});
      }

      return (
        <Card className="p-5 md:p-6">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-lg font-semibold text-gray-800">새 내역 등록</h2>
            {exchangeRate.lastUpdate && (
              <div className="flex items-center gap-1.5">
                <span className="text-[10px] text-gray-400">
                  환율 {exchangeRate.lastUpdate.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })} 기준
                </span>
                <button
                  type="button"
                  onClick={exchangeRate.refresh}
                  className={`text-gray-400 hover:text-sky-500 transition-colors ${exchangeRate.loading ? 'animate-spin' : ''}`}
                  title="환율 새로고침"
                >
                  ⟳
                </button>
              </div>
            )}
          </div>

          {/* Type Toggle */}
          <div className="flex bg-gray-100 rounded-xl p-1 mb-5">
            <button
              type="button"
              onClick={() => setType('income')}
              className={`flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all duration-200 ${
                type === 'income'
                  ? 'bg-sky-600 text-white shadow-sm'
                  : 'text-gray-500 hover:text-gray-700'
              }`}
            >
              수입
            </button>
            <button
              type="button"
              onClick={() => setType('expense')}
              className={`flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all duration-200 ${
                type === 'expense'
                  ? 'bg-red-500 text-white shadow-sm'
                  : 'text-gray-500 hover:text-gray-700'
              }`}
            >
              지출
            </button>
          </div>

          <form onSubmit={handleSubmit} className="space-y-4">
            <Input
              label="날짜"
              type="date"
              value={date}
              onChange={e => setDate(e.target.value)}
              error={errors.date}
            />

            {/* Currency + Amount row */}
            <div>
              <label className="block text-sm font-medium text-gray-600 mb-1.5">통화 & 금액</label>
              <div className="flex gap-2">
                <select
                  value={currency}
                  onChange={e => setCurrency(e.target.value)}
                  className="w-36 px-3 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-sky-300 focus:border-transparent transition-all text-gray-800 bg-white text-sm"
                >
                  {currencyOptions.map(opt => (
                    <option key={opt.value} value={opt.value}>{opt.label}</option>
                  ))}
                </select>
                <input
                  type="number"
                  value={amount}
                  onChange={e => setAmount(e.target.value)}
                  placeholder="0"
                  min="0"
                  step={currency === 'KRW' || currency === 'JPY' ? '1' : '0.01'}
                  className={`flex-1 px-4 py-2.5 rounded-xl border ${errors.amount ? 'border-red-400 focus:ring-red-300' : 'border-gray-200 focus:ring-sky-300'} focus:outline-none focus:ring-2 focus:border-transparent transition-all text-gray-800 bg-white`}
                />
              </div>
              {errors.amount && <p className="text-red-500 text-xs mt-1">{errors.amount}</p>}

              {/* KRW conversion display */}
              {krwConverted !== null && (
                <div className="mt-2 px-3 py-2 bg-amber-50 border border-amber-200 rounded-xl flex items-center gap-2 fade-in">
                  <span className="text-amber-500 text-sm">💱</span>
                  <span className="text-sm text-amber-800">
                    {formatCurrency(Number(amount), currency)} = <strong className="text-amber-900">{formatWon(krwConverted)}</strong>
                  </span>
                  {exchangeRate.rates[currency] && (
                    <span className="text-[10px] text-amber-500 ml-auto">
                      1 {currency} ≈ {formatWon(exchangeRate.rates[currency])}
                    </span>
                  )}
                </div>
              )}
            </div>

            <Select
              label="카테고리"
              value={category}
              onChange={e => setCategory(e.target.value)}
              options={categoryOptions}
            />
            <Input
              label="메모"
              value={memo}
              onChange={e => setMemo(e.target.value)}
              placeholder="내용을 입력하세요 (선택)"
            />
            <Button
              type="submit"
              variant={type === 'income' ? 'income' : 'expense'}
              size="lg"
              className="w-full"
            >
              {type === 'income' ? '수입 등록' : '지출 등록'}
            </Button>
          </form>
        </Card>
      );
    }

    // ========================================
    // Category Summary Component
    // ========================================

    function CategorySummary({ entries }) {
      const [viewType, setViewType] = useState('expense');

      const summaryData = useMemo(() => {
        const filtered = entries.filter(e => e.type === viewType);
        const totalAmount = filtered.reduce((sum, e) => sum + e.amount, 0);
        const byCategory = {};

        filtered.forEach(entry => {
          if (!byCategory[entry.category]) byCategory[entry.category] = 0;
          byCategory[entry.category] += entry.amount;
        });

        const sorted = Object.entries(byCategory)
          .map(([catId, amount]) => ({
            ...getCategoryInfo(catId),
            amount,
            percentage: totalAmount > 0 ? (amount / totalAmount) * 100 : 0,
          }))
          .sort((a, b) => b.amount - a.amount);

        return { items: sorted, total: totalAmount };
      }, [entries, viewType]);

      const barColor = viewType === 'expense' ? 'bg-red-400' : 'bg-sky-400';
      const barBg = viewType === 'expense' ? 'bg-red-100' : 'bg-sky-100';

      return (
        <Card className="p-5 md:p-6">
          <div className="flex items-center justify-between mb-5">
            <h2 className="text-lg font-semibold text-gray-800">카테고리별 합계</h2>
            <div className="flex bg-gray-100 rounded-lg p-0.5">
              <button
                onClick={() => setViewType('expense')}
                className={`px-3 py-1.5 text-xs font-semibold rounded-md transition-all ${
                  viewType === 'expense' ? 'bg-white text-red-600 shadow-sm' : 'text-gray-500'
                }`}
              >
                지출
              </button>
              <button
                onClick={() => setViewType('income')}
                className={`px-3 py-1.5 text-xs font-semibold rounded-md transition-all ${
                  viewType === 'income' ? 'bg-white text-sky-600 shadow-sm' : 'text-gray-500'
                }`}
              >
                수입
              </button>
            </div>
          </div>

          {summaryData.items.length === 0 ? (
            <div className="text-center py-8 text-gray-400">
              <p className="text-3xl mb-2">{viewType === 'expense' ? '💸' : '💰'}</p>
              <p className="text-sm">{viewType === 'expense' ? '지출' : '수입'} 내역이 없습니다</p>
            </div>
          ) : (
            <div className="space-y-4">
              {summaryData.items.map(item => (
                <div key={item.id} className="fade-in">
                  <div className="flex items-center justify-between mb-1.5">
                    <span className="text-sm font-medium text-gray-700">
                      {item.emoji} {item.label}
                    </span>
                    <div className="flex items-center gap-2">
                      <span className="text-sm font-semibold text-gray-800">{formatWon(item.amount)}</span>
                      <span className={`text-xs font-medium ${viewType === 'expense' ? 'text-red-500' : 'text-sky-500'}`}>
                        {item.percentage.toFixed(1)}%
                      </span>
                    </div>
                  </div>
                  <div className={`w-full h-2.5 ${barBg} rounded-full overflow-hidden`}>
                    <div
                      className={`h-full ${barColor} rounded-full transition-all duration-500`}
                      style={{ width: `${item.percentage}%` }}
                    />
                  </div>
                </div>
              ))}
              <div className="pt-3 mt-3 border-t border-gray-100 flex justify-between items-center">
                <span className="text-sm font-semibold text-gray-600">합계</span>
                <span className={`text-base font-bold ${viewType === 'expense' ? 'text-red-600' : 'text-sky-600'}`}>
                  {formatWon(summaryData.total)}
                </span>
              </div>
            </div>
          )}
        </Card>
      );
    }

    // ========================================
    // Entry List Component
    // ========================================

    function EntryList({ entries, onDelete }) {
      const [filterType, setFilterType] = useState('all');
      const [confirmDeleteId, setConfirmDeleteId] = useState(null);

      const filtered = useMemo(() => {
        let result = [...entries];
        if (filterType !== 'all') result = result.filter(e => e.type === filterType);
        result.sort((a, b) => {
          if (a.date !== b.date) return b.date.localeCompare(a.date);
          return new Date(b.createdAt) - new Date(a.createdAt);
        });
        return result;
      }, [entries, filterType]);

      // Group by date
      const grouped = useMemo(() => {
        const groups = {};
        filtered.forEach(entry => {
          if (!groups[entry.date]) groups[entry.date] = [];
          groups[entry.date].push(entry);
        });
        return Object.entries(groups);
      }, [filtered]);

      function formatDateLabel(dateStr) {
        const d = new Date(dateStr + 'T00:00:00');
        const days = ['일', '월', '화', '수', '목', '금', '토'];
        return `${d.getMonth() + 1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
      }

      function handleDelete(id) {
        if (confirmDeleteId === id) {
          onDelete(id);
          setConfirmDeleteId(null);
        } else {
          setConfirmDeleteId(id);
          setTimeout(() => setConfirmDeleteId(null), 3000);
        }
      }

      return (
        <Card className="p-5 md:p-6">
          <div className="flex items-center justify-between mb-5">
            <h2 className="text-lg font-semibold text-gray-800">
              내역 목록
              <span className="text-sm font-normal text-gray-400 ml-2">{filtered.length}건</span>
            </h2>
            <div className="flex bg-gray-100 rounded-lg p-0.5">
              {[
                { key: 'all', label: '전체' },
                { key: 'income', label: '수입' },
                { key: 'expense', label: '지출' },
              ].map(f => (
                <button
                  key={f.key}
                  onClick={() => setFilterType(f.key)}
                  className={`px-3 py-1.5 text-xs font-semibold rounded-md transition-all ${
                    filterType === f.key ? 'bg-white text-gray-800 shadow-sm' : 'text-gray-500'
                  }`}
                >
                  {f.label}
                </button>
              ))}
            </div>
          </div>

          {grouped.length === 0 ? (
            <div className="text-center py-12 text-gray-400">
              <p className="text-4xl mb-3">📒</p>
              <p className="text-sm">등록된 내역이 없습니다</p>
              <p className="text-xs mt-1">위에서 새 내역을 등록해보세요</p>
            </div>
          ) : (
            <div className="space-y-5">
              {grouped.map(([date, items]) => (
                <div key={date}>
                  <p className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 pl-1">
                    {formatDateLabel(date)}
                  </p>
                  <div className="space-y-2">
                    {items.map(entry => {
                      const cat = getCategoryInfo(entry.category);
                      const isIncome = entry.type === 'income';
                      return (
                        <div
                          key={entry.id}
                          className={`flex items-center gap-3 p-3 rounded-xl border transition-all hover:shadow-sm fade-in ${
                            isIncome ? 'border-sky-100 bg-sky-50/40' : 'border-red-100 bg-red-50/40'
                          }`}
                        >
                          <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg flex-shrink-0 ${
                            isIncome ? 'bg-sky-100' : 'bg-red-100'
                          }`}>
                            {cat.emoji}
                          </div>
                          <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-2">
                              <span className="text-sm font-semibold text-gray-800">{cat.label}</span>
                              <span className={`text-[10px] font-semibold px-1.5 py-0.5 rounded-md ${
                                isIncome ? 'bg-sky-100 text-sky-700' : 'bg-red-100 text-red-700'
                              }`}>
                                {isIncome ? '수입' : '지출'}
                              </span>
                            </div>
                            {entry.memo && (
                              <p className="text-xs text-gray-500 mt-0.5 truncate">{entry.memo}</p>
                            )}
                          </div>
                          <div className="text-right flex-shrink-0 flex items-center gap-2">
                            <div className="text-right">
                              {entry.currency && entry.currency !== 'KRW' && (
                                <p className="text-[10px] text-gray-400 mb-0.5">
                                  {formatCurrency(entry.originalAmount, entry.currency)}
                                </p>
                              )}
                              <span className={`text-sm font-bold ${isIncome ? 'text-sky-600' : 'text-red-600'}`}>
                                {isIncome ? '+' : '-'}{formatWon(entry.amount)}
                              </span>
                            </div>
                            <button
                              onClick={() => handleDelete(entry.id)}
                              className={`p-1.5 rounded-lg transition-all text-xs ${
                                confirmDeleteId === entry.id
                                  ? 'bg-red-500 text-white'
                                  : 'text-gray-300 hover:text-red-400 hover:bg-red-50'
                              }`}
                              title={confirmDeleteId === entry.id ? '다시 클릭하면 삭제됩니다' : '삭제'}
                            >
                              {confirmDeleteId === entry.id ? '확인' : '✕'}
                            </button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          )}
        </Card>
      );
    }

    // ========================================
    // App Component
    // ========================================

    function App() {
      const [entries, setEntries] = useState([]);
      const [loading, setLoading] = useState(true);
      const exchangeRate = useExchangeRates();

      const loadEntries = useCallback(async () => {
        try {
          const data = await fetchEntries();
          setEntries(data);
        } catch (err) {
          console.error('Failed to load entries:', err);
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => {
        loadEntries();
      }, [loadEntries]);

      const handleAdd = useCallback(async (entry) => {
        try {
          await createEntry(entry);
          await loadEntries();
        } catch (err) {
          console.error('Failed to add entry:', err);
          alert('저장에 실패했습니다.');
        }
      }, [loadEntries]);

      const handleDelete = useCallback(async (id) => {
        try {
          await deleteEntry(id);
          await loadEntries();
        } catch (err) {
          console.error('Failed to delete entry:', err);
          alert('삭제에 실패했습니다.');
        }
      }, [loadEntries]);

      if (loading) {
        return (
          <div className="max-w-2xl mx-auto px-4 py-6 md:py-10 flex flex-col items-center justify-center min-h-[60vh]">
            <div className="text-4xl mb-4 animate-bounce">💵</div>
            <p className="text-gray-500 text-sm">데이터를 불러오는 중...</p>
          </div>
        );
      }

      return (
        <div className="max-w-2xl mx-auto px-4 py-6 md:py-10 space-y-5">
          <Dashboard entries={entries} />
          <EntryForm onAdd={handleAdd} exchangeRate={exchangeRate} />
          <CategorySummary entries={entries} />
          <EntryList entries={entries} onDelete={handleDelete} />
          <footer className="text-center text-xs text-gray-400 pb-4 pt-2">
            Money Tracker &copy; 2026 &middot; 데이터는 서버에 저장됩니다
          </footer>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
