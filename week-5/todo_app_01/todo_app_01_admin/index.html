<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App 관리자 패널</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: '#e5e7eb',
            ring: '#d1d5db',
            background: '#ffffff',
            foreground: '#111827',
            muted: { DEFAULT: '#f9fafb', foreground: '#6b7280' },
            accent: { DEFAULT: '#f9fafb', foreground: '#111827' },
            card: { DEFAULT: '#ffffff', foreground: '#111827' },
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; background: #f9fafb; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeIn 0.2s ease-out; }
    .sidebar-transition { transition: width 0.2s ease, transform 0.2s ease; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, createContext, useContext } = React;

    // ========================================
    // API Helper
    // ========================================
    function getToken() { return localStorage.getItem('admin_token'); }
    function setToken(t) { localStorage.setItem('admin_token', t); }
    function clearToken() { localStorage.removeItem('admin_token'); }

    async function api(path, options = {}) {
      const token = getToken();
      const headers = { 'Content-Type': 'application/json', ...options.headers };
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const res = await fetch(path, { ...options, headers });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'API error');
      return data;
    }

    // ========================================
    // Router
    // ========================================
    const RouterContext = createContext({ path: '/', navigate: () => {} });

    function useRouter() {
      return useContext(RouterContext);
    }

    function Router({ children }) {
      const [path, setPath] = useState(window.location.hash.slice(1) || '/');

      useEffect(() => {
        const handler = () => setPath(window.location.hash.slice(1) || '/');
        window.addEventListener('hashchange', handler);
        return () => window.removeEventListener('hashchange', handler);
      }, []);

      const navigate = useCallback((to) => { window.location.hash = to; }, []);

      return (
        <RouterContext.Provider value={{ path, navigate }}>
          {children}
        </RouterContext.Provider>
      );
    }

    function Link({ to, children, className, onClick }) {
      const { navigate } = useRouter();
      const handleClick = (e) => {
        e.preventDefault();
        navigate(to);
        if (onClick) onClick();
      };
      return <a href={`#${to}`} className={className} onClick={handleClick}>{children}</a>;
    }

    // ========================================
    // Design System Components
    // ========================================
    function Button({ children, variant = 'primary', size = 'md', disabled = false, onClick, className = '', type = 'button' }) {
      const base = 'inline-flex items-center justify-center font-medium rounded-md transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-400 disabled:opacity-50 disabled:pointer-events-none';
      const variants = {
        primary: 'bg-gray-900 text-white hover:bg-gray-800',
        secondary: 'bg-white text-gray-700 border border-gray-300 hover:bg-gray-50',
        danger: 'bg-red-50 text-red-600 border border-red-200 hover:bg-red-100',
        ghost: 'text-gray-600 hover:bg-gray-100 hover:text-gray-900',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-xs',
        md: 'px-4 py-2 text-sm',
        lg: 'px-6 py-2.5 text-base',
      };
      return (
        <button type={type} disabled={disabled} onClick={onClick}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>
          {children}
        </button>
      );
    }

    function Input({ label, type = 'text', value, onChange, placeholder, error, disabled, className = '', id }) {
      return (
        <div className={`space-y-1.5 ${className}`}>
          {label && <label htmlFor={id} className="block text-sm font-medium text-gray-700">{label}</label>}
          <input id={id} type={type} value={value} onChange={onChange} placeholder={placeholder} disabled={disabled}
            className={`w-full rounded-md border px-3 py-2 text-sm transition-colors placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-400 focus:border-transparent ${error ? 'border-red-300' : 'border-gray-300'}`} />
          {error && <p className="text-xs text-red-500">{error}</p>}
        </div>
      );
    }

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-lg border border-gray-200 shadow-sm ${className}`}>
          {children}
        </div>
      );
    }

    function Badge({ children, variant = 'default', className = '' }) {
      const variants = {
        default: 'bg-gray-100 text-gray-700',
        success: 'bg-emerald-50 text-emerald-700 border border-emerald-200',
        info: 'bg-blue-50 text-blue-700 border border-blue-200',
        warning: 'bg-amber-50 text-amber-700 border border-amber-200',
        muted: 'bg-gray-100 text-gray-500 border border-gray-200',
      };
      return (
        <span className={`inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium ${variants[variant]} ${className}`}>
          {children}
        </span>
      );
    }

    function Select({ label, value, onChange, options, className = '' }) {
      return (
        <div className={`space-y-1.5 ${className}`}>
          {label && <label className="block text-sm font-medium text-gray-700">{label}</label>}
          <select value={value} onChange={onChange}
            className="w-full rounded-md border border-gray-300 px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-gray-400 focus:border-transparent">
            {options.map(opt => (
              <option key={opt.value} value={opt.value}>{opt.label}</option>
            ))}
          </select>
        </div>
      );
    }

    // ========================================
    // Icons (inline SVG)
    // ========================================
    function Icon({ name, size = 20 }) {
      const icons = {
        dashboard: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z" />,
        users: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m3 5.197v-1" />,
        todos: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />,
        settings: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />,
        settingsInner: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />,
        logout: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />,
        menu: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M4 6h16M4 12h16M4 18h16" />,
        close: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M6 18L18 6M6 6l12 12" />,
        search: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />,
        trash: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />,
        activity: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M13 10V3L4 14h7v7l9-11h-7z" />,
        userPlus: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />,
        check: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />,
        chart: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />,
      };

      const paths = name === 'settings' ? [icons.settings, icons.settingsInner] : [icons[name]];

      return (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor">
          {paths.map((p, i) => <React.Fragment key={i}>{p}</React.Fragment>)}
        </svg>
      );
    }

    // ========================================
    // Auth Context
    // ========================================
    const AuthContext = createContext({ user: null, login: () => {}, logout: () => {}, checking: true });

    function AuthProvider({ children }) {
      const [user, setUser] = useState(null);
      const [checking, setChecking] = useState(true);

      useEffect(() => {
        const token = getToken();
        if (!token) { setChecking(false); return; }
        api('/api/auth/me')
          .then(data => setUser(data.data))
          .catch(() => clearToken())
          .finally(() => setChecking(false));
      }, []);

      const login = useCallback((userData, token) => {
        setToken(token);
        setUser(userData);
        window.location.hash = '/dashboard';
      }, []);

      const logout = useCallback(() => {
        clearToken();
        setUser(null);
        window.location.hash = '/';
      }, []);

      return (
        <AuthContext.Provider value={{ user, login, logout, checking }}>
          {children}
        </AuthContext.Provider>
      );
    }

    function useAuth() {
      return useContext(AuthContext);
    }

    // ========================================
    // Login Page
    // ========================================
    function LoginPage() {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);
      const { login } = useAuth();

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!email || !password) {
          setError('이메일과 비밀번호를 입력해주세요.');
          return;
        }
        setError('');
        setLoading(true);
        try {
          const res = await api('/api/auth/login', {
            method: 'POST',
            body: JSON.stringify({ email, password }),
          });
          login(res.data.user, res.data.token);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
          <div className="w-full max-w-sm animate-in">
            <div className="text-center mb-8">
              <div className="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-gray-900 text-white mb-4">
                <Icon name="todos" size={24} />
              </div>
              <h1 className="text-xl font-semibold text-gray-900">Todo App 관리자</h1>
              <p className="text-sm text-gray-500 mt-1">관리자 계정으로 로그인하세요</p>
            </div>
            <Card className="p-6">
              <form onSubmit={handleSubmit} className="space-y-4">
                <Input id="email" label="이메일" type="email" value={email}
                  onChange={(e) => setEmail(e.target.value)} placeholder="admin@example.com" />
                <Input id="password" label="비밀번호" type="password" value={password}
                  onChange={(e) => setPassword(e.target.value)} placeholder="비밀번호 입력" />
                {error && <p className="text-sm text-red-500">{error}</p>}
                <Button type="submit" className="w-full" size="md" disabled={loading}>
                  {loading ? '로그인 중...' : '로그인'}
                </Button>
              </form>
            </Card>
          </div>
        </div>
      );
    }

    // ========================================
    // Layout Components
    // ========================================
    const NAV_ITEMS = [
      { path: '/dashboard', label: '대시보드', icon: 'dashboard' },
      { path: '/users', label: '유저 관리', icon: 'users' },
      { path: '/todos', label: '할일 관리', icon: 'todos' },
      { path: '/settings', label: '설정', icon: 'settings' },
    ];

    function Sidebar({ isOpen, onClose }) {
      const { path } = useRouter();

      return (
        <>
          {isOpen && (
            <div className="fixed inset-0 bg-black/30 z-40 lg:hidden" onClick={onClose} />
          )}
          <aside className={`fixed top-0 left-0 z-50 h-full w-64 bg-white border-r border-gray-200 sidebar-transition lg:translate-x-0 lg:static lg:z-0 ${isOpen ? 'translate-x-0' : '-translate-x-full'}`}>
            <div className="flex items-center justify-between h-14 px-4 border-b border-gray-200">
              <div className="flex items-center gap-2">
                <div className="w-7 h-7 rounded-md bg-gray-900 text-white flex items-center justify-center">
                  <Icon name="todos" size={16} />
                </div>
                <span className="font-semibold text-sm text-gray-900">Todo Admin</span>
              </div>
              <button onClick={onClose} className="lg:hidden p-1 rounded hover:bg-gray-100">
                <Icon name="close" size={18} />
              </button>
            </div>
            <nav className="p-3 space-y-0.5">
              {NAV_ITEMS.map(item => {
                const isActive = path === item.path;
                return (
                  <Link key={item.path} to={item.path} onClick={onClose}
                    className={`flex items-center gap-3 px-3 py-2 rounded-md text-sm transition-colors ${isActive ? 'bg-gray-100 text-gray-900 font-medium' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'}`}>
                    <Icon name={item.icon} size={18} />
                    {item.label}
                  </Link>
                );
              })}
            </nav>
          </aside>
        </>
      );
    }

    function Header({ onMenuClick }) {
      const { user, logout } = useAuth();

      return (
        <header className="h-14 bg-white border-b border-gray-200 flex items-center justify-between px-4 lg:px-6">
          <button onClick={onMenuClick} className="lg:hidden p-1.5 rounded-md hover:bg-gray-100">
            <Icon name="menu" size={20} />
          </button>
          <div className="hidden lg:block" />
          <div className="flex items-center gap-3">
            <div className="flex items-center gap-2">
              <div className="w-8 h-8 rounded-full bg-gray-900 text-white flex items-center justify-center text-xs font-medium">
                {user?.nickname?.[0] || '관'}
              </div>
              <div className="hidden sm:block">
                <p className="text-sm font-medium text-gray-900 leading-none">{user?.nickname || '관리자'}</p>
                <p className="text-xs text-gray-500 mt-0.5">{user?.email || ''}</p>
              </div>
            </div>
            <button onClick={logout}
              className="p-1.5 rounded-md text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors"
              title="로그아웃">
              <Icon name="logout" size={18} />
            </button>
          </div>
        </header>
      );
    }

    function DashboardLayout({ children }) {
      const [sidebarOpen, setSidebarOpen] = useState(false);

      return (
        <div className="min-h-screen bg-gray-50 flex">
          <Sidebar isOpen={sidebarOpen} onClose={() => setSidebarOpen(false)} />
          <div className="flex-1 flex flex-col min-w-0">
            <Header onMenuClick={() => setSidebarOpen(true)} />
            <main className="flex-1 p-4 lg:p-6 overflow-auto">
              {children}
            </main>
          </div>
        </div>
      );
    }

    // ========================================
    // Dashboard (Home) Page
    // ========================================
    function DashboardPage() {
      const [stats, setStats] = useState(null);
      const [recentTodos, setRecentTodos] = useState([]);
      const [loading, setLoading] = useState(true);
      const { logout } = useAuth();

      useEffect(() => {
        Promise.all([
          api('/api/admin/stats'),
          api('/api/admin/todos'),
        ]).then(([s, t]) => {
          setStats(s.data);
          setRecentTodos(t.data.slice(0, 5));
        }).catch(err => {
          if (err.message.includes('token') || err.message.includes('expired')) logout();
        }).finally(() => setLoading(false));
      }, []);

      if (loading) return <p className="text-center text-gray-400 py-12">로딩 중...</p>;

      const completionRate = stats && stats.totalTodos > 0
        ? Math.round((stats.completedTodos / stats.totalTodos) * 100) : 0;

      const statCards = [
        { label: '전체 유저 수', value: stats?.totalUsers || 0, icon: 'users', color: 'text-gray-700' },
        { label: '전체 할일 수', value: stats?.totalTodos || 0, icon: 'todos', color: 'text-gray-700' },
        { label: '완료율', value: `${completionRate}%`, icon: 'chart', color: 'text-emerald-600' },
        { label: '오늘 신규 가입', value: stats?.todaySignups || 0, icon: 'userPlus', color: 'text-blue-600' },
      ];

      const formatDate = (d) => new Date(d).toLocaleDateString('ko-KR');

      return (
        <div className="space-y-6 animate-in">
          <div>
            <h1 className="text-lg font-semibold text-gray-900">대시보드</h1>
            <p className="text-sm text-gray-500 mt-0.5">Todo App 관리 현황을 확인하세요.</p>
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            {statCards.map((stat, i) => (
              <Card key={i} className="p-5">
                <div className="flex items-center justify-between">
                  <p className="text-sm text-gray-500">{stat.label}</p>
                  <span className={`${stat.color} opacity-60`}><Icon name={stat.icon} size={18} /></span>
                </div>
                <p className={`text-2xl font-bold mt-1 ${stat.color}`}>{stat.value}</p>
              </Card>
            ))}
          </div>

          <Card>
            <div className="p-5 border-b border-gray-100">
              <div className="flex items-center gap-2">
                <Icon name="activity" size={18} />
                <h2 className="font-medium text-gray-900">최근 할일</h2>
              </div>
            </div>
            <div className="divide-y divide-gray-100">
              {recentTodos.map(t => (
                <div key={t.id} className="px-5 py-3.5 flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <Badge variant={t.done ? 'success' : 'info'}>{t.done ? '완료' : '진행중'}</Badge>
                    <span className="text-sm text-gray-700">{t.nickname} - {t.text}</span>
                  </div>
                  <span className="text-xs text-gray-400 whitespace-nowrap ml-4">{formatDate(t.created_at)}</span>
                </div>
              ))}
              {recentTodos.length === 0 && (
                <div className="px-5 py-8 text-center text-gray-400 text-sm">아직 할일이 없습니다.</div>
              )}
            </div>
          </Card>
        </div>
      );
    }

    // ========================================
    // Users Page
    // ========================================
    function UsersPage() {
      const [search, setSearch] = useState('');
      const [users, setUsers] = useState([]);
      const [loading, setLoading] = useState(true);
      const { logout } = useAuth();

      const fetchUsers = () => {
        api('/api/admin/users')
          .then(data => setUsers(data.data))
          .catch(err => {
            if (err.message.includes('token') || err.message.includes('expired')) logout();
          })
          .finally(() => setLoading(false));
      };

      useEffect(() => { fetchUsers(); }, []);

      const filtered = useMemo(() => {
        if (!search.trim()) return users;
        const q = search.toLowerCase();
        return users.filter(u =>
          u.nickname.toLowerCase().includes(q) ||
          u.email.toLowerCase().includes(q)
        );
      }, [search, users]);

      const handleDelete = async (id) => {
        if (!confirm('정말 이 유저를 삭제하시겠습니까?\n해당 유저의 모든 할일도 함께 삭제됩니다.')) return;
        try {
          await api(`/api/admin/users/${id}`, { method: 'DELETE' });
          fetchUsers();
        } catch (err) { alert(err.message); }
      };

      if (loading) return <p className="text-center text-gray-400 py-12">로딩 중...</p>;

      return (
        <div className="space-y-6 animate-in">
          <div>
            <h1 className="text-lg font-semibold text-gray-900">유저 관리</h1>
            <p className="text-sm text-gray-500 mt-0.5">등록된 유저를 조회하고 관리합니다.</p>
          </div>

          <Card>
            <div className="p-4 border-b border-gray-100">
              <div className="relative max-w-sm">
                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                  <Icon name="search" size={16} />
                </span>
                <input type="text" value={search} onChange={(e) => setSearch(e.target.value)}
                  placeholder="이름 또는 이메일로 검색..."
                  className="w-full pl-9 pr-3 py-2 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-gray-400 focus:border-transparent" />
              </div>
            </div>

            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-gray-100">
                    <th className="text-left px-4 py-3 font-medium text-gray-500 text-xs uppercase tracking-wider">ID</th>
                    <th className="text-left px-4 py-3 font-medium text-gray-500 text-xs uppercase tracking-wider">닉네임</th>
                    <th className="text-left px-4 py-3 font-medium text-gray-500 text-xs uppercase tracking-wider hidden sm:table-cell">이메일</th>
                    <th className="text-left px-4 py-3 font-medium text-gray-500 text-xs uppercase tracking-wider">역할</th>
                    <th className="text-left px-4 py-3 font-medium text-gray-500 text-xs uppercase tracking-wider hidden md:table-cell">가입일</th>
                    <th className="text-left px-4 py-3 font-medium text-gray-500 text-xs uppercase tracking-wider hidden lg:table-cell">할일 수</th>
                    <th className="text-right px-4 py-3 font-medium text-gray-500 text-xs uppercase tracking-wider">Actions</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-50">
                  {filtered.map(user => (
                    <tr key={user.id} className="hover:bg-gray-50 transition-colors">
                      <td className="px-4 py-3 text-gray-500">#{user.id}</td>
                      <td className="px-4 py-3 font-medium text-gray-900">{user.nickname}</td>
                      <td className="px-4 py-3 text-gray-500 hidden sm:table-cell">{user.email}</td>
                      <td className="px-4 py-3">
                        <Badge variant={user.role === 'admin' ? 'warning' : 'muted'}>
                          {user.role === 'admin' ? '관리자' : '일반'}
                        </Badge>
                      </td>
                      <td className="px-4 py-3 text-gray-500 hidden md:table-cell">{new Date(user.created_at).toLocaleDateString('ko-KR')}</td>
                      <td className="px-4 py-3 text-gray-500 hidden lg:table-cell">{user.todo_count}</td>
                      <td className="px-4 py-3 text-right">
                        <Button variant="danger" size="sm" onClick={() => handleDelete(user.id)}
                          disabled={user.role === 'admin'}>
                          <Icon name="trash" size={14} />
                          <span className="ml-1 hidden sm:inline">삭제</span>
                        </Button>
                      </td>
                    </tr>
                  ))}
                  {filtered.length === 0 && (
                    <tr>
                      <td colSpan="7" className="px-4 py-12 text-center text-gray-400">
                        검색 결과가 없습니다.
                      </td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>

            <div className="px-4 py-3 border-t border-gray-100 text-xs text-gray-500">
              총 {filtered.length}명의 유저
            </div>
          </Card>
        </div>
      );
    }

    // ========================================
    // Todos Page
    // ========================================
    function TodosPage() {
      const [todos, setTodos] = useState([]);
      const [filterUser, setFilterUser] = useState('all');
      const [filterStatus, setFilterStatus] = useState('all');
      const [loading, setLoading] = useState(true);
      const { logout } = useAuth();

      const fetchTodos = () => {
        api('/api/admin/todos')
          .then(data => setTodos(data.data))
          .catch(err => {
            if (err.message.includes('token') || err.message.includes('expired')) logout();
          })
          .finally(() => setLoading(false));
      };

      useEffect(() => { fetchTodos(); }, []);

      const authors = useMemo(() => {
        const set = new Set(todos.map(t => t.nickname));
        return ['all', ...Array.from(set)];
      }, [todos]);

      const filtered = useMemo(() => {
        return todos.filter(t => {
          if (filterUser !== 'all' && t.nickname !== filterUser) return false;
          if (filterStatus === 'done' && !t.done) return false;
          if (filterStatus === 'progress' && t.done) return false;
          return true;
        });
      }, [todos, filterUser, filterStatus]);

      const handleDelete = async (id) => {
        if (!confirm('정말 이 할일을 삭제하시겠습니까?')) return;
        try {
          await api(`/api/admin/todos/${id}`, { method: 'DELETE' });
          setTodos(prev => prev.filter(t => t.id !== id));
        } catch (err) { alert(err.message); }
      };

      if (loading) return <p className="text-center text-gray-400 py-12">로딩 중...</p>;

      return (
        <div className="space-y-6 animate-in">
          <div>
            <h1 className="text-lg font-semibold text-gray-900">할일 관리</h1>
            <p className="text-sm text-gray-500 mt-0.5">모든 유저의 할일을 조회하고 관리합니다.</p>
          </div>

          <Card>
            <div className="p-4 border-b border-gray-100 flex flex-wrap gap-3">
              <Select value={filterUser}
                onChange={(e) => setFilterUser(e.target.value)}
                options={authors.map(a => ({ value: a, label: a === 'all' ? '전체 작성자' : a }))}
                className="w-48" />
              <Select value={filterStatus}
                onChange={(e) => setFilterStatus(e.target.value)}
                options={[
                  { value: 'all', label: '전체 상태' },
                  { value: 'done', label: '완료' },
                  { value: 'progress', label: '진행중' },
                ]}
                className="w-36" />
            </div>

            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-gray-100">
                    <th className="text-left px-4 py-3 font-medium text-gray-500 text-xs uppercase tracking-wider">ID</th>
                    <th className="text-left px-4 py-3 font-medium text-gray-500 text-xs uppercase tracking-wider">작성자</th>
                    <th className="text-left px-4 py-3 font-medium text-gray-500 text-xs uppercase tracking-wider">내용</th>
                    <th className="text-left px-4 py-3 font-medium text-gray-500 text-xs uppercase tracking-wider">상태</th>
                    <th className="text-left px-4 py-3 font-medium text-gray-500 text-xs uppercase tracking-wider hidden md:table-cell">생성일</th>
                    <th className="text-right px-4 py-3 font-medium text-gray-500 text-xs uppercase tracking-wider">Actions</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-50">
                  {filtered.map(todo => (
                    <tr key={todo.id} className="hover:bg-gray-50 transition-colors">
                      <td className="px-4 py-3 text-gray-500">#{todo.id}</td>
                      <td className="px-4 py-3 font-medium text-gray-900 whitespace-nowrap">{todo.nickname}</td>
                      <td className="px-4 py-3 text-gray-700 max-w-xs truncate">{todo.text}</td>
                      <td className="px-4 py-3">
                        <Badge variant={todo.done ? 'success' : 'info'}>
                          {todo.done ? '완료' : '진행중'}
                        </Badge>
                      </td>
                      <td className="px-4 py-3 text-gray-500 hidden md:table-cell">{new Date(todo.created_at).toLocaleDateString('ko-KR')}</td>
                      <td className="px-4 py-3 text-right">
                        <Button variant="danger" size="sm" onClick={() => handleDelete(todo.id)}>
                          <Icon name="trash" size={14} />
                          <span className="ml-1 hidden sm:inline">삭제</span>
                        </Button>
                      </td>
                    </tr>
                  ))}
                  {filtered.length === 0 && (
                    <tr>
                      <td colSpan="6" className="px-4 py-12 text-center text-gray-400">
                        조건에 맞는 할일이 없습니다.
                      </td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>

            <div className="px-4 py-3 border-t border-gray-100 text-xs text-gray-500">
              총 {filtered.length}개의 할일
            </div>
          </Card>
        </div>
      );
    }

    // ========================================
    // Settings Page
    // ========================================
    function SettingsPage() {
      const { user } = useAuth();

      return (
        <div className="space-y-6 animate-in">
          <div>
            <h1 className="text-lg font-semibold text-gray-900">설정</h1>
            <p className="text-sm text-gray-500 mt-0.5">관리자 패널 설정을 관리합니다.</p>
          </div>

          <Card className="p-6">
            <h2 className="font-medium text-gray-900 mb-4">관리자 정보</h2>
            <div className="space-y-4 max-w-md">
              <Input id="admin-name" label="닉네임" value={user?.nickname || ''} onChange={() => {}} disabled />
              <Input id="admin-email" label="이메일" value={user?.email || ''} onChange={() => {}} disabled />
              <Input id="admin-role" label="역할" value={user?.role === 'admin' ? '관리자' : '일반'} onChange={() => {}} disabled />
            </div>
          </Card>

          <Card className="p-6">
            <h2 className="font-medium text-gray-900 mb-4">시스템 정보</h2>
            <div className="space-y-2 text-sm">
              <div className="flex justify-between py-2 border-b border-gray-50">
                <span className="text-gray-500">버전</span>
                <span className="text-gray-900 font-medium">1.0.0</span>
              </div>
              <div className="flex justify-between py-2 border-b border-gray-50">
                <span className="text-gray-500">환경</span>
                <span className="text-gray-900 font-medium">Development</span>
              </div>
              <div className="flex justify-between py-2">
                <span className="text-gray-500">마지막 업데이트</span>
                <span className="text-gray-900 font-medium">2026-04-14</span>
              </div>
            </div>
          </Card>
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================
    function App() {
      return (
        <Router>
          <AuthProvider>
            <AppContent />
          </AuthProvider>
        </Router>
      );
    }

    function AppContent() {
      const { user, checking } = useAuth();
      const { path } = useRouter();

      if (checking) return null;

      if (!user) {
        return <LoginPage />;
      }

      const renderPage = () => {
        switch (path) {
          case '/users': return <UsersPage />;
          case '/todos': return <TodosPage />;
          case '/settings': return <SettingsPage />;
          case '/dashboard':
          default: return <DashboardPage />;
        }
      };

      return (
        <DashboardLayout>
          {renderPage()}
        </DashboardLayout>
      );
    }

    // ========================================
    // Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
