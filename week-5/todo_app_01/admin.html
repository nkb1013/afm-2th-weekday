<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Todo App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function getToken() { return localStorage.getItem('todo_token'); }
    function setToken(t) { localStorage.setItem('todo_token', t); }
    function clearToken() { localStorage.removeItem('todo_token'); }

    async function api(path, options = {}) {
      const token = getToken();
      const headers = { 'Content-Type': 'application/json', ...options.headers };
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const res = await fetch(path, { ...options, headers });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'API error');
      return data;
    }

    // ========================================
    // Login
    // ========================================
    function LoginPage({ onLogin }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);
        try {
          const res = await api('/api/auth/login', {
            method: 'POST',
            body: JSON.stringify({ email, password }),
          });
          if (res.data.user.role !== 'admin') {
            throw new Error('관리자 권한이 없습니다');
          }
          setToken(res.data.token);
          onLogin(res.data.user);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="max-w-sm mx-auto px-4 py-24">
          <h1 className="text-2xl font-semibold text-gray-800 mb-1 text-center">Admin Panel</h1>
          <p className="text-sm text-gray-400 text-center mb-8">관리자 계정으로 로그인하세요</p>
          <form onSubmit={handleSubmit} className="space-y-4">
            <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="이메일" required
              className="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-white text-sm focus:outline-none focus:border-gray-400 transition-colors" />
            <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="비밀번호" required
              className="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-white text-sm focus:outline-none focus:border-gray-400 transition-colors" />
            {error && <p className="text-sm text-red-500 text-center">{error}</p>}
            <button type="submit" disabled={loading}
              className="w-full px-5 py-2.5 rounded-lg bg-gray-800 text-white text-sm font-medium hover:bg-gray-700 disabled:opacity-50 transition-all">
              {loading ? '...' : '로그인'}
            </button>
          </form>
        </div>
      );
    }

    // ========================================
    // Dashboard
    // ========================================
    function Dashboard({ user, onLogout }) {
      const [tab, setTab] = useState('users');
      const [users, setUsers] = useState([]);
      const [todos, setTodos] = useState([]);
      const [loading, setLoading] = useState(true);

      const fetchData = async () => {
        setLoading(true);
        try {
          const [u, t] = await Promise.all([
            api('/api/admin/users'),
            api('/api/admin/todos'),
          ]);
          setUsers(u.data);
          setTodos(t.data);
        } catch (err) {
          if (err.message.includes('권한') || err.message.includes('토큰')) {
            clearToken();
            onLogout();
          }
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => { fetchData(); }, []);

      const deleteUser = async (id, nickname) => {
        if (!confirm(`"${nickname}" 유저를 삭제하시겠습니까?\n해당 유저의 모든 할일도 함께 삭제됩니다.`)) return;
        try {
          await api(`/api/admin/users/${id}`, { method: 'DELETE' });
          fetchData();
        } catch (err) { alert(err.message); }
      };

      const deleteTodo = async (id) => {
        if (!confirm('이 할일을 삭제하시겠습니까?')) return;
        try {
          await api(`/api/admin/todos/${id}`, { method: 'DELETE' });
          setTodos(prev => prev.filter(t => t.id !== id));
        } catch (err) { alert(err.message); }
      };

      const totalUsers = users.length;
      const totalTodos = todos.length;
      const doneTodos = todos.filter(t => t.done).length;

      return (
        <div className="max-w-4xl mx-auto px-4 py-10">
          {/* Header */}
          <div className="flex items-center justify-between mb-8">
            <div>
              <h1 className="text-2xl font-semibold text-gray-800">Admin Panel</h1>
              <p className="text-sm text-gray-400 mt-1">{user.nickname} ({user.email})</p>
            </div>
            <div className="flex items-center gap-3">
              <a href="/" className="text-xs text-gray-400 hover:text-gray-600 transition-colors">Todo 앱으로</a>
              <button onClick={() => { clearToken(); onLogout(); }}
                className="text-xs text-gray-400 hover:text-gray-600 transition-colors">로그아웃</button>
            </div>
          </div>

          {/* Stats */}
          <div className="grid grid-cols-3 gap-4 mb-8">
            <div className="bg-white rounded-lg border border-gray-100 p-4">
              <p className="text-xs text-gray-400 mb-1">전체 유저</p>
              <p className="text-2xl font-semibold text-gray-800">{totalUsers}</p>
            </div>
            <div className="bg-white rounded-lg border border-gray-100 p-4">
              <p className="text-xs text-gray-400 mb-1">전체 할일</p>
              <p className="text-2xl font-semibold text-gray-800">{totalTodos}</p>
            </div>
            <div className="bg-white rounded-lg border border-gray-100 p-4">
              <p className="text-xs text-gray-400 mb-1">완료율</p>
              <p className="text-2xl font-semibold text-gray-800">
                {totalTodos > 0 ? Math.round((doneTodos / totalTodos) * 100) : 0}%
              </p>
            </div>
          </div>

          {/* Tabs */}
          <div className="flex gap-1 mb-6 bg-gray-100 rounded-lg p-1 w-fit">
            <button onClick={() => setTab('users')}
              className={`px-4 py-1.5 rounded-md text-sm font-medium transition-all ${tab === 'users' ? 'bg-white text-gray-800 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>
              유저 ({totalUsers})
            </button>
            <button onClick={() => setTab('todos')}
              className={`px-4 py-1.5 rounded-md text-sm font-medium transition-all ${tab === 'todos' ? 'bg-white text-gray-800 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>
              할일 ({totalTodos})
            </button>
          </div>

          {loading ? (
            <p className="text-center text-gray-400 text-sm py-12">로딩 중...</p>
          ) : tab === 'users' ? (
            /* Users Table */
            <div className="bg-white rounded-lg border border-gray-100 overflow-hidden">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-gray-100">
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400">ID</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400">닉네임</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400">이메일</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400">역할</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400">가입일</th>
                    <th className="text-right px-4 py-3 text-xs font-medium text-gray-400">할일 수</th>
                    <th className="px-4 py-3"></th>
                  </tr>
                </thead>
                <tbody>
                  {users.map(u => {
                    const userTodos = todos.filter(t => t.email === u.email);
                    return (
                      <tr key={u.id} className="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                        <td className="px-4 py-3 text-gray-400">{u.id}</td>
                        <td className="px-4 py-3 text-gray-800 font-medium">{u.nickname}</td>
                        <td className="px-4 py-3 text-gray-600">{u.email}</td>
                        <td className="px-4 py-3">
                          <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${u.role === 'admin' ? 'bg-amber-100 text-amber-700' : 'bg-gray-100 text-gray-600'}`}>
                            {u.role === 'admin' ? '관리자' : '일반'}
                          </span>
                        </td>
                        <td className="px-4 py-3 text-gray-400">{new Date(u.created_at).toLocaleDateString('ko-KR')}</td>
                        <td className="px-4 py-3 text-right text-gray-600">{userTodos.length}</td>
                        <td className="px-4 py-3 text-right">
                          {u.role !== 'admin' && (
                            <button onClick={() => deleteUser(u.id, u.nickname)}
                              className="text-xs text-gray-400 hover:text-red-500 transition-colors">
                              삭제
                            </button>
                          )}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          ) : (
            /* Todos Table */
            <div className="bg-white rounded-lg border border-gray-100 overflow-hidden">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-gray-100">
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400">ID</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400">작성자</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400">내용</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400">상태</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400">생성일</th>
                    <th className="px-4 py-3"></th>
                  </tr>
                </thead>
                <tbody>
                  {todos.map(t => (
                    <tr key={t.id} className="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                      <td className="px-4 py-3 text-gray-400">{t.id}</td>
                      <td className="px-4 py-3 text-gray-600">{t.nickname}</td>
                      <td className="px-4 py-3 text-gray-800">{t.text}</td>
                      <td className="px-4 py-3">
                        <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${t.done ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}`}>
                          {t.done ? '완료' : '진행중'}
                        </span>
                      </td>
                      <td className="px-4 py-3 text-gray-400">{new Date(t.created_at).toLocaleDateString('ko-KR')}</td>
                      <td className="px-4 py-3 text-right">
                        <button onClick={() => deleteTodo(t.id)}
                          className="text-xs text-gray-400 hover:text-red-500 transition-colors">
                          삭제
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              {todos.length === 0 && (
                <p className="text-center text-gray-400 text-sm py-8">할일이 없습니다</p>
              )}
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // App
    // ========================================
    function App() {
      const [user, setUser] = useState(null);
      const [checking, setChecking] = useState(true);

      useEffect(() => {
        const token = getToken();
        if (!token) { setChecking(false); return; }
        api('/api/auth/me')
          .then(data => {
            if (data.data.role === 'admin') setUser(data.data);
            else { clearToken(); }
          })
          .catch(() => clearToken())
          .finally(() => setChecking(false));
      }, []);

      if (checking) return null;
      if (!user) return <LoginPage onLogin={setUser} />;
      return <Dashboard user={user} onLogout={() => setUser(null)} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
