<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeOut {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateX(20px); }
    }
    .todo-enter { animation: slideIn 0.25s ease-out; }
    .todo-exit { animation: fadeOut 0.2s ease-in forwards; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // ========================================
    // API Helper
    // ========================================
    function getToken() { return localStorage.getItem('todo_token'); }
    function setToken(t) { localStorage.setItem('todo_token', t); }
    function clearToken() { localStorage.removeItem('todo_token'); }

    async function api(path, options = {}) {
      const token = getToken();
      const headers = { 'Content-Type': 'application/json', ...options.headers };
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const res = await fetch(path, { ...options, headers });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'API error');
      return data;
    }

    // ========================================
    // Auth Component
    // ========================================
    function AuthPage({ onLogin }) {
      const [mode, setMode] = useState('login');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [nickname, setNickname] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);
        try {
          if (mode === 'signup') {
            const res = await api('/api/auth/signup', {
              method: 'POST',
              body: JSON.stringify({ email, password, nickname }),
            });
            setToken(res.data.token);
            onLogin(res.data.user);
          } else {
            const res = await api('/api/auth/login', {
              method: 'POST',
              body: JSON.stringify({ email, password }),
            });
            setToken(res.data.token);
            onLogin(res.data.user);
          }
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="max-w-sm mx-auto px-4 py-24">
          <h1 className="text-2xl font-semibold text-gray-800 mb-2 tracking-tight text-center">
            Todo
          </h1>
          <p className="text-sm text-gray-400 text-center mb-8">
            {mode === 'login' ? '로그인하고 시작하세요' : '새 계정을 만드세요'}
          </p>

          <form onSubmit={handleSubmit} className="space-y-4">
            {mode === 'signup' && (
              <input
                type="text"
                value={nickname}
                onChange={(e) => setNickname(e.target.value)}
                placeholder="닉네임"
                required
                className="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-white text-gray-800 placeholder-gray-400 text-sm focus:outline-none focus:border-gray-400 transition-colors"
              />
            )}
            <input
              type="email"
              value={email}
              onChange={(e) => setEmail(e.target.value)}
              placeholder="이메일"
              required
              className="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-white text-gray-800 placeholder-gray-400 text-sm focus:outline-none focus:border-gray-400 transition-colors"
            />
            <input
              type="password"
              value={password}
              onChange={(e) => setPassword(e.target.value)}
              placeholder="비밀번호"
              required
              className="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-white text-gray-800 placeholder-gray-400 text-sm focus:outline-none focus:border-gray-400 transition-colors"
            />

            {error && (
              <p className="text-sm text-red-500 text-center">{error}</p>
            )}

            <button
              type="submit"
              disabled={loading}
              className="w-full px-5 py-2.5 rounded-lg bg-gray-800 text-white text-sm font-medium hover:bg-gray-700 disabled:opacity-50 transition-all"
            >
              {loading ? '...' : mode === 'login' ? '로그인' : '회원가입'}
            </button>
          </form>

          <p className="text-xs text-gray-400 text-center mt-6">
            {mode === 'login' ? (
              <>계정이 없으신가요? <button onClick={() => { setMode('signup'); setError(''); }} className="text-gray-600 underline">회원가입</button></>
            ) : (
              <>이미 계정이 있으신가요? <button onClick={() => { setMode('login'); setError(''); }} className="text-gray-600 underline">로그인</button></>
            )}
          </p>
        </div>
      );
    }

    // ========================================
    // Todo Component
    // ========================================
    function TodoPage({ user, onLogout }) {
      const [todos, setTodos] = useState([]);
      const [input, setInput] = useState('');
      const [exiting, setExiting] = useState(null);
      const inputRef = useRef(null);

      useEffect(() => {
        api('/api/todos')
          .then(data => { if (data.success) setTodos(data.data); })
          .catch(err => {
            console.error('Failed to fetch todos:', err);
            if (err.message.includes('토큰') || err.message.includes('로그인')) {
              clearToken();
              onLogout();
            }
          });
      }, []);

      const addTodo = async () => {
        const text = input.trim();
        if (!text) return;
        setInput('');
        inputRef.current?.focus();
        try {
          const data = await api('/api/todos', {
            method: 'POST',
            body: JSON.stringify({ text }),
          });
          if (data.success) setTodos(prev => [data.data, ...prev]);
        } catch (err) { console.error('Failed to add todo:', err); }
      };

      const handleKeyDown = (e) => { if (e.key === 'Enter') addTodo(); };

      const toggleTodo = async (id) => {
        const todo = todos.find(t => t.id === id);
        if (!todo) return;
        setTodos(prev => prev.map(t => t.id === id ? { ...t, done: !t.done } : t));
        try {
          await api(`/api/todos/${id}`, {
            method: 'PATCH',
            body: JSON.stringify({ done: !todo.done }),
          });
        } catch (err) {
          setTodos(prev => prev.map(t => t.id === id ? { ...t, done: todo.done } : t));
        }
      };

      const deleteTodo = (id) => {
        setExiting(id);
        setTimeout(async () => {
          try {
            await api(`/api/todos/${id}`, { method: 'DELETE' });
            setTodos(prev => prev.filter(t => t.id !== id));
          } catch (err) { console.error('Failed to delete:', err); }
          setExiting(null);
        }, 200);
      };

      const remaining = todos.filter(t => !t.done).length;

      return (
        <div className="max-w-lg mx-auto px-4 py-16 sm:py-24">
          {/* Header */}
          <div className="flex items-center justify-between mb-8">
            <h1 className="text-2xl font-semibold text-gray-800 tracking-tight">
              Todo
            </h1>
            <div className="flex items-center gap-3">
              <span className="text-sm text-gray-500">{user.nickname}</span>
              <button
                onClick={() => { clearToken(); onLogout(); }}
                className="text-xs text-gray-400 hover:text-gray-600 transition-colors"
              >
                로그아웃
              </button>
            </div>
          </div>

          {/* Input */}
          <div className="flex gap-2 mb-8">
            <input
              ref={inputRef}
              type="text"
              value={input}
              onChange={(e) => setInput(e.target.value)}
              onKeyDown={handleKeyDown}
              placeholder="할 일을 입력하세요"
              className="flex-1 px-4 py-2.5 rounded-lg border border-gray-200 bg-white text-gray-800 placeholder-gray-400 text-sm focus:outline-none focus:border-gray-400 transition-colors"
            />
            <button
              onClick={addTodo}
              disabled={!input.trim()}
              className="px-5 py-2.5 rounded-lg bg-gray-800 text-white text-sm font-medium hover:bg-gray-700 disabled:opacity-30 disabled:cursor-not-allowed transition-all"
            >
              추가
            </button>
          </div>

          {/* List */}
          {todos.length === 0 ? (
            <p className="text-center text-gray-400 text-sm py-12">
              아직 할 일이 없습니다
            </p>
          ) : (
            <ul className="space-y-2">
              {todos.map((todo) => (
                <li
                  key={todo.id}
                  className={`flex items-center gap-3 px-4 py-3 bg-white rounded-lg border border-gray-100 group ${
                    exiting === todo.id ? 'todo-exit' : 'todo-enter'
                  }`}
                >
                  <button
                    onClick={() => toggleTodo(todo.id)}
                    className={`w-5 h-5 rounded-full border-2 flex-shrink-0 flex items-center justify-center transition-colors ${
                      todo.done ? 'bg-gray-800 border-gray-800' : 'border-gray-300 hover:border-gray-400'
                    }`}
                  >
                    {todo.done && (
                      <svg className="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}>
                        <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                      </svg>
                    )}
                  </button>
                  <span className={`flex-1 text-sm transition-all ${todo.done ? 'line-through text-gray-400' : 'text-gray-700'}`}>
                    {todo.text}
                  </span>
                  <button
                    onClick={() => deleteTodo(todo.id)}
                    className="opacity-0 group-hover:opacity-100 focus:opacity-100 text-gray-400 hover:text-red-400 transition-all p-1"
                  >
                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                      <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                  </button>
                </li>
              ))}
            </ul>
          )}

          {todos.length > 0 && (
            <p className="text-xs text-gray-400 mt-6 text-center">
              {remaining}개 남음
            </p>
          )}
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================
    function App() {
      const [user, setUser] = useState(null);
      const [checking, setChecking] = useState(true);

      useEffect(() => {
        const token = getToken();
        if (!token) { setChecking(false); return; }
        api('/api/auth/me')
          .then(data => setUser(data.data))
          .catch(() => clearToken())
          .finally(() => setChecking(false));
      }, []);

      if (checking) return null;

      if (!user) {
        return <AuthPage onLogin={setUser} />;
      }
      return <TodoPage user={user} onLogout={() => setUser(null)} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
